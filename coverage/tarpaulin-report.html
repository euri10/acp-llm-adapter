  let plan = plan_from_prompt(\"Just one sentence\");\n        assert_eq!(plan.entries.len(), 1);\n        assert_eq!(plan.entries[0].priority, PlanEntryPriority::High);\n    }\n\n    #[test]\n    fn resource_link_prompt_includes_description_when_present() {\n        use super::resource_link_prompt_text;\n        let mut link = ResourceLink::new(\"docs\", \"file:///ref.md\");\n        link.description = Some(\"Reference docs\".to_string());\n        let rendered = resource_link_prompt_text(\u0026link);\n        assert!(rendered.contains(\"Reference docs\"));\n        assert!(rendered.contains(\" - \"));\n    }\n\n    #[test]\n    fn resource_link_prompt_text_uses_title_over_name() {\n        use super::resource_link_prompt_text;\n        let mut link = ResourceLink::new(\"internal_name\", \"file:///foo.md\");\n        link.title = Some(\"Display Title\".to_string());\n        let rendered = resource_link_prompt_text(\u0026link);\n        assert!(rendered.contains(\"Display Title\"));\n        assert!(!rendered.contains(\"internal_name\"));\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","mcp.rs"],"content":"//! MCP session startup, tool mapping, and invocation helpers.\n\nuse std::collections::HashMap;\n\nuse agent_client_protocol::schema::{\n    HttpHeader, McpServer, McpServerHttp, McpServerStdio, ToolKind,\n};\nuse deepseek_acp_adapter::deepseek::{ToolCall as DeepSeekToolCall, ToolDefinition};\nuse http::{HeaderName, HeaderValue};\nuse rmcp::model::{CallToolRequestParams, Content as McpContent, JsonObject, Tool as McpTool};\nuse rmcp::service::RunningService;\nuse rmcp::transport::streamable_http_client::StreamableHttpClientTransportConfig;\nuse rmcp::transport::{ConfigureCommandExt, StreamableHttpClientTransport, TokioChildProcess};\nuse rmcp::{Peer, RoleClient, ServiceExt};\nuse serde_json::Value;\nuse tokio::process::Command as TokioCommand;\n\nuse crate::SessionStore;\nuse crate::tools::{ToolContext, ToolExecution};\n\n/// Prefix used for model-visible MCP tool names.\npub(crate) const MCP_TOOL_PREFIX: \u0026str = \"mcp\";\nconst MCP_TOOL_NAME_PREFIX: \u0026str = \"mcp__\";\n\n/// Permission kind used for all MCP tools.\n///\n/// MCP servers are external executors with unknown side effects, so they are\n/// treated like command execution for approval decisions.\npub(crate) const MCP_TOOL_KIND: ToolKind = ToolKind::Execute;\n\n#[derive(Debug)]\npub(crate) struct McpSession {\n    pub(crate) name: String,\n    pub(crate) tools: Vec\u003cMcpToolMapping\u003e,\n    pub(crate) peer: Peer\u003cRoleClient\u003e,\n    pub(crate) _service: RunningService\u003cRoleClient, ()\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub(crate) struct McpToolMapping {\n    pub(crate) exposed_name: String,\n    pub(crate) original_name: String,\n    pub(crate) definition: ToolDefinition,\n}\n\n#[derive(Debug, Clone)]\npub(crate) struct McpToolTarget {\n    pub(crate) server_name: String,\n    pub(crate) original_name: String,\n    pub(crate) peer: Peer\u003cRoleClient\u003e,\n}\n\n/// Return whether a tool name belongs to an MCP-backed tool.\n#[must_use]\npub(crate) fn is_mcp_tool_name(name: \u0026str) -\u003e bool {\n    name.starts_with(MCP_TOOL_NAME_PREFIX)\n}\n\n/// Return the explicit ACP permission kind used for MCP tools.\n#[must_use]\npub(crate) const fn mcp_tool_kind() -\u003e ToolKind {\n    MCP_TOOL_KIND\n}\n\n/// Execute an MCP tool call for the given session.\n#[must_use]\npub(crate) async fn mcp_tool_execution(\n    store: \u0026SessionStore,\n    call: \u0026DeepSeekToolCall,\n    context: \u0026ToolContext,\n) -\u003e ToolExecution {\n    let target = match store.find_mcp_target(\u0026context.session_id, call.name()) {\n        Ok(Some(target)) =\u003e target,\n        Ok(None) =\u003e return ToolExecution::failed(format!(\"unknown MCP tool: {}\", call.name())),\n        Err(error) =\u003e return ToolExecution::failed(error.to_string()),\n    };\n\n    let arguments = match mcp_call_arguments(call) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e return ToolExecution::failed(error),\n    };\n\n    let result = target\n        .peer\n        .call_tool(\n            CallToolRequestParams::new(target.original_name.clone()).with_arguments(arguments),\n        )\n        .await;\n\n    match result {\n        Ok(result) =\u003e {\n            let model_output = mcp_tool_result_text(\u0026result.content);\n            let raw_output = serde_json::to_value(\u0026result).unwrap_or_else(|error| {\n                serde_json::json!({\n                    \"error\": format!(\"failed to serialize MCP tool result: {error}\")\n                })\n            });\n            ToolExecution {\n                content: model_output,\n                raw_output,\n                success: !result.is_error.unwrap_or(false),\n                edit: None,\n            }\n        }\n        Err(error) =\u003e ToolExecution::failed(format!(\n            \"MCP tool '{}' on server '{}' failed: {error}\",\n            target.original_name, target.server_name\n        )),\n    }\n}\n\n/// Parse MCP tool arguments from the model-emitted JSON payload.\npub(crate) fn mcp_call_arguments(call: \u0026DeepSeekToolCall) -\u003e Result\u003cJsonObject, String\u003e {\n    match serde_json::from_str::\u003cValue\u003e(call.arguments()) {\n        Ok(Value::Object(arguments)) =\u003e Ok(arguments),\n        Ok(_) =\u003e Err(format!(\n            \"MCP tool '{}' arguments must be a JSON object\",\n            call.name()\n        )),\n        Err(error) =\u003e Err(format!(\n            \"invalid MCP tool '{}' arguments: {error}\",\n            call.name()\n        )),\n    }\n}\n\n/// Render MCP result content into the plain text fed back to the model.\n#[must_use]\npub(crate) fn mcp_tool_result_text(content: \u0026[McpContent]) -\u003e String {\n    let parts = content\n        .iter()\n        .map(|content| {\n            content.raw.as_text().map_or_else(\n                || {\n                    serde_json::to_string(\u0026content.raw)\n                        .unwrap_or_else(|error| format!(\"failed to serialize MCP content: {error}\"))\n                },\n                |text| text.text.clone(),\n            )\n        })\n        .collect::\u003cVec\u003c_\u003e\u003e();\n\n    if parts.is_empty() {\n        String::new()\n    } else {\n        parts.join(\"\\n\")\n    }\n}\n\n/// Connect all requested MCP servers for a new ACP session.\n///\n/// # Errors\n///\n/// Returns an ACP error when a server uses a non-stdio transport, the command\n/// is invalid, the process cannot be started, or the server cannot be queried\n/// for tools.\npub(crate) async fn connect_mcp_sessions(\n    servers: \u0026[McpServer],\n) -\u003e Result\u003cVec\u003cMcpSession\u003e, agent_client_protocol::Error\u003e {\n    let mut sessions = Vec::new();\n\n    for server in servers {\n        match server {\n            McpServer::Stdio(stdio) =\u003e sessions.push(connect_mcp_stdio_session(stdio).await?),\n            McpServer::Http(http) =\u003e sessions.push(connect_mcp_http_session(http).await?),\n            McpServer::Sse(_) =\u003e {\n                return Err(agent_client_protocol::Error::invalid_params()\n                    .data(\"SSE MCP servers are not supported\"));\n            }\n            _ =\u003e {\n                return Err(agent_client_protocol::Error::invalid_params()\n                    .data(\"unsupported MCP server transport\"));\n            }\n        }\n    }\n\n    Ok(sessions)\n}\n\n/// Connect a single stdio MCP server and collect its advertised tools.\n///\n/// # Errors\n///\n/// Returns an ACP error when the command path is not absolute, the process\n/// fails to start, initialization fails, or tool discovery fails.\npub(crate) async fn connect_mcp_stdio_session(\n    server: \u0026McpServerStdio,\n) -\u003e Result\u003cMcpSession, agent_client_protocol::Error\u003e {\n    if !server.command.is_absolute() {\n        return Err(agent_client_protocol::Error::invalid_params().data(format!(\n            \"MCP server '{}' command must be absolute\",\n            server.name\n        )));\n    }\n\n    let command = TokioCommand::new(\u0026server.command).configure(|command| {\n        command.args(\u0026server.args);\n        for variable in \u0026server.env {\n            command.env(\u0026variable.name, \u0026variable.value);\n        }\n    });\n    let transport = TokioChildProcess::new(command).map_err(|error| {\n        agent_client_protocol::Error::invalid_params().data(format!(\n            \"failed to start MCP server '{}': {error}\",\n            server.name\n        ))\n    })?;\n    let service = ().serve(transport).await.map_err(|error| {\n        agent_client_protocol::Error::invalid_params().data(format!(\n            \"failed to initialize MCP server '{}': {error}\",\n            server.name\n        ))\n    })?;\n    mcp_session_from_service(\u0026server.name, service).await\n}\n\n/// Connect a single streamable HTTP MCP server and collect its advertised tools.\n///\n/// # Errors\n///\n/// Returns an ACP error when headers are invalid, initialization fails, or tool\n/// discovery fails.\npub(crate) async fn connect_mcp_http_session(\n    server: \u0026McpServerHttp,\n) -\u003e Result\u003cMcpSession, agent_client_protocol::Error\u003e {\n    let custom_headers = mcp_http_headers(\u0026server.headers, \u0026server.name)?;\n    let config = StreamableHttpClientTransportConfig::with_uri(server.url.clone())\n        .custom_headers(custom_headers);\n    let transport = StreamableHttpClientTransport::from_config(config);\n    let service = ().serve(transport).await.map_err(|error| {\n        agent_client_protocol::Error::invalid_params().data(format!(\n            \"failed to initialize MCP server '{}': {error}\",\n            server.name\n        ))\n    })?;\n\n    mcp_session_from_service(\u0026server.name, service).await\n}\n\nasync fn mcp_session_from_service(\n    server_name: \u0026str,\n    service: RunningService\u003cRoleClient, ()\u003e,\n) -\u003e Result\u003cMcpSession, agent_client_protocol::Error\u003e {\n    let peer = service.peer().clone();\n    let tools = peer.list_all_tools().await.map_err(|error| {\n        agent_client_protocol::Error::invalid_params().data(format!(\n            \"failed to list MCP tools for server '{server_name}': {error}\",\n        ))\n    })?;\n    let mappings = mcp_tool_mappings(server_name, tools);\n\n    Ok(McpSession {\n        name: server_name.to_string(),\n        tools: mappings,\n        peer,\n        _service: service,\n    })\n}\n\nfn mcp_http_headers(\n    headers: \u0026[HttpHeader],\n    server_name: \u0026str,\n) -\u003e Result\u003cHashMap\u003cHeaderName, HeaderValue\u003e, agent_client_protocol::Error\u003e {\n    let mut parsed = HashMap::with_capacity(headers.len());\n    for header in headers {\n        let name = HeaderName::from_bytes(header.name.as_bytes()).map_err(|error| {\n            agent_client_protocol::Error::invalid_params().data(format!(\n                \"invalid HTTP header name '{}' for MCP server '{server_name}': {error}\",\n                header.name\n            ))\n        })?;\n        let value = HeaderValue::from_str(\u0026header.value).map_err(|error| {\n            agent_client_protocol::Error::invalid_params().data(format!(\n                \"invalid HTTP header value for '{}' on MCP server '{server_name}': {error}\",\n                header.name\n            ))\n        })?;\n        parsed.insert(name, value);\n    }\n    Ok(parsed)\n}\n\n/// Map MCP server tool metadata into model-visible tool definitions.\n#[must_use]\npub(crate) fn mcp_tool_mappings(server_name: \u0026str, tools: Vec\u003cMcpTool\u003e) -\u003e Vec\u003cMcpToolMapping\u003e {\n    tools\n        .into_iter()\n        .map(|tool| {\n            let original_name = tool.name.to_string();\n            let exposed_name = mcp_tool_name(server_name, \u0026original_name);\n            let description = tool.description.map_or_else(\n                || format!(\"MCP tool '{original_name}' from server '{server_name}'\"),\n                |description| description.to_string(),\n            );\n            let definition = ToolDefinition::new(\n                exposed_name.clone(),\n                description,\n                Value::Object(tool.input_schema.as_ref().clone()),\n            );\n\n            McpToolMapping {\n                exposed_name,\n                original_name,\n                definition,\n            }\n        })\n        .collect()\n}\n\nfn mcp_tool_name(server_name: \u0026str, tool_name: \u0026str) -\u003e String {\n    format!(\n        \"{MCP_TOOL_PREFIX}__{}__{}\",\n        sanitize_tool_name_part(server_name),\n        sanitize_tool_name_part(tool_name)\n    )\n}\n\npub(crate) fn sanitize_tool_name_part(value: \u0026str) -\u003e String {\n    let mut sanitized = String::new();\n    for character in value.chars() {\n        if character.is_ascii_alphanumeric() {\n            sanitized.push(character.to_ascii_lowercase());\n        } else {\n            sanitized.push('_');\n        }\n    }\n\n    let trimmed = sanitized.trim_matches('_');\n    if trimmed.is_empty() {\n        \"unnamed\".to_string()\n    } else {\n        trimmed.to_string()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{\n        McpSession, connect_mcp_sessions, connect_mcp_stdio_session, mcp_call_arguments,\n        mcp_http_headers, mcp_tool_execution, mcp_tool_mappings, mcp_tool_result_text,\n    };\n    use crate::acp::{handle_new_session_request, handle_set_session_mode_request};\n    use crate::session::{\n        PERMISSION_ALLOW_ONCE_OPTION_ID, PermissionDecision, request_tool_permission,\n    };\n    use crate::tools::{AdapterToolRegistry, ToolContext, ToolRegistry};\n    use crate::{PermissionRequester, test_store};\n    use agent_client_protocol::schema::{\n        McpServer, McpServerStdio, NewSessionRequest, RequestPermissionOutcome,\n        RequestPermissionRequest, RequestPermissionResponse, SelectedPermissionOutcome,\n        SetSessionModeRequest, ToolKind,\n    };\n    use deepseek_acp_adapter::deepseek::ToolCall as DeepSeekToolCall;\n    use futures_util::future::BoxFuture;\n    use rmcp::model::{\n        CallToolRequestParams, CallToolResult, Content as McpContent, ListToolsResult,\n        PaginatedRequestParams, ServerCapabilities, ServerInfo, Tool as McpTool,\n    };\n    use rmcp::service::{RequestContext, RoleServer};\n    use rmcp::{ServerHandler, ServiceExt};\n    use serde_json::Value;\n    use std::collections::VecDeque;\n    use std::path::PathBuf;\n    use std::sync::{Arc, Mutex};\n\n    #[derive(Debug, Clone)]\n    struct EchoMcpServer;\n\n    impl ServerHandler for EchoMcpServer {\n        fn get_info(\u0026self) -\u003e ServerInfo {\n            ServerInfo::new(ServerCapabilities::builder().enable_tools().build())\n        }\n\n        async fn call_tool(\n            \u0026self,\n            request: CallToolRequestParams,\n            _context: RequestContext\u003cRoleServer\u003e,\n        ) -\u003e Result\u003cCallToolResult, rmcp::ErrorData\u003e {\n            let message = request\n                .arguments\n                .as_ref()\n                .and_then(|arguments| arguments.get(\"message\"))\n                .and_then(Value::as_str)\n                .unwrap_or(\"\");\n            Ok(CallToolResult::success(vec![McpContent::text(format!(\n                \"echo: {message}\"\n            ))]))\n        }\n\n        async fn list_tools(\n            \u0026self,\n            _request: Option\u003cPaginatedRequestParams\u003e,\n            _context: RequestContext\u003cRoleServer\u003e,\n        ) -\u003e Result\u003cListToolsResult, rmcp::ErrorData\u003e {\n            Ok(ListToolsResult {\n                tools: vec![McpTool::new(\n                    \"echo\",\n                    \"Echo a provided message\",\n                    rmcp::model::object(serde_json::json!({\n                        \"type\": \"object\",\n                        \"properties\": {\n                            \"message\": { \"type\": \"string\" }\n                        },\n                        \"required\": [\"message\"]\n                    })),\n                )],\n                ..Default::default()\n            })\n        }\n    }\n\n    async fn connected_echo_mcp_session() -\u003e Result\u003cMcpSession, agent_client_protocol::Error\u003e {\n        let (server_transport, client_transport) = tokio::io::duplex(4096);\n        let server_task = tokio::spawn(async move {\n            let running = EchoMcpServer\n                .serve(server_transport)\n                .await\n                .map_err(|error| error.to_string())?;\n            running.waiting().await.map_err(|error| error.to_string())?;\n            Ok::\u003c(), String\u003e(())\n        });\n        drop(server_task);\n\n        let service = ().serve(client_transport).await.map_err(|error| {\n            agent_client_protocol::Error::internal_error()\n                .data(format!(\"failed to initialize test MCP client: {error}\"))\n        })?;\n        let peer = service.peer().clone();\n        let tools = peer.list_all_tools().await.map_err(|error| {\n            agent_client_protocol::Error::internal_error()\n                .data(format!(\"failed to list test MCP tools: {error}\"))\n        })?;\n\n        Ok(McpSession {\n            name: \"Echo Server\".to_string(),\n            tools: mcp_tool_mappings(\"Echo Server\", tools),\n            peer,\n            _service: service,\n        })\n    }\n\n    struct FakePermissionRequester {\n        requests: Arc\u003cMutex\u003cVec\u003cRequestPermissionRequest\u003e\u003e\u003e,\n        responses: Mutex\u003cVecDeque\u003cRequestPermissionResponse\u003e\u003e,\n    }\n\n    impl FakePermissionRequester {\n        fn new(responses: Vec\u003cRequestPermissionResponse\u003e) -\u003e Self {\n            Self {\n                requests: Arc::new(Mutex::new(Vec::new())),\n                responses: Mutex::new(VecDeque::from(responses)),\n            }\n        }\n\n        fn requests(\u0026self) -\u003e Arc\u003cMutex\u003cVec\u003cRequestPermissionRequest\u003e\u003e\u003e {\n            Arc::clone(\u0026self.requests)\n        }\n    }\n\n    impl PermissionRequester for FakePermissionRequester {\n        fn request_permission(\n            \u0026self,\n            request: RequestPermissionRequest,\n        ) -\u003e BoxFuture\u003c'_, Result\u003cRequestPermissionResponse, agent_client_protocol::Error\u003e\u003e\n        {\n            self.requests\n                .lock()\n                .map(|mut requests| requests.push(request))\n                .ok();\n\n            let response = self\n                .responses\n                .lock()\n                .map_err(|error| {\n                    agent_client_protocol::Error::internal_error().data(error.to_string())\n                })\n                .and_then(|mut responses| {\n                    responses.pop_front().ok_or_else(|| {\n                        agent_client_protocol::Error::internal_error()\n                            .data(\"fake permission requester was exhausted\")\n                    })\n                });\n\n            Box::pin(async move { response })\n        }\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn mcp_stdio_launch_failure_returns_invalid_params() {\n        let result = connect_mcp_sessions(\u0026[McpServer::Stdio(McpServerStdio::new(\n            \"broken\",\n            \"/definitely/not/a/real/mcp-server\",\n        ))])\n        .await;\n\n        assert!(result.is_err());\n        let error_text = result\n            .err()\n            .map_or_else(String::new, |error| format!(\"{error:?}\"));\n        assert!(error_text.contains(\"failed to start MCP server 'broken'\"));\n    }\n\n    #[test_log::test]\n    fn mcp_tool_mappings_prefix_and_preserve_schema() {\n        let mappings = mcp_tool_mappings(\n            \"Test Server\",\n            vec![McpTool::new(\n                \"Read File\",\n                \"Read through MCP\",\n                rmcp::model::object(serde_json::json!({\n                    \"type\": \"object\",\n                    \"properties\": {\n                        \"path\": { \"type\": \"string\" }\n                    }\n                })),\n            )],\n        );\n\n        assert_eq!(mappings.len(), 1);\n        let mapping = \u0026mappings[0];\n        assert_eq!(mapping.exposed_name, \"mcp__test_server__read_file\");\n        assert_eq!(mapping.original_name, \"Read File\");\n        assert_eq!(mapping.definition.name(), \"mcp__test_server__read_file\");\n        assert_eq!(mapping.definition.description(), \"Read through MCP\");\n        assert_eq!(\n            mapping.definition.parameters()[\"properties\"][\"path\"][\"type\"],\n            \"string\"\n        );\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn adapter_registry_exposes_and_executes_session_mcp_tools()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let response = handle_new_session_request(\u0026store, \u0026NewSessionRequest::new(\"/tmp\"))?;\n        let mcp_session = connected_echo_mcp_session().await?;\n        {\n            let mut guard = store\n                .state\n                .lock()\n                .map_err(agent_client_protocol::Error::into_internal_error)?;\n            let session = guard\n                .sessions\n                .get_mut(\u0026response.session_id)\n                .ok_or_else(|| {\n                    agent_client_protocol::Error::internal_error().data(\"missing session\")\n                })?;\n            session.mcp_sessions.push(mcp_session);\n        }\n\n        let context = ToolContext {\n            session_id: response.session_id.clone(),\n            cwd: PathBuf::from(\"/tmp\"),\n            additional_directories: Vec::new(),\n            client_capabilities: None,\n        };\n        let registry = AdapterToolRegistry;\n        let definitions = registry.definitions(\u0026context, \u0026store)?;\n        assert!(\n            definitions\n                .iter()\n                .any(|definition| definition.name() == \"mcp__echo_server__echo\")\n        );\n\n        let result = registry\n            .execute(\n                \u0026DeepSeekToolCall::new(\n                    \"call-mcp\",\n                    \"mcp__echo_server__echo\",\n                    serde_json::json!({ \"message\": \"hello\" }).to_string(),\n                ),\n                \u0026context,\n                \u0026store,\n                None,\n                tokio_util::sync::CancellationToken::new(),\n            )\n            .await;\n\n        assert!(result.success);\n        assert_eq!(result.content, \"echo: hello\");\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn mcp_tools_use_explicit_execute_permission_kind()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let session = handle_new_session_request(\u0026store, \u0026NewSessionRequest::new(\"/tmp\"))?;\n        handle_set_session_mode_request(\n            \u0026store,\n            \u0026SetSessionModeRequest::new(session.session_id.clone(), \"accept-edits\"),\n        )?;\n        let context = ToolContext {\n            session_id: session.session_id,\n            cwd: PathBuf::from(\"/tmp\"),\n            additional_directories: Vec::new(),\n            client_capabilities: None,\n        };\n        let call = DeepSeekToolCall::new(\n            \"call-mcp-permission\",\n            \"mcp__server__tool\",\n            serde_json::json!({ \"message\": \"hello\" }).to_string(),\n        );\n        let requester = FakePermissionRequester::new(vec![RequestPermissionResponse::new(\n            RequestPermissionOutcome::Selected(SelectedPermissionOutcome::new(\n                PERMISSION_ALLOW_ONCE_OPTION_ID,\n            )),\n        )]);\n\n        let decision =\n            request_tool_permission(\u0026store, \u0026context, \u0026call, super::mcp_tool_kind(), \u0026requester)\n                .await?;\n\n        assert_eq!(decision, PermissionDecision::AllowOnce);\n        let requests = requester.requests();\n        let request_guard = requests\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        assert_eq!(request_guard.len(), 1);\n        assert_eq!(\n            request_guard[0].tool_call.fields.kind,\n            Some(ToolKind::Execute)\n        );\n\n        Ok(())\n    }\n\n    #[test]\n    fn mcp_call_arguments_rejects_non_object_json() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let call = DeepSeekToolCall::new(\"mcp-args\", \"mcp__server__tool\", \"[1,2,3]\");\n        let Err(error) = mcp_call_arguments(\u0026call) else {\n            return Err(\n                agent_client_protocol::Error::internal_error().data(\"expected object rejection\")\n            );\n        };\n        assert!(error.contains(\"arguments must be a JSON object\"));\n        Ok(())\n    }\n\n    #[test]\n    fn mcp_call_arguments_rejects_invalid_json() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let call = DeepSeekToolCall::new(\"mcp-args\", \"mcp__server__tool\", \"{oops\");\n        let Err(error) = mcp_call_arguments(\u0026call) else {\n            return Err(\n                agent_client_protocol::Error::internal_error().data(\"expected JSON rejection\")\n            );\n        };\n        assert!(error.contains(\"invalid MCP tool\"));\n        Ok(())\n    }\n\n    #[test]\n    fn mcp_tool_result_text_returns_empty_for_no_content() {\n        let result: \u0026[McpContent] = \u0026[];\n        assert_eq!(mcp_tool_result_text(result), \"\");\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn connect_mcp_sessions_rejects_sse() {\n        let result = connect_mcp_sessions(\u0026[McpServer::Sse(\n            agent_client_protocol::schema::McpServerSse::new(\"events\", \"http://localhost/sse\"),\n        )])\n        .await;\n        let Err(error) = result else {\n            return;\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"SSE MCP servers are not supported\")\n        );\n    }\n\n    #[test]\n    fn mcp_http_headers_parses_custom_headers() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let headers = [agent_client_protocol::schema::HttpHeader::new(\n            \"X-Client-Trace\",\n            \"trace-id\",\n        )];\n\n        let parsed = mcp_http_headers(\u0026headers, \"remote\")?;\n\n        assert_eq!(parsed.len(), 1);\n        let header_name = http::HeaderName::from_static(\"x-client-trace\");\n        assert_eq!(\n            parsed\n                .get(\u0026header_name)\n                .and_then(|value| value.to_str().ok()),\n            Some(\"trace-id\")\n        );\n        Ok(())\n    }\n\n    #[test]\n    fn mcp_http_headers_rejects_invalid_header_name() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let headers = [agent_client_protocol::schema::HttpHeader::new(\n            \"bad header\",\n            \"secret\",\n        )];\n\n        let Err(error) = mcp_http_headers(\u0026headers, \"remote\") else {\n            return Err(\n                agent_client_protocol::Error::internal_error().data(\"expected header rejection\")\n            );\n        };\n\n        let error = error.to_string();\n        assert!(error.contains(\"invalid HTTP header name\"));\n        assert!(!error.contains(\"secret\"));\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn mcp_tool_execution_unknown_tool() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let session = handle_new_session_request(\u0026store, \u0026NewSessionRequest::new(\"/tmp\"))?;\n        let context = ToolContext {\n            session_id: session.session_id.clone(),\n            cwd: PathBuf::from(\"/tmp\"),\n            additional_directories: Vec::new(),\n            client_capabilities: None,\n        };\n        let call = DeepSeekToolCall::new(\"mcp-unknown\", \"mcp__nonexistent__tool\", \"{}\");\n        let result = mcp_tool_execution(\u0026store, \u0026call, \u0026context).await;\n        assert!(!result.success);\n        assert!(result.content.contains(\"unknown MCP tool\"));\n        Ok(())\n    }\n\n    #[test]\n    fn mcp_tool_result_text_serializes_non_text_content() {\n        let content = vec![McpContent::text(\"text part\")];\n        assert_eq!(mcp_tool_result_text(\u0026content), \"text part\");\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn connect_mcp_sessions_with_empty_list_returns_ok() {\n        let result = connect_mcp_sessions(\u0026[]).await;\n        assert!(result.is_ok());\n        let sessions: Vec\u003cMcpSession\u003e = result.unwrap_or_default();\n        assert!(sessions.is_empty());\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn mcp_stdio_session_rejects_relative_command() {\n        let stdio = McpServerStdio::new(\"rel\", \"relative/path\");\n        let result = connect_mcp_stdio_session(\u0026stdio).await;\n        let Err(error) = result else {\n            return;\n        };\n        assert!(error.to_string().contains(\"command must be absolute\"));\n    }\n\n    #[test]\n    fn is_mcp_tool_name_matches_prefixed_only() {\n        assert!(super::is_mcp_tool_name(\"mcp__server__tool\"));\n        assert!(!super::is_mcp_tool_name(\"mcp_server_tool\"));\n        assert!(!super::is_mcp_tool_name(\"\"));\n        assert!(!super::is_mcp_tool_name(\"read_file\"));\n    }\n\n    #[test]\n    fn mcp_tool_kind_is_execute() {\n        assert_eq!(super::mcp_tool_kind(), ToolKind::Execute);\n    }\n\n    #[test]\n    fn mcp_tool_result_text_serializes_image_content() {\n        let content = vec![McpContent::image(\"base64data\", \"image/png\")];\n        let result = mcp_tool_result_text(\u0026content);\n        assert!(!result.is_empty());\n        assert!(result.contains(\"image\"));\n    }\n\n    #[test]\n    fn mcp_tool_result_text_concatenates_multiple_parts() {\n        let content = vec![McpContent::text(\"first\"), McpContent::text(\"second\")];\n        assert_eq!(mcp_tool_result_text(\u0026content), \"first\\nsecond\");\n    }\n\n    #[test]\n    fn sanitize_tool_name_handles_empty_result() {\n        assert_eq!(super::sanitize_tool_name_part(\"___\"), \"unnamed\");\n        assert_eq!(super::sanitize_tool_name_part(\"\"), \"unnamed\");\n    }\n\n    #[test]\n    fn sanitize_tool_name_handles_special_characters() {\n        assert_eq!(\n            super::sanitize_tool_name_part(\"Hello World!\"),\n            \"hello_world\"\n        );\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","session.rs"],"content":"//! Session state, permission model, and in-memory session store.\n//!\n//! This module owns the domain types that were previously scattered through\n//! `main.rs`.  Extracting them here fixes the dependency direction: protocol\n//! handlers in [`crate::acp`] now depend on `crate::session` instead of the\n//! binary entrypoint.\n\nuse std::collections::{HashMap, HashSet};\nuse std::num::NonZeroUsize;\nuse std::path::{Path, PathBuf};\nuse std::sync::{Arc, Mutex};\n\nuse agent_client_protocol::schema::{\n    ClientCapabilities, McpServer, PermissionOption, PermissionOptionKind,\n    RequestPermissionOutcome, RequestPermissionRequest, SessionConfigOption,\n    SessionConfigOptionCategory, SessionConfigSelectOption, SessionConfigValueId, SessionId,\n    SessionInfo, SessionMode, SessionModeId, SessionModeState, ToolCallStatus, ToolCallUpdate,\n    ToolCallUpdateFields, ToolKind,\n};\nuse deepseek_acp_adapter::deepseek::{\n    ChatMessage, DeepSeekConfig, ToolCall as DeepSeekToolCall, ToolCallDelta, ToolDefinition,\n};\nuse serde::{Deserialize, Serialize};\nuse tokio_util::sync::CancellationToken;\n\nuse crate::acp::PermissionRequester;\nuse crate::mcp::{McpSession, McpToolTarget};\nuse crate::session_store::{FilesystemSessionStore, PersistedSessionMeta, PersistedSessionRecord};\nuse crate::tools::ToolContext;\nuse crate::turn::tool_raw_input;\n\n/// Default maximum number of tool-call/response cycles per prompt turn.\npub(crate) const DEFAULT_MAX_TURN_REQUESTS: NonZeroUsize = NonZeroUsize::MIN.saturating_add(99);\npub(crate) const PERMISSION_ALLOW_ONCE_OPTION_ID: \u0026str = \"allow_once\";\npub(crate) const PERMISSION_ALLOW_ALWAYS_OPTION_ID: \u0026str = \"allow_always\";\npub(crate) const PERMISSION_REJECT_ONCE_OPTION_ID: \u0026str = \"reject_once\";\npub(crate) const PERMISSION_REJECT_ALWAYS_OPTION_ID: \u0026str = \"reject_always\";\npub(crate) const SESSION_MODE_ASK_ID: \u0026str = \"ask\";\npub(crate) const SESSION_MODE_ACCEPT_EDITS_ID: \u0026str = \"accept-edits\";\npub(crate) const SESSION_MODE_YOLO_ID: \u0026str = \"yolo\";\npub(crate) const SESSION_CONFIG_MODE_ID: \u0026str = \"mode\";\npub(crate) const SESSION_CONFIG_MODEL_ID: \u0026str = \"model\";\npub(crate) const SESSION_CONFIG_REASONING_EFFORT_ID: \u0026str = \"reasoning_effort\";\npub(crate) const DEEPSEEK_V4_FLASH_MODEL_ID: \u0026str = \"deepseek-v4-flash\";\npub(crate) const DEEPSEEK_V4_PRO_MODEL_ID: \u0026str = \"deepseek-v4-pro\";\npub(crate) const REASONING_EFFORT_HIGH_ID: \u0026str = \"high\";\npub(crate) const REASONING_EFFORT_MAX_ID: \u0026str = \"max\";\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub(crate) enum PermissionDecision {\n    AllowOnce,\n    AllowAlways,\n    AllowByMode,\n    RejectOnce,\n    RejectAlways,\n    Cancelled,\n}\n\n#[derive(Debug, Clone, Copy, Default, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"kebab-case\")]\npub(crate) enum PermissionPosture {\n    #[default]\n    Ask,\n    AcceptEdits,\n    Yolo,\n}\n\nimpl PermissionPosture {\n    pub(crate) fn mode_id(self) -\u003e SessionModeId {\n        match self {\n            Self::Ask =\u003e SessionModeId::new(SESSION_MODE_ASK_ID),\n            Self::AcceptEdits =\u003e SessionModeId::new(SESSION_MODE_ACCEPT_EDITS_ID),\n            Self::Yolo =\u003e SessionModeId::new(SESSION_MODE_YOLO_ID),\n        }\n    }\n\n    pub(crate) const fn allows_without_prompt(self, kind: ToolKind) -\u003e bool {\n        match self {\n            Self::Ask =\u003e false,\n            Self::AcceptEdits =\u003e matches!(kind, ToolKind::Edit),\n            Self::Yolo =\u003e !matches!(\n                kind,\n                ToolKind::Read | ToolKind::Search | ToolKind::Think | ToolKind::Fetch\n            ),\n        }\n    }\n\n    pub(crate) fn from_mode_id(mode_id: \u0026SessionModeId) -\u003e Option\u003cSelf\u003e {\n        match mode_id.0.as_ref() {\n            SESSION_MODE_ASK_ID =\u003e Some(Self::Ask),\n            SESSION_MODE_ACCEPT_EDITS_ID =\u003e Some(Self::AcceptEdits),\n            SESSION_MODE_YOLO_ID =\u003e Some(Self::Yolo),\n            _ =\u003e None,\n        }\n    }\n}\n\n#[derive(Debug, Clone, Copy, Default, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub(crate) enum ReasoningEffort {\n    #[default]\n    High,\n    Max,\n}\n\nimpl ReasoningEffort {\n    pub(crate) const fn id(self) -\u003e \u0026'static str {\n        match self {\n            Self::High =\u003e REASONING_EFFORT_HIGH_ID,\n            Self::Max =\u003e REASONING_EFFORT_MAX_ID,\n        }\n    }\n\n    pub(crate) const fn name(self) -\u003e \u0026'static str {\n        match self {\n            Self::High =\u003e \"High\",\n            Self::Max =\u003e \"Max\",\n        }\n    }\n\n    pub(crate) const fn description(self) -\u003e \u0026'static str {\n        match self {\n            Self::High =\u003e \"Default DeepSeek thinking effort.\",\n            Self::Max =\u003e \"Maximum DeepSeek thinking effort for complex agent work.\",\n        }\n    }\n\n    pub(crate) fn from_value_id(value: \u0026SessionConfigValueId) -\u003e Option\u003cSelf\u003e {\n        match value.0.as_ref() {\n            REASONING_EFFORT_HIGH_ID =\u003e Some(Self::High),\n            REASONING_EFFORT_MAX_ID =\u003e Some(Self::Max),\n            _ =\u003e None,\n        }\n    }\n}\n\n/// Ask the client (or fall back to posture) whether a tool call is allowed.\n///\n/// # Errors\n///\n/// Returns an ACP error when the session is unknown, the permission request\n/// cannot be sent, or the client returns an unrecognized outcome.\npub(crate) async fn request_tool_permission(\n    store: \u0026SessionStore,\n    context: \u0026ToolContext,\n    call: \u0026DeepSeekToolCall,\n    kind: ToolKind,\n    requester: \u0026dyn PermissionRequester,\n) -\u003e Result\u003cPermissionDecision, agent_client_protocol::Error\u003e {\n    if store.is_always_allowed(\u0026context.session_id, call.name())? {\n        return Ok(PermissionDecision::AllowAlways);\n    }\n\n    let posture = store.permission_posture(\u0026context.session_id)?;\n\n    if posture.allows_without_prompt(kind) {\n        return Ok(PermissionDecision::AllowByMode);\n    }\n\n    let request = RequestPermissionRequest::new(\n        context.session_id.clone(),\n        ToolCallUpdate::new(\n            call.id().to_string(),\n            ToolCallUpdateFields::new()\n                .kind(kind)\n                .status(ToolCallStatus::Pending)\n                .title(call.name().to_string())\n                .raw_input(tool_raw_input(call)),\n        ),\n        permission_options(),\n    );\n\n    let response = requester.request_permission(request).await?;\n    let decision = match response.outcome {\n        RequestPermissionOutcome::Cancelled =\u003e PermissionDecision::Cancelled,\n        RequestPermissionOutcome::Selected(selected) =\u003e match selected.option_id.0.as_ref() {\n            PERMISSION_ALLOW_ONCE_OPTION_ID =\u003e PermissionDecision::AllowOnce,\n            PERMISSION_ALLOW_ALWAYS_OPTION_ID =\u003e PermissionDecision::AllowAlways,\n            PERMISSION_REJECT_ONCE_OPTION_ID =\u003e PermissionDecision::RejectOnce,\n            PERMISSION_REJECT_ALWAYS_OPTION_ID =\u003e PermissionDecision::RejectAlways,\n            other =\u003e {\n                return Err(agent_client_protocol::Error::invalid_params()\n                    .data(format!(\"unknown permission option selected: {other}\")));\n            }\n        },\n        _ =\u003e {\n            return Err(agent_client_protocol::Error::invalid_params()\n                .data(\"unsupported permission outcome variant\"));\n        }\n    };\n\n    if decision == PermissionDecision::AllowAlways {\n        store.add_always_allow(\u0026context.session_id, call.name().to_string())?;\n    }\n\n    Ok(decision)\n}\n\nfn permission_options() -\u003e Vec\u003cPermissionOption\u003e {\n    vec![\n        PermissionOption::new(\n            PERMISSION_ALLOW_ONCE_OPTION_ID,\n            \"Allow once\",\n            PermissionOptionKind::AllowOnce,\n        ),\n        PermissionOption::new(\n            PERMISSION_ALLOW_ALWAYS_OPTION_ID,\n            \"Allow always\",\n            PermissionOptionKind::AllowAlways,\n        ),\n        PermissionOption::new(\n            PERMISSION_REJECT_ONCE_OPTION_ID,\n            \"Reject once\",\n            PermissionOptionKind::RejectOnce,\n        ),\n        PermissionOption::new(\n            PERMISSION_REJECT_ALWAYS_OPTION_ID,\n            \"Reject always\",\n            PermissionOptionKind::RejectAlways,\n        ),\n    ]\n}\n\n#[derive(Debug, Default)]\npub(crate) struct PendingToolCalls {\n    calls: Vec\u003cPendingToolCall\u003e,\n}\n\nimpl PendingToolCalls {\n    pub(crate) fn push(\u0026mut self, delta: \u0026ToolCallDelta) {\n        let index = delta.index();\n        while self.calls.len() \u003c= index {\n            self.calls.push(PendingToolCall::default());\n        }\n\n        if let Some(call) = self.calls.get_mut(index) {\n            if let Some(id) = delta.id() {\n                call.id = Some(id.to_string());\n            }\n            if let Some(name) = delta.name() {\n                call.name = Some(name.to_string());\n            }\n            if let Some(arguments) = delta.arguments() {\n                call.arguments.push_str(arguments);\n            }\n        }\n    }\n\n    pub(crate) fn finish(self) -\u003e Result\u003cVec\u003cDeepSeekToolCall\u003e, agent_client_protocol::Error\u003e {\n        self.calls\n            .into_iter()\n            .enumerate()\n            .map(|(index, call)| call.finish(index))\n            .collect()\n    }\n}\n\n#[derive(Debug, Default)]\nstruct PendingToolCall {\n    id: Option\u003cString\u003e,\n    name: Option\u003cString\u003e,\n    arguments: String,\n}\n\nimpl PendingToolCall {\n    fn finish(self, index: usize) -\u003e Result\u003cDeepSeekToolCall, agent_client_protocol::Error\u003e {\n        let id = self.id.ok_or_else(|| {\n            agent_client_protocol::Error::invalid_params()\n                .data(format!(\"tool call delta {index} is missing an id\"))\n        })?;\n        let name = self.name.ok_or_else(|| {\n            agent_client_protocol::Error::invalid_params().data(format!(\n                \"tool call delta {index} is missing a function name\"\n            ))\n        })?;\n\n        Ok(DeepSeekToolCall::new(id, name, self.arguments))\n    }\n}\n\npub(crate) fn default_session_modes() -\u003e SessionModeState {\n    SessionModeState::new(\n        PermissionPosture::Ask.mode_id(),\n        vec![\n            SessionMode::new(PermissionPosture::Ask.mode_id(), \"Ask\"),\n            SessionMode::new(PermissionPosture::AcceptEdits.mode_id(), \"Accept edits\"),\n            SessionMode::new(PermissionPosture::Yolo.mode_id(), \"Yolo\"),\n        ],\n    )\n}\n\npub(crate) fn session_config_options(session: \u0026SessionRecord) -\u003e Vec\u003cSessionConfigOption\u003e {\n    vec![\n        SessionConfigOption::select(\n            SESSION_CONFIG_MODE_ID,\n            \"Approval Preset\",\n            session.mode.mode_id().0,\n            session_mode_select_options(),\n        )\n        .category(SessionConfigOptionCategory::Mode)\n        .description(\"Choose how the adapter requests permission for tools.\"),\n        SessionConfigOption::select(\n            SESSION_CONFIG_MODEL_ID,\n            \"Model\",\n            session.model.clone(),\n            model_select_options(session.model.as_str()),\n        )\n        .category(SessionConfigOptionCategory::Model)\n        .description(\"Choose which DeepSeek model the adapter should use.\"),\n        SessionConfigOption::select(\n            SESSION_CONFIG_REASONING_EFFORT_ID,\n            \"Reasoning Effort\",\n            session.reasoning_effort.id(),\n            reasoning_effort_select_options(),\n        )\n        .category(SessionConfigOptionCategory::ThoughtLevel)\n        .description(\"Choose how much DeepSeek thinking effort to request.\"),\n    ]\n}\n\nfn session_mode_select_options() -\u003e Vec\u003cSessionConfigSelectOption\u003e {\n    default_session_modes()\n        .available_modes\n        .into_iter()\n        .map(|mode| SessionConfigSelectOption::new(mode.id.0, mode.name))\n        .collect()\n}\n\npub(crate) fn model_select_options(current_model: \u0026str) -\u003e Vec\u003cSessionConfigSelectOption\u003e {\n    let mut options = Vec::new();\n    if !is_known_model(current_model) {\n        options.push(\n            SessionConfigSelectOption::new(current_model.to_string(), current_model.to_string())\n                .description(\"Current model from DEEPSEEK_MODEL.\"),\n        );\n    }\n\n    options.extend([\n        SessionConfigSelectOption::new(DEEPSEEK_V4_PRO_MODEL_ID, \"DeepSeek V4 Pro\")\n            .description(\"DeepSeek V4 Pro thinking model.\"),\n        SessionConfigSelectOption::new(DEEPSEEK_V4_FLASH_MODEL_ID, \"DeepSeek V4 Flash\")\n            .description(\"DeepSeek V4 Flash model.\"),\n    ]);\n\n    options\n}\n\nfn reasoning_effort_select_options() -\u003e Vec\u003cSessionConfigSelectOption\u003e {\n    [ReasoningEffort::High, ReasoningEffort::Max]\n        .into_iter()\n        .map(|effort| {\n            SessionConfigSelectOption::new(effort.id(), effort.name())\n                .description(effort.description())\n        })\n        .collect()\n}\n\npub(crate) fn validate_session_model(\n    session: \u0026SessionRecord,\n    model: \u0026str,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    if is_known_model(model) || model == session.model {\n        return Ok(());\n    }\n\n    Err(agent_client_protocol::Error::invalid_params()\n        .data(format!(\"unsupported DeepSeek model: {model}\")))\n}\n\nfn is_known_model(model: \u0026str) -\u003e bool {\n    matches!(model, DEEPSEEK_V4_PRO_MODEL_ID | DEEPSEEK_V4_FLASH_MODEL_ID)\n}\n\npub(crate) fn initial_model_from_env() -\u003e String {\n    std::env::var(\"DEEPSEEK_MODEL\")\n        .ok()\n        .map(|value| value.trim().to_string())\n        .filter(|value| !value.is_empty())\n        .unwrap_or_else(|| DeepSeekConfig::DEFAULT_MODEL.to_string())\n}\n\n#[derive(Debug)]\npub(crate) struct AdapterState {\n    pub(crate) default_model: String,\n    pub(crate) client_capabilities: Option\u003cClientCapabilities\u003e,\n    pub(crate) sessions: HashMap\u003cSessionId, SessionRecord\u003e,\n}\n\nimpl AdapterState {\n    pub(crate) fn new(default_model: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            default_model: default_model.into(),\n            client_capabilities: None,\n            sessions: HashMap::new(),\n        }\n    }\n}\n\nimpl Default for AdapterState {\n    fn default() -\u003e Self {\n        Self::new(DeepSeekConfig::DEFAULT_MODEL)\n    }\n}\n\n#[derive(Debug, Default)]\npub(crate) struct SessionRecord {\n    pub(crate) cwd: PathBuf,\n    pub(crate) additional_directories: Vec\u003cPathBuf\u003e,\n    pub(crate) history: Vec\u003cChatMessage\u003e,\n    pub(crate) active_turn: Option\u003cCancellationToken\u003e,\n    pub(crate) mode: PermissionPosture,\n    pub(crate) model: String,\n    pub(crate) reasoning_effort: ReasoningEffort,\n    pub(crate) permission_allow_always: HashSet\u003cString\u003e,\n    pub(crate) mcp_servers: Vec\u003cMcpServer\u003e,\n    pub(crate) mcp_sessions: Vec\u003cMcpSession\u003e,\n}\n\n/// Narrow boundary around shared adapter state.\n///\n/// `SessionStore` wraps the internal `Arc\u003cMutex\u003cAdapterState\u003e\u003e` and exposes\n/// targeted methods for session lifecycle, config, permission cache, and\n/// active-turn management. Application code uses `SessionStore` directly\n/// instead of passing raw `Arc\u003cMutex\u003cAdapterState\u003e\u003e` through every layer.\n#[derive(Debug, Clone)]\npub(crate) struct SessionStore {\n    pub(crate) state: Arc\u003cMutex\u003cAdapterState\u003e\u003e,\n    persistence: Option\u003cFilesystemSessionStore\u003e,\n}\n\n/// Snapshot of session data needed to begin a prompt turn.\n///\n/// Returned by [`SessionStore::begin_turn`] so the caller does not need to\n/// hold the lock across model streaming.\n#[derive(Debug)]\npub(crate) struct TurnSetup {\n    pub(crate) messages: Vec\u003cChatMessage\u003e,\n    pub(crate) tool_context: ToolContext,\n    pub(crate) model: String,\n    pub(crate) reasoning_effort: ReasoningEffort,\n}\n\nimpl SessionStore {\n    /// Wrap an existing `Arc\u003cMutex\u003cAdapterState\u003e\u003e` in a `SessionStore`.\n    pub(crate) fn new(state: Arc\u003cMutex\u003cAdapterState\u003e\u003e) -\u003e Self {\n        Self {\n            state,\n            persistence: None,\n        }\n    }\n\n    /// Attach filesystem persistence to the session store.\n    pub(crate) fn with_persistence(mut self, persistence: FilesystemSessionStore) -\u003e Self {\n        self.persistence = Some(persistence);\n        self\n    }\n\n    /// Load a persisted session record from the filesystem store.\n    pub(crate) fn load_persisted_record(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003cPersistedSessionRecord, agent_client_protocol::Error\u003e {\n        let Some(persistence) = \u0026self.persistence else {\n            return Err(agent_client_protocol::Error::invalid_request()\n                .data(\"session/load requires filesystem persistence\"));\n        };\n\n        persistence\n            .load_record(session_id.0.as_ref())\n            .map_err(agent_client_protocol::Error::into_internal_error)\n    }\n\n    /// Store the client capabilities reported during initialization.\n    pub(crate) fn record_client_capabilities(\n        \u0026self,\n        client_capabilities: ClientCapabilities,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let mut guard = self\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        guard.client_capabilities = Some(client_capabilities);\n        Ok(())\n    }\n\n    /// Return a snapshot of matching sessions for the `session/list` handler.\n    pub(crate) fn list_sessions(\n        \u0026self,\n        cwd_filter: Option\u003c\u0026Path\u003e,\n    ) -\u003e Result\u003cVec\u003cSessionInfo\u003e, agent_client_protocol::Error\u003e {\n        let (mut sessions, persistence) = {\n            let guard = self\n                .state\n                .lock()\n                .map_err(agent_client_protocol::Error::into_internal_error)?;\n            (\n                guard\n                    .sessions\n                    .iter()\n                    .filter(|(_session_id, record)| cwd_filter.is_none_or(|cwd| record.cwd == cwd))\n                    .map(|(session_id, record)| {\n                        SessionInfo::new(session_id.clone(), record.cwd.clone())\n                            .additional_directories(record.additional_directories.clone())\n                    })\n                    .collect::\u003cVec\u003c_\u003e\u003e(),\n                self.persistence.clone(),\n            )\n        };\n\n        if let (Some(persistence), Some(cwd)) = (persistence, cwd_filter) {\n            for persisted in persistence\n                .list_persisted(cwd)\n                .map_err(agent_client_protocol::Error::into_internal_error)?\n            {\n                if !sessions\n                    .iter()\n                    .any(|session| session.session_id == persisted.session_id)\n                {\n                    sessions.push(persisted);\n                }\n            }\n        }\n\n        Ok(sessions)\n    }\n\n    /// Remove a session by id. Returns `true` if the session existed.\n    pub(crate) fn remove_session(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003cbool, agent_client_protocol::Error\u003e {\n        let mut guard = self\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        Ok(guard.sessions.remove(session_id).is_some())\n    }\n\n    /// Insert a new session record.\n    pub(crate) fn insert_session(\n        \u0026self,\n        session_id: SessionId,\n        record: SessionRecord,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let mut guard = self\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        guard.sessions.insert(session_id, record);\n        Ok(())\n    }\n\n    /// Return the default model identifier for new sessions.\n    pub(crate) fn default_model(\u0026self) -\u003e Result\u003cString, agent_client_protocol::Error\u003e {\n        let guard = self\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        Ok(guard.default_model.clone())\n    }\n\n    /// Look up a session and return a read-only reference via a callback.\n    ///\n    /// The lock is held only for the duration of the callback.\n    pub(crate) fn with_session\u003cT\u003e(\n        \u0026self,\n        session_id: \u0026SessionId,\n        f: impl FnOnce(\u0026SessionRecord) -\u003e Result\u003cT, agent_client_protocol::Error\u003e,\n    ) -\u003e Result\u003cT, agent_client_protocol::Error\u003e {\n        let guard = self\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let session = guard.sessions.get(session_id).ok_or_else(|| {\n            agent_client_protocol::Error::invalid_params()\n                .data(format!(\"unknown session id: {}\", session_id.0))\n        })?;\n        f(session)\n    }\n\n    /// Look up a session and invoke a callback with a mutable reference.\n    ///\n    /// The lock is held only for the duration of the callback.\n    pub(crate) fn with_session_mut\u003cT\u003e(\n        \u0026self,\n        session_id: \u0026SessionId,\n        f: impl FnOnce(\u0026mut SessionRecord) -\u003e Result\u003cT, agent_client_protocol::Error\u003e,\n    ) -\u003e Result\u003cT, agent_client_protocol::Error\u003e {\n        let mut guard = self\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let session = guard.sessions.get_mut(session_id).ok_or_else(|| {\n            agent_client_protocol::Error::invalid_params()\n                .data(format!(\"unknown session id: {}\", session_id.0))\n        })?;\n        f(session)\n    }\n\n    /// Return the MCP tool definitions registered for a session.\n    pub(crate) fn mcp_definitions(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003cVec\u003cToolDefinition\u003e, agent_client_protocol::Error\u003e {\n        self.with_session(session_id, |session| {\n            Ok(session\n                .mcp_sessions\n                .iter()\n                .flat_map(|mcp| mcp.tools.iter().map(|tool| tool.definition.clone()))\n                .collect())\n        })\n    }\n\n    /// Find the MCP tool target for an exposed tool name within a session.\n    pub(crate) fn find_mcp_target(\n        \u0026self,\n        session_id: \u0026SessionId,\n        exposed_name: \u0026str,\n    ) -\u003e Result\u003cOption\u003cMcpToolTarget\u003e, agent_client_protocol::Error\u003e {\n        self.with_session(session_id, |session| {\n            Ok(session.mcp_sessions.iter().find_map(|mcp_session| {\n                mcp_session.tools.iter().find_map(|tool| {\n                    if tool.exposed_name == exposed_name {\n                        Some(McpToolTarget {\n                            server_name: mcp_session.name.clone(),\n                            original_name: tool.original_name.clone(),\n                            peer: mcp_session.peer.clone(),\n                        })\n                    } else {\n                        None\n                    }\n                })\n            }))\n        })\n    }\n\n    /// Check whether a tool name is in the session's allow-always cache.\n    pub(crate) fn is_always_allowed(\n        \u0026self,\n        session_id: \u0026SessionId,\n        tool_name: \u0026str,\n    ) -\u003e Result\u003cbool, agent_client_protocol::Error\u003e {\n        self.with_session(session_id, |session| {\n            Ok(session.permission_allow_always.contains(tool_name))\n        })\n    }\n\n    /// Return the current permission posture (mode) for a session.\n    pub(crate) fn permission_posture(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003cPermissionPosture, agent_client_protocol::Error\u003e {\n        self.with_session(session_id, |session| Ok(session.mode))\n    }\n\n    /// Insert a tool name into the session's allow-always cache.\n    pub(crate) fn add_always_allow(\n        \u0026self,\n        session_id: \u0026SessionId,\n        tool_name: String,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        self.with_session_mut(session_id, |session| {\n            session.permission_allow_always.insert(tool_name);\n            Ok(())\n        })\n    }\n\n    /// Cancel the active turn token for a session, if one exists.\n    pub(crate) fn cancel_active_turn(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        self.with_session(session_id, |session| {\n            if let Some(token) = \u0026session.active_turn {\n                token.cancel();\n            }\n            Ok(())\n        })\n    }\n\n    /// Clear the active turn token for a session.\n    pub(crate) fn clear_active_turn(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        self.with_session_mut(session_id, |session| {\n            session.active_turn = None;\n            Ok(())\n        })\n    }\n\n    /// Set the permission posture (mode) for a session.\n    pub(crate) fn set_mode(\n        \u0026self,\n        session_id: \u0026SessionId,\n        mode: PermissionPosture,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        self.with_session_mut(session_id, |session| {\n            session.mode = mode;\n            Ok(())\n        })\n    }\n\n    /// Set the model for a session.\n    pub(crate) fn set_model(\n        \u0026self,\n        session_id: \u0026SessionId,\n        model: String,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        self.with_session_mut(session_id, |session| {\n            session.model = model;\n            Ok(())\n        })\n    }\n\n    /// Set the reasoning effort for a session.\n    pub(crate) fn set_reasoning_effort(\n        \u0026self,\n        session_id: \u0026SessionId,\n        effort: ReasoningEffort,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        self.with_session_mut(session_id, |session| {\n            session.reasoning_effort = effort;\n            Ok(())\n        })\n    }\n\n    /// Prepare a session for a new prompt turn.\n    ///\n    /// Sets the active turn token atomically and returns the messages, tool\n    /// context, model, and reasoning effort the caller needs. Returns an error\n    /// if a turn is already active.\n    pub(crate) fn begin_turn(\n        \u0026self,\n        session_id: \u0026SessionId,\n        token: CancellationToken,\n        user_message: ChatMessage,\n    ) -\u003e Result\u003cTurnSetup, agent_client_protocol::Error\u003e {\n        let mut guard = self\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let client_capabilities = guard.client_capabilities.clone();\n        let session = guard.sessions.get_mut(session_id).ok_or_else(|| {\n            agent_client_protocol::Error::invalid_params()\n                .data(format!(\"unknown session id: {}\", session_id.0))\n        })?;\n\n        if session.active_turn.is_some() {\n            return Err(\n                agent_client_protocol::Error::invalid_request().data(format!(\n                    \"session {} already has an active turn\",\n                    session_id.0\n                )),\n            );\n        }\n        session.active_turn = Some(token);\n\n        let mut messages = session.history.clone();\n        messages.push(user_message);\n        Ok(TurnSetup {\n            messages,\n            tool_context: ToolContext {\n                session_id: session_id.clone(),\n                cwd: session.cwd.clone(),\n                additional_directories: session.additional_directories.clone(),\n                client_capabilities,\n            },\n            model: session.model.clone(),\n            reasoning_effort: session.reasoning_effort,\n        })\n    }\n\n    /// Persist the messages as the session history after a turn completes.\n    pub(crate) fn save_history(\n        \u0026self,\n        session_id: \u0026SessionId,\n        messages: Vec\u003cChatMessage\u003e,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let (persistence, meta, new_messages) = {\n            let guard = self\n                .state\n                .lock()\n                .map_err(agent_client_protocol::Error::into_internal_error)?;\n            let session = guard.sessions.get(session_id).ok_or_else(|| {\n                agent_client_protocol::Error::invalid_params()\n                    .data(format!(\"unknown session id: {}\", session_id.0))\n            })?;\n            let previous_len = session.history.len();\n            let new_messages = messages\n                .iter()\n                .skip(previous_len)\n                .cloned()\n                .collect::\u003cVec\u003c_\u003e\u003e();\n            (\n                self.persistence.clone(),\n                PersistedSessionMeta {\n                    session_id: session_id.0.to_string(),\n                    cwd: session.cwd.clone(),\n                    additional_directories: session.additional_directories.clone(),\n                    mode: session.mode,\n                    model: session.model.clone(),\n                    reasoning_effort: session.reasoning_effort,\n                    mcp_servers: session.mcp_servers.clone(),\n                },\n                new_messages,\n            )\n        };\n\n        if let Some(persistence) = persistence {\n            persistence\n                .persist_turn(\u0026meta, \u0026new_messages)\n                .map_err(agent_client_protocol::Error::into_internal_error)?;\n        }\n\n        self.with_session_mut(session_id, |session| {\n            session.history = messages;\n            Ok(())\n        })\n    }\n\n    /// Return the session config options for a session.\n    pub(crate) fn session_config_options(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003cVec\u003cSessionConfigOption\u003e, agent_client_protocol::Error\u003e {\n        self.with_session(session_id, |session| Ok(session_config_options(session)))\n    }\n\n    /// Look up a session record for a new-session response.\n    pub(crate) fn lookup_session(\n        \u0026self,\n        session_id: \u0026SessionId,\n    ) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        self.with_session(session_id, |_session| Ok(()))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{\n        PendingToolCalls, PermissionDecision, PermissionPosture, ReasoningEffort,\n        SESSION_CONFIG_MODE_ID, SESSION_CONFIG_MODEL_ID, SESSION_CONFIG_REASONING_EFFORT_ID,\n    };\n    use agent_client_protocol::schema::{SessionConfigOptionCategory, SessionModeId};\n\n    #[test]\n    fn permission_decision_debug_impl_is_callable() {\n        let decisions = [\n            PermissionDecision::AllowOnce,\n            PermissionDecision::AllowAlways,\n            PermissionDecision::AllowByMode,\n            PermissionDecision::RejectOnce,\n            PermissionDecision::RejectAlways,\n            PermissionDecision::Cancelled,\n        ];\n        for decision in \u0026decisions {\n            let _ = format!(\"{decision:?}\");\n        }\n    }\n\n    #[test]\n    fn reasoning_effort_name_and_description() {\n        assert_eq!(ReasoningEffort::High.name(), \"High\");\n        assert_eq!(ReasoningEffort::Max.name(), \"Max\");\n        assert!(\n            ReasoningEffort::High\n                .description()\n                .contains(\"Default DeepSeek\")\n        );\n        assert!(\n            ReasoningEffort::Max\n                .description()\n                .contains(\"Maximum DeepSeek\")\n        );\n    }\n\n    #[test]\n    fn reasoning_effort_from_value_id_rejects_unknown() {\n        assert!(\n            ReasoningEffort::from_value_id(\n                \u0026agent_client_protocol::schema::SessionConfigValueId::new(\"bogus\",)\n            )\n            .is_none()\n        );\n    }\n\n    #[test]\n    fn pending_tool_calls_require_complete_metadata() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        use deepseek_acp_adapter::deepseek::ToolCallDelta;\n\n        let mut missing_id = PendingToolCalls::default();\n        missing_id.push(\u0026ToolCallDelta::new(\n            1,\n            None,\n            Some(\"echo\".to_string()),\n            Some(\"{}\".to_string()),\n        ));\n        let Err(error) = missing_id.finish() else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected missing tool call id to fail\"));\n        };\n        assert!(error.to_string().contains(\"missing an id\"));\n\n        let mut missing_name = PendingToolCalls::default();\n        missing_name.push(\u0026ToolCallDelta::new(\n            0,\n            Some(\"call-1\".to_string()),\n            None,\n            Some(\"{}\".to_string()),\n        ));\n        let Err(error) = missing_name.finish() else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected missing tool call name to fail\"));\n        };\n        assert!(error.to_string().contains(\"missing a function name\"));\n\n        Ok(())\n    }\n\n    #[test]\n    fn permission_posture_helpers_cover_all_branches() {\n        use crate::mcp::{is_mcp_tool_name, mcp_tool_kind};\n        use agent_client_protocol::schema::ToolKind;\n\n        assert_eq!(PermissionPosture::Ask.mode_id().0.as_ref(), \"ask\");\n        assert_eq!(\n            PermissionPosture::AcceptEdits.mode_id().0.as_ref(),\n            \"accept-edits\"\n        );\n        assert_eq!(PermissionPosture::Yolo.mode_id().0.as_ref(), \"yolo\");\n        assert_eq!(\n            PermissionPosture::from_mode_id(\u0026SessionModeId::new(\"ask\")),\n            Some(PermissionPosture::Ask)\n        );\n        assert_eq!(\n            PermissionPosture::from_mode_id(\u0026SessionModeId::new(\"accept-edits\")),\n            Some(PermissionPosture::AcceptEdits)\n        );\n        assert_eq!(\n            PermissionPosture::from_mode_id(\u0026SessionModeId::new(\"yolo\")),\n            Some(PermissionPosture::Yolo)\n        );\n        assert_eq!(\n            PermissionPosture::from_mode_id(\u0026SessionModeId::new(\"bogus\")),\n            None\n        );\n        assert!(!PermissionPosture::Ask.allows_without_prompt(ToolKind::Edit));\n        assert!(PermissionPosture::AcceptEdits.allows_without_prompt(ToolKind::Edit));\n        assert!(!PermissionPosture::AcceptEdits.allows_without_prompt(ToolKind::Execute));\n        assert!(PermissionPosture::Yolo.allows_without_prompt(ToolKind::Execute));\n        assert!(!PermissionPosture::Yolo.allows_without_prompt(ToolKind::Read));\n        assert!(is_mcp_tool_name(\"mcp__server__tool\"));\n        assert_eq!(mcp_tool_kind(), ToolKind::Execute);\n    }\n\n    // suppress unused import warnings for the consts we bring in for completeness\n    #[allow(dead_code)]\n    const _: \u0026str = SESSION_CONFIG_MODE_ID;\n    #[allow(dead_code)]\n    const _: \u0026str = SESSION_CONFIG_MODEL_ID;\n    #[allow(dead_code)]\n    const _: \u0026str = SESSION_CONFIG_REASONING_EFFORT_ID;\n    #[allow(dead_code)]\n    const _: Option\u003cSessionConfigOptionCategory\u003e = None;\n}\n","traces":[{"line":390,"address":[],"length":0,"stats":{"Line":0}},{"line":392,"address":[],"length":0,"stats":{"Line":0}},{"line":394,"address":[],"length":0,"stats":{"Line":0}},{"line":570,"address":[],"length":0,"stats":{"Line":0}},{"line":571,"address":[],"length":0,"stats":{"Line":0}},{"line":573,"address":[],"length":0,"stats":{"Line":0}},{"line":574,"address":[],"length":0,"stats":{"Line":0}},{"line":575,"address":[],"length":0,"stats":{"Line":0}},{"line":576,"address":[],"length":0,"stats":{"Line":0}},{"line":578,"address":[],"length":0,"stats":{"Line":0}},{"line":589,"address":[],"length":0,"stats":{"Line":0}},{"line":590,"address":[],"length":0,"stats":{"Line":0}},{"line":592,"address":[],"length":0,"stats":{"Line":0}},{"line":593,"address":[],"length":0,"stats":{"Line":0}},{"line":594,"address":[],"length":0,"stats":{"Line":0}},{"line":595,"address":[],"length":0,"stats":{"Line":0}},{"line":597,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":17},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","session_store.rs"],"content":"//! Filesystem-backed session persistence.\n\nuse std::fs::{self, File, OpenOptions};\nuse std::io::{BufRead, BufReader, Write};\nuse std::path::{Path, PathBuf};\n\nuse agent_client_protocol::schema::{McpServer, SessionId, SessionInfo};\nuse deepseek_acp_adapter::deepseek::ChatMessage;\nuse serde::{Deserialize, Serialize};\n\nuse crate::{PermissionPosture, ReasoningEffort};\n\nconst SESSIONS_DIR: \u0026str = \"sessions\";\nconst META_FILE: \u0026str = \"meta.json\";\nconst HISTORY_FILE: \u0026str = \"history.jsonl\";\nconst APPLICATION_STATE_DIR: \u0026str = \"deepseek-acp-adapter\";\n\n/// Filesystem-backed persistence for ACP session metadata and chat history.\n#[derive(Debug, Clone)]\npub(crate) struct FilesystemSessionStore {\n    state_dir: PathBuf,\n}\n\n/// Persisted metadata for one ACP session.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub(crate) struct PersistedSessionMeta {\n    /// ACP session id.\n    pub(crate) session_id: String,\n    /// Session working directory.\n    pub(crate) cwd: PathBuf,\n    /// Additional directories available to the session.\n    pub(crate) additional_directories: Vec\u003cPathBuf\u003e,\n    /// Permission mode active for the session.\n    pub(crate) mode: PermissionPosture,\n    /// Model selected for the session.\n    pub(crate) model: String,\n    /// `DeepSeek` reasoning effort selected for the session.\n    pub(crate) reasoning_effort: ReasoningEffort,\n    /// MCP servers originally attached to the session.\n    pub(crate) mcp_servers: Vec\u003cMcpServer\u003e,\n}\n\n/// Persisted session metadata plus replayable chat history.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub(crate) struct PersistedSessionRecord {\n    /// Metadata loaded from `meta.json`.\n    pub(crate) meta: PersistedSessionMeta,\n    /// Chat messages loaded from `history.jsonl`.\n    pub(crate) history: Vec\u003cChatMessage\u003e,\n}\n\n/// Error returned by filesystem session persistence.\n#[derive(Debug, thiserror::Error)]\npub(crate) enum SessionPersistenceError {\n    /// The host environment does not expose a usable state directory.\n    #[error(\"failed to resolve state directory: {0}\")]\n    StateDir(String),\n    /// The session id cannot be represented as a safe path component.\n    #[error(\"invalid persisted session id: {0}\")]\n    InvalidSessionId(String),\n    /// Filesystem I/O failed.\n    #[error(\"filesystem session store I/O failed: {0}\")]\n    Io(#[from] std::io::Error),\n    /// JSON encoding or decoding failed.\n    #[error(\"filesystem session store JSON failed: {0}\")]\n    Json(#[from] serde_json::Error),\n}\n\nimpl FilesystemSessionStore {\n    /// Create a store rooted at `state_dir`.\n    pub(crate) fn new(state_dir: impl Into\u003cPathBuf\u003e) -\u003e Self {\n        Self {\n            state_dir: state_dir.into(),\n        }\n    }\n\n    /// Create a store rooted under `XDG_STATE_HOME` or `$HOME/.local/state`.\n    pub(crate) fn from_default_state_dir() -\u003e Result\u003cSelf, SessionPersistenceError\u003e {\n        Ok(Self::new(default_state_dir()?))\n    }\n\n    /// Append a completed turn's new messages and refresh session metadata.\n    pub(crate) fn persist_turn(\n        \u0026self,\n        meta: \u0026PersistedSessionMeta,\n        messages: \u0026[ChatMessage],\n    ) -\u003e Result\u003c(), SessionPersistenceError\u003e {\n        let session_dir = self.session_dir(\u0026meta.session_id)?;\n        fs::create_dir_all(\u0026session_dir)?;\n        Self::write_meta(\u0026session_dir, meta)?;\n        Self::append_history(\u0026session_dir, messages)?;\n        Ok(())\n    }\n\n    /// Load one persisted session record by id.\n    pub(crate) fn load_record(\n        \u0026self,\n        session_id: \u0026str,\n    ) -\u003e Result\u003cPersistedSessionRecord, SessionPersistenceError\u003e {\n        let session_dir = self.session_dir(session_id)?;\n        let meta = Self::read_meta(\u0026session_dir)?;\n        let history = Self::read_history(\u0026session_dir)?;\n        Ok(PersistedSessionRecord { meta, history })\n    }\n\n    /// List persisted sessions whose working directory exactly matches `cwd`.\n    pub(crate) fn list_persisted(\n        \u0026self,\n        cwd: \u0026Path,\n    ) -\u003e Result\u003cVec\u003cSessionInfo\u003e, SessionPersistenceError\u003e {\n        let sessions_dir = self.state_dir.join(SESSIONS_DIR);\n        if !sessions_dir.exists() {\n            return Ok(Vec::new());\n        }\n\n        let mut sessions = Vec::new();\n        for entry in fs::read_dir(sessions_dir)? {\n            let entry = entry?;\n            if !entry.file_type()?.is_dir() {\n                continue;\n            }\n            let meta = Self::read_meta(\u0026entry.path())?;\n            if meta.cwd == cwd {\n                sessions.push(\n                    SessionInfo::new(SessionId::new(meta.session_id), meta.cwd)\n                        .additional_directories(meta.additional_directories),\n                );\n            }\n        }\n        Ok(sessions)\n    }\n\n    fn session_dir(\u0026self, session_id: \u0026str) -\u003e Result\u003cPathBuf, SessionPersistenceError\u003e {\n        validate_session_id(session_id)?;\n        Ok(self.state_dir.join(SESSIONS_DIR).join(session_id))\n    }\n\n    fn write_meta(\n        session_dir: \u0026Path,\n        meta: \u0026PersistedSessionMeta,\n    ) -\u003e Result\u003c(), SessionPersistenceError\u003e {\n        let tmp_path = session_dir.join(\"meta.json.tmp\");\n        let mut file = File::create(\u0026tmp_path)?;\n        serde_json::to_writer_pretty(\u0026mut file, meta)?;\n        file.write_all(b\"\\n\")?;\n        file.sync_all()?;\n        fs::rename(tmp_path, session_dir.join(META_FILE))?;\n        Ok(())\n    }\n\n    fn append_history(\n        session_dir: \u0026Path,\n        messages: \u0026[ChatMessage],\n    ) -\u003e Result\u003c(), SessionPersistenceError\u003e {\n        if messages.is_empty() {\n            return Ok(());\n        }\n\n        let mut file = OpenOptions::new()\n            .create(true)\n            .append(true)\n            .open(session_dir.join(HISTORY_FILE))?;\n        for message in messages {\n            serde_json::to_writer(\u0026mut file, message)?;\n            file.write_all(b\"\\n\")?;\n        }\n        file.flush()?;\n        Ok(())\n    }\n\n    fn read_meta(session_dir: \u0026Path) -\u003e Result\u003cPersistedSessionMeta, SessionPersistenceError\u003e {\n        let file = File::open(session_dir.join(META_FILE))?;\n        Ok(serde_json::from_reader(file)?)\n    }\n\n    fn read_history(session_dir: \u0026Path) -\u003e Result\u003cVec\u003cChatMessage\u003e, SessionPersistenceError\u003e {\n        let path = session_dir.join(HISTORY_FILE);\n        if !path.exists() {\n            return Ok(Vec::new());\n        }\n\n        let file = File::open(path)?;\n        let reader = BufReader::new(file);\n        let mut messages = Vec::new();\n        for line in reader.lines() {\n            let line = line?;\n            if line.trim().is_empty() {\n                continue;\n            }\n            messages.push(serde_json::from_str(\u0026line)?);\n        }\n        Ok(messages)\n    }\n}\n\nfn default_state_dir() -\u003e Result\u003cPathBuf, SessionPersistenceError\u003e {\n    if let Some(path) = std::env::var_os(\"XDG_STATE_HOME\") {\n        return Ok(PathBuf::from(path).join(APPLICATION_STATE_DIR));\n    }\n\n    let Some(home) = std::env::var_os(\"HOME\") else {\n        return Err(SessionPersistenceError::StateDir(\n            \"neither XDG_STATE_HOME nor HOME is set\".to_string(),\n        ));\n    };\n\n    Ok(PathBuf::from(home)\n        .join(\".local\")\n        .join(\"state\")\n        .join(APPLICATION_STATE_DIR))\n}\n\nfn validate_session_id(session_id: \u0026str) -\u003e Result\u003c(), SessionPersistenceError\u003e {\n    let valid = !session_id.is_empty()\n        \u0026\u0026 session_id\n            .bytes()\n            .all(|byte| byte.is_ascii_alphanumeric() || matches!(byte, b'-' | b'_'));\n\n    if valid {\n        Ok(())\n    } else {\n        Err(SessionPersistenceError::InvalidSessionId(\n            session_id.to_string(),\n        ))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{FilesystemSessionStore, PersistedSessionMeta};\n    use crate::{PermissionPosture, ReasoningEffort};\n    use agent_client_protocol::schema::SessionId;\n    use deepseek_acp_adapter::deepseek::ChatMessage;\n    use uuid::Uuid;\n\n    #[test_log::test]\n    fn round_trips_session_metadata_and_history()\n    -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync + 'static\u003e\u003e {\n        let state_dir =\n            std::env::temp_dir().join(format!(\"deepseek-acp-session-store-{}\", Uuid::new_v4()));\n        let cwd = state_dir.join(\"workspace\");\n        let store = FilesystemSessionStore::new(\u0026state_dir);\n        let meta = PersistedSessionMeta {\n            session_id: \"session-roundtrip\".to_string(),\n            cwd: cwd.clone(),\n            additional_directories: vec![state_dir.join(\"extra\")],\n            mode: PermissionPosture::Yolo,\n            model: \"deepseek-v4-pro\".to_string(),\n            reasoning_effort: ReasoningEffort::Max,\n            mcp_servers: Vec::new(),\n        };\n\n        store.persist_turn(\u0026meta, \u0026[ChatMessage::user(\"hello\")])?;\n        store.persist_turn(\u0026meta, \u0026[ChatMessage::assistant(\"world\")])?;\n\n        let record = store.load_record(\"session-roundtrip\")?;\n        assert_eq!(record.meta, meta);\n        assert_eq!(record.history.len(), 2);\n        assert_eq!(record.history[0], ChatMessage::user(\"hello\"));\n        assert_eq!(record.history[1], ChatMessage::assistant(\"world\"));\n\n        let listed = store.list_persisted(\u0026cwd)?;\n        assert_eq!(listed.len(), 1);\n        assert_eq!(listed[0].session_id, SessionId::new(\"session-roundtrip\"));\n        assert_eq!(listed[0].cwd, cwd);\n\n        Ok(())\n    }\n\n    #[test_log::test]\n    fn rejects_session_ids_that_are_not_path_components() {\n        let store = FilesystemSessionStore::new(\"/tmp/deepseek-acp-invalid\");\n        let error = store.load_record(\"../escape\").err();\n        assert!(error.is_some());\n    }\n}\n","traces":[{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","test_utils.rs"],"content":"//! Shared test utilities for the `DeepSeek` `ACP` adapter.\n//!\n//! This module provides fakes and helpers that are used by unit tests across\n//! multiple source files.  It is only compiled in `#[cfg(test)]` mode.\n\n#![cfg(test)]\n// Fakes are used by test modules in other files; suppress dead-code warnings\n// until all tests are moved.\n#![allow(dead_code)]\n\nuse std::collections::VecDeque;\nuse std::sync::atomic::{AtomicUsize, Ordering};\nuse std::sync::{Arc, Mutex};\n\nuse agent_client_protocol::schema::{\n    CreateTerminalRequest, CreateTerminalResponse, KillTerminalRequest, KillTerminalResponse,\n    ReadTextFileRequest, ReadTextFileResponse, ReleaseTerminalRequest, ReleaseTerminalResponse,\n    RequestPermissionR
