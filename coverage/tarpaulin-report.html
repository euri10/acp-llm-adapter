equest, RequestPermissionResponse, SessionConfigKind, SessionConfigOption,\n    TerminalExitStatus, TerminalId, TerminalOutputRequest, TerminalOutputResponse,\n    WaitForTerminalExitRequest, WaitForTerminalExitResponse, WriteTextFileRequest,\n    WriteTextFileResponse,\n};\nuse deepseek_acp_adapter::deepseek::ToolCall as DeepSeekToolCall;\nuse futures_util::future::BoxFuture;\n\nuse crate::acp::{\n    CreateTerminalRequester, KillTerminalRequester, PermissionRequester, ReadTextFileRequester,\n    ReleaseTerminalRequester, TerminalOutputRequester, WaitForTerminalExitRequester,\n    WriteTextFileRequester,\n};\nuse crate::session::SessionStore;\nuse crate::tools::ToolContext;\n\n// ── CountingReadTextFileRequester ───────────────────────────\n\npub(crate) struct CountingReadTextFileRequester {\n    calls: Arc\u003cMutex\u003cusize\u003e\u003e,\n}\n\nimpl CountingReadTextFileRequester {\n    pub(crate) fn new() -\u003e Self {\n        Self {\n            calls: Arc::new(Mutex::new(0)),\n        }\n    }\n\n    pub(crate) fn calls(\u0026self) -\u003e Arc\u003cMutex\u003cusize\u003e\u003e {\n        Arc::clone(\u0026self.calls)\n    }\n}\n\nimpl ReadTextFileRequester for CountingReadTextFileRequester {\n    fn read_text_file(\n        \u0026self,\n        _request: ReadTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReadTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move {\n            let mut guard = self\n                .calls\n                .lock()\n                .map_err(agent_client_protocol::Error::into_internal_error)?;\n            *guard += 1;\n            Ok(ReadTextFileResponse::new(\"client content\"))\n        })\n    }\n}\n\n// ── Utf8FailingReadTextFileRequester ────────────────────────\n\npub(crate) struct Utf8FailingReadTextFileRequester;\n\nimpl ReadTextFileRequester for Utf8FailingReadTextFileRequester {\n    fn read_text_file(\n        \u0026self,\n        _request: ReadTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReadTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move {\n            Err(agent_client_protocol::Error::internal_error()\n                .data(\"stream did not contain valid UTF-8\"))\n        })\n    }\n}\n\n// ── RecordingWriteTextFileRequester ─────────────────────────\n\npub(crate) struct RecordingWriteTextFileRequester {\n    requests: Arc\u003cMutex\u003cVec\u003cWriteTextFileRequest\u003e\u003e\u003e,\n}\n\nimpl RecordingWriteTextFileRequester {\n    pub(crate) fn new() -\u003e Self {\n        Self {\n            requests: Arc::new(Mutex::new(Vec::new())),\n        }\n    }\n\n    pub(crate) fn requests(\u0026self) -\u003e Arc\u003cMutex\u003cVec\u003cWriteTextFileRequest\u003e\u003e\u003e {\n        Arc::clone(\u0026self.requests)\n    }\n}\n\nimpl WriteTextFileRequester for RecordingWriteTextFileRequester {\n    fn write_text_file(\n        \u0026self,\n        request: WriteTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWriteTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        self.requests\n            .lock()\n            .map(|mut requests| requests.push(request))\n            .ok();\n\n        Box::pin(async move { Ok(WriteTextFileResponse::new()) })\n    }\n}\n\n// ── FakePermissionRequester ─────────────────────────────────\n\npub(crate) struct FakePermissionRequester {\n    requests: Arc\u003cMutex\u003cVec\u003cRequestPermissionRequest\u003e\u003e\u003e,\n    responses: Mutex\u003cVecDeque\u003cRequestPermissionResponse\u003e\u003e,\n}\n\nimpl FakePermissionRequester {\n    pub(crate) fn new(responses: Vec\u003cRequestPermissionResponse\u003e) -\u003e Self {\n        Self {\n            requests: Arc::new(Mutex::new(Vec::new())),\n            responses: Mutex::new(VecDeque::from(responses)),\n        }\n    }\n\n    pub(crate) fn requests(\u0026self) -\u003e Arc\u003cMutex\u003cVec\u003cRequestPermissionRequest\u003e\u003e\u003e {\n        Arc::clone(\u0026self.requests)\n    }\n}\n\nimpl PermissionRequester for FakePermissionRequester {\n    fn request_permission(\n        \u0026self,\n        request: RequestPermissionRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cRequestPermissionResponse, agent_client_protocol::Error\u003e\u003e {\n        self.requests\n            .lock()\n            .map(|mut requests| requests.push(request))\n            .ok();\n\n        let response = self\n            .responses\n            .lock()\n            .map_err(|error| agent_client_protocol::Error::internal_error().data(error.to_string()))\n            .and_then(|mut responses| {\n                responses.pop_front().ok_or_else(|| {\n                    agent_client_protocol::Error::internal_error()\n                        .data(\"fake permission requester was exhausted\")\n                })\n            });\n\n        Box::pin(async move { response })\n    }\n}\n\n// ── PermissionModeFixture \u0026 permission_mode_fixture ─────────\n\npub(crate) type PermissionModeFixture = (\n    SessionStore,\n    agent_client_protocol::schema::SessionId,\n    ToolContext,\n    DeepSeekToolCall,\n    DeepSeekToolCall,\n);\n\npub(crate) fn permission_mode_fixture()\n-\u003e Result\u003cPermissionModeFixture, agent_client_protocol::Error\u003e {\n    use crate::test_store;\n    let store = test_store();\n    let session = crate::acp::handle_new_session_request(\n        \u0026store,\n        \u0026agent_client_protocol::schema::NewSessionRequest::new(\"/tmp\"),\n    )?;\n    let context = ToolContext {\n        session_id: session.session_id.clone(),\n        cwd: std::path::PathBuf::from(\"/tmp\"),\n        additional_directories: Vec::new(),\n        client_capabilities: None,\n    };\n    let edit_call = DeepSeekToolCall::new(\n        \"call-edit\",\n        \"write_file\",\n        serde_json::json!({ \"path\": \"file.txt\" }).to_string(),\n    );\n    let shell_call = DeepSeekToolCall::new(\n        \"call-shell\",\n        \"run_command\",\n        serde_json::json!({ \"command\": \"echo hi\" }).to_string(),\n    );\n\n    Ok((\n        store.clone(),\n        session.session_id,\n        context,\n        edit_call,\n        shell_call,\n    ))\n}\n\n// ── select_current_value ────────────────────────────────────\n\npub(crate) fn select_current_value(\n    options: \u0026[SessionConfigOption],\n    id: \u0026str,\n) -\u003e Result\u003cString, agent_client_protocol::Error\u003e {\n    let option = options\n        .iter()\n        .find(|option| option.id.0.as_ref() == id)\n        .ok_or_else(|| {\n            agent_client_protocol::Error::internal_error()\n                .data(format!(\"missing config option {id}\"))\n        })?;\n\n    let SessionConfigKind::Select(select) = \u0026option.kind else {\n        return Err(agent_client_protocol::Error::internal_error()\n            .data(format!(\"config option {id} is not a select\")));\n    };\n\n    Ok(select.current_value.0.to_string())\n}\n\n// ── FakeTerminalRequester ───────────────────────────────────\n\npub(crate) struct FakeTerminalRequester {\n    pub(crate) terminal_id: String,\n    pub(crate) output: String,\n    pub(crate) exit_code: Option\u003cu32\u003e,\n    pub(crate) truncated: bool,\n    pub(crate) create_error: Option\u003cString\u003e,\n    pub(crate) wait_error: Option\u003cString\u003e,\n    pub(crate) output_error: Option\u003cString\u003e,\n    pub(crate) release_error: Option\u003cString\u003e,\n}\n\nimpl CreateTerminalRequester for FakeTerminalRequester {\n    fn create_terminal(\n        \u0026self,\n        _request: CreateTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cCreateTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        let terminal_id = self.terminal_id.clone();\n        let error = self.create_error.clone();\n        Box::pin(async move {\n            if let Some(msg) = error {\n                return Err(agent_client_protocol::Error::internal_error().data(msg));\n            }\n            Ok(CreateTerminalResponse::new(TerminalId::new(terminal_id)))\n        })\n    }\n}\n\nimpl TerminalOutputRequester for FakeTerminalRequester {\n    fn terminal_output(\n        \u0026self,\n        _request: TerminalOutputRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cTerminalOutputResponse, agent_client_protocol::Error\u003e\u003e {\n        let output = self.output.clone();\n        let error = self.output_error.clone();\n        let truncated = self.truncated;\n        Box::pin(async move {\n            if let Some(msg) = error {\n                return Err(agent_client_protocol::Error::internal_error().data(msg));\n            }\n            Ok(TerminalOutputResponse::new(output, truncated))\n        })\n    }\n}\n\nimpl WaitForTerminalExitRequester for FakeTerminalRequester {\n    fn wait_for_terminal_exit(\n        \u0026self,\n        _request: WaitForTerminalExitRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWaitForTerminalExitResponse, agent_client_protocol::Error\u003e\u003e {\n        let exit_code = self.exit_code;\n        let error = self.wait_error.clone();\n        Box::pin(async move {\n            if let Some(msg) = error {\n                return Err(agent_client_protocol::Error::internal_error().data(msg));\n            }\n            let status = TerminalExitStatus::new().exit_code(exit_code);\n            Ok(WaitForTerminalExitResponse::new(status))\n        })\n    }\n}\n\nimpl ReleaseTerminalRequester for FakeTerminalRequester {\n    fn release_terminal(\n        \u0026self,\n        _request: ReleaseTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReleaseTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        let error = self.release_error.clone();\n        Box::pin(async move {\n            if let Some(msg) = error {\n                return Err(agent_client_protocol::Error::internal_error().data(msg));\n            }\n            Ok(ReleaseTerminalResponse::new())\n        })\n    }\n}\n\nimpl KillTerminalRequester for FakeTerminalRequester {\n    fn kill_terminal(\n        \u0026self,\n        _request: KillTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cKillTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { Ok(KillTerminalResponse::new()) })\n    }\n}\n\n// ── CancelTracker ───────────────────────────────────────────\n\n#[derive(Clone, Default)]\npub(crate) struct CancelTracker {\n    pub(crate) kills: Arc\u003cAtomicUsize\u003e,\n    pub(crate) releases: Arc\u003cAtomicUsize\u003e,\n}\n\nimpl CreateTerminalRequester for CancelTracker {\n    fn create_terminal(\n        \u0026self,\n        _request: CreateTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cCreateTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { Ok(CreateTerminalResponse::new(TerminalId::new(\"term-cancel\"))) })\n    }\n}\n\nimpl TerminalOutputRequester for CancelTracker {\n    fn terminal_output(\n        \u0026self,\n        _request: TerminalOutputRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cTerminalOutputResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { Ok(TerminalOutputResponse::new(String::new(), false)) })\n    }\n}\n\nimpl WaitForTerminalExitRequester for CancelTracker {\n    fn wait_for_terminal_exit(\n        \u0026self,\n        _request: WaitForTerminalExitRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWaitForTerminalExitResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(std::future::pending())\n    }\n}\n\nimpl ReleaseTerminalRequester for CancelTracker {\n    fn release_terminal(\n        \u0026self,\n        _request: ReleaseTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReleaseTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        let releases = Arc::clone(\u0026self.releases);\n        Box::pin(async move {\n            releases.fetch_add(1, Ordering::SeqCst);\n            Ok(ReleaseTerminalResponse::new())\n        })\n    }\n}\n\nimpl KillTerminalRequester for CancelTracker {\n    fn kill_terminal(\n        \u0026self,\n        _request: KillTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cKillTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        let kills = Arc::clone(\u0026self.kills);\n        Box::pin(async move {\n            kills.fetch_add(1, Ordering::SeqCst);\n            Ok(KillTerminalResponse::new())\n        })\n    }\n}\n\n// ── FailingWriteRequester ───────────────────────────────────\n\npub(crate) struct FailingWriteRequester;\n\nimpl WriteTextFileRequester for FailingWriteRequester {\n    fn write_text_file(\n        \u0026self,\n        _request: WriteTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWriteTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(\n            async move { Err(agent_client_protocol::Error::internal_error().data(\"disk full\")) },\n        )\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","tools","execution.rs"],"content":"//! Tool definitions, execution, and helper utilities.\n\n#![allow(unused_imports)]\nuse std::fmt::Write as _;\nuse std::fs;\nuse std::io::ErrorKind;\nuse std::path::{Path, PathBuf};\n\nuse agent_client_protocol::schema::{\n    ClientCapabilities, CreateTerminalRequest, FileSystemCapabilities, KillTerminalRequest,\n    ReadTextFileRequest, ReleaseTerminalRequest, SessionId, TerminalOutputRequest, ToolCallStatus,\n    ToolKind, WaitForTerminalExitRequest, WriteTextFileRequest, WriteTextFileResponse,\n};\nuse deepseek_acp_adapter::deepseek::{ToolCall as DeepSeekToolCall, ToolDefinition};\nuse futures_util::future::BoxFuture;\nuse globset::{Glob, GlobSetBuilder};\nuse grep::regex::RegexMatcher;\nuse grep::searcher::sinks::UTF8;\nuse grep::searcher::{BinaryDetection, SearcherBuilder};\nuse ignore::WalkBuilder;\nuse ignore::gitignore::GitignoreBuilder;\nuse serde::Deserialize;\nuse serde_json::Value;\nuse tokio_util::sync::CancellationToken;\n\nuse super::registry::{ToolContext, ToolEdit, ToolExecution};\nuse crate::{\n    PermissionDecision, PermissionRequester, ReadTextFileRequester, SessionStore,\n    TerminalRequester, ToolCallRequester, WriteTextFileRequester, is_mcp_tool_name,\n    mcp_tool_execution, mcp_tool_kind, request_tool_permission,\n};\n\nconst TOOL_OUTPUT_LIMIT: usize = 200;\nconst TOOL_OUTPUT_LIMIT_U32: u32 = 200;\nconst COMMAND_OUTPUT_LIMIT: usize = 20_000;\n\n#[derive(Debug, Deserialize)]\nstruct ReadFileArguments {\n    path: PathBuf,\n    line: Option\u003cu32\u003e,\n    limit: Option\u003cu32\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct ListDirArguments {\n    path: PathBuf,\n}\n\n#[derive(Debug, Deserialize)]\nstruct GlobArguments {\n    pattern: String,\n}\n\n#[derive(Debug, Deserialize)]\nstruct GrepArguments {\n    pattern: String,\n}\n\n#[derive(Debug, Deserialize)]\nstruct WriteFileArguments {\n    path: PathBuf,\n    content: String,\n}\n\n#[derive(Debug, Deserialize)]\nstruct EditFileArguments {\n    path: PathBuf,\n    old_text: String,\n    new_text: String,\n}\n\n#[derive(Debug, Deserialize)]\nstruct RunCommandArguments {\n    command: String,\n}\n\npub(crate) fn read_file_tool_definition() -\u003e ToolDefinition {\n    ToolDefinition::new(\n        \"read_file\",\n        \"Read a text file, using the client's file system when available.\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"path\": { \"type\": \"string\" },\n                \"line\": { \"type\": \"integer\", \"minimum\": 1 },\n                \"limit\": { \"type\": \"integer\", \"minimum\": 1 },\n            },\n            \"required\": [\"path\"],\n            \"additionalProperties\": false,\n        }),\n    )\n}\n\npub(crate) fn list_dir_tool_definition() -\u003e ToolDefinition {\n    ToolDefinition::new(\n        \"list_dir\",\n        \"List entries in a directory.\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"path\": { \"type\": \"string\" },\n            },\n            \"required\": [\"path\"],\n            \"additionalProperties\": false,\n        }),\n    )\n}\n\npub(crate) fn glob_tool_definition() -\u003e ToolDefinition {\n    ToolDefinition::new(\n        \"glob\",\n        \"Find paths matching a glob pattern.\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"pattern\": { \"type\": \"string\" },\n            },\n            \"required\": [\"pattern\"],\n            \"additionalProperties\": false,\n        }),\n    )\n}\n\npub(crate) fn grep_tool_definition() -\u003e ToolDefinition {\n    ToolDefinition::new(\n        \"grep\",\n        \"Search files for a regular expression.\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"pattern\": { \"type\": \"string\" },\n            },\n            \"required\": [\"pattern\"],\n            \"additionalProperties\": false,\n        }),\n    )\n}\n\npub(crate) fn write_file_tool_definition() -\u003e ToolDefinition {\n    ToolDefinition::new(\n        \"write_file\",\n        \"Write UTF-8 text to a file, creating or replacing the file.\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"path\": { \"type\": \"string\" },\n                \"content\": { \"type\": \"string\" },\n            },\n            \"required\": [\"path\", \"content\"],\n            \"additionalProperties\": false,\n        }),\n    )\n}\n\npub(crate) fn edit_file_tool_definition() -\u003e ToolDefinition {\n    ToolDefinition::new(\n        \"edit_file\",\n        \"Replace one exact UTF-8 text span in an existing file.\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"path\": { \"type\": \"string\" },\n                \"old_text\": { \"type\": \"string\" },\n                \"new_text\": { \"type\": \"string\" },\n            },\n            \"required\": [\"path\", \"old_text\", \"new_text\"],\n            \"additionalProperties\": false,\n        }),\n    )\n}\n\npub(crate) fn run_command_tool_definition() -\u003e ToolDefinition {\n    ToolDefinition::new(\n        \"run_command\",\n        \"Run a shell command in the session working directory.\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"command\": { \"type\": \"string\" },\n            },\n            \"required\": [\"command\"],\n            \"additionalProperties\": false,\n        }),\n    )\n}\n\npub(crate) async fn read_file_tool_execution(\n    call: \u0026DeepSeekToolCall,\n    context: \u0026ToolContext,\n    connection: Option\u003c\u0026dyn ReadTextFileRequester\u003e,\n) -\u003e ToolExecution {\n    let parsed_arguments = match serde_json::from_str::\u003cReadFileArguments\u003e(call.arguments()) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e {\n            return ToolExecution::failed(format!(\"invalid read_file arguments: {error}\"));\n        }\n    };\n\n    let resolved_path = resolve_tool_path(context, \u0026parsed_arguments.path);\n    let start_line = parsed_arguments.line.unwrap_or(1);\n    let requested_limit = parsed_arguments.limit.unwrap_or(TOOL_OUTPUT_LIMIT_U32);\n    let limit = requested_limit.min(TOOL_OUTPUT_LIMIT_U32);\n\n    if start_line == 0 {\n        return ToolExecution::failed(\"read_file line must be at least 1\");\n    }\n\n    if requested_limit == 0 {\n        return ToolExecution::failed(\"read_file limit must be at least 1\");\n    }\n\n    let file_result = if context\n        .client_capabilities\n        .as_ref()\n        .is_some_and(|capabilities| capabilities.fs.read_text_file)\n    {\n        match connection {\n            Some(connection) =\u003e {\n                if local_file_is_non_utf8(\u0026resolved_path) {\n                    return ToolExecution::failed(non_utf8_file_message(\u0026resolved_path));\n                }\n\n                read_file_from_client(\n                    connection,\n                    \u0026context.session_id,\n                    \u0026resolved_path,\n                    start_line,\n                    limit,\n                )\n                .await\n            }\n            None =\u003e Err(\"read_file needs a client connection for fs/read_text_file\".to_owned()),\n        }\n    } else {\n        read_file_from_local(\u0026resolved_path, start_line, limit)\n    };\n\n    match file_result {\n        Ok(file_slice) =\u003e ToolExecution {\n            content: file_slice,\n            raw_output: serde_json::json!({\n                \"path\": resolved_path,\n                \"line\": start_line,\n                \"limit\": limit,\n                \"source\": if context\n                    .client_capabilities\n                    .as_ref()\n                    .is_some_and(|capabilities| capabilities.fs.read_text_file)\n                {\n                    \"client\"\n                } else {\n                    \"local\"\n                },\n            }),\n            success: true,\n            edit: None,\n        },\n        Err(error) =\u003e ToolExecution::failed(error),\n    }\n}\n\npub(crate) async fn write_file_tool_execution(\n    store: \u0026SessionStore,\n    call: \u0026DeepSeekToolCall,\n    context: \u0026ToolContext,\n    read_connection: Option\u003c\u0026dyn ReadTextFileRequester\u003e,\n    write_connection: Option\u003c\u0026dyn WriteTextFileRequester\u003e,\n    permission_requester: Option\u003c\u0026dyn PermissionRequester\u003e,\n) -\u003e ToolExecution {\n    let parsed_arguments = match serde_json::from_str::\u003cWriteFileArguments\u003e(call.arguments()) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e {\n            return ToolExecution::failed(format!(\"invalid write_file arguments: {error}\"));\n        }\n    };\n\n    if let Err(error) =\n        require_tool_permission(store, context, call, ToolKind::Edit, permission_requester).await\n    {\n        return ToolExecution::failed(error);\n    }\n\n    let resolved_path = resolve_tool_path(context, \u0026parsed_arguments.path);\n    let use_client_write = context\n        .client_capabilities\n        .as_ref()\n        .is_some_and(|capabilities| capabilities.fs.write_text_file);\n    let old_text = match read_existing_text(\n        context,\n        \u0026resolved_path,\n        read_connection,\n        use_client_write,\n    )\n    .await\n    {\n        Ok(text) =\u003e text,\n        Err(error) =\u003e return ToolExecution::failed(error),\n    };\n    let write_result = if use_client_write {\n        match write_connection {\n            Some(connection) =\u003e {\n                write_file_to_client(\n                    connection,\n                    \u0026context.session_id,\n                    \u0026resolved_path,\n                    \u0026parsed_arguments.content,\n                )\n                .await\n            }\n            None =\u003e Err(\"write_file needs a client connection for fs/write_text_file\".to_owned()),\n        }\n    } else {\n        write_file_to_local(\u0026resolved_path, \u0026parsed_arguments.content)\n    };\n\n    match write_result {\n        Ok(()) =\u003e {\n            let byte_count = parsed_arguments.content.len();\n            ToolExecution {\n                content: format!(\"wrote {byte_count} bytes to {}\", resolved_path.display()),\n                raw_output: serde_json::json!({\n                    \"path\": resolved_path,\n                    \"bytes\": byte_count,\n                    \"source\": if use_client_write { \"client\" } else { \"local\" },\n                }),\n                success: true,\n                edit: Some(ToolEdit {\n                    path: resolved_path,\n                    old_text,\n                    new_text: parsed_arguments.content,\n                    line: 1,\n                }),\n            }\n        }\n        Err(error) =\u003e ToolExecution::failed(error),\n    }\n}\n\npub(crate) async fn edit_file_tool_execution(\n    store: \u0026SessionStore,\n    call: \u0026DeepSeekToolCall,\n    context: \u0026ToolContext,\n    read_connection: Option\u003c\u0026dyn ReadTextFileRequester\u003e,\n    write_connection: Option\u003c\u0026dyn WriteTextFileRequester\u003e,\n    permission_requester: Option\u003c\u0026dyn PermissionRequester\u003e,\n) -\u003e ToolExecution {\n    let parsed_arguments = match serde_json::from_str::\u003cEditFileArguments\u003e(call.arguments()) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e {\n            return ToolExecution::failed(format!(\"invalid edit_file arguments: {error}\"));\n        }\n    };\n\n    if parsed_arguments.old_text.is_empty() {\n        return ToolExecution::failed(\"edit_file old_text must not be empty\");\n    }\n\n    let resolved_path = resolve_tool_path(context, \u0026parsed_arguments.path);\n    let use_client_read = context\n        .client_capabilities\n        .as_ref()\n        .is_some_and(|capabilities| capabilities.fs.read_text_file);\n    let original_result = if use_client_read {\n        match read_connection {\n            Some(connection) =\u003e {\n                read_full_file_from_client(connection, \u0026context.session_id, \u0026resolved_path).await\n            }\n            None =\u003e Err(\"edit_file needs a client connection for fs/read_text_file\".to_owned()),\n        }\n    } else {\n        fs::read_to_string(\u0026resolved_path).map_err(|error| {\n            format!(\n                \"failed to read {} before editing: {error}\",\n                resolved_path.display()\n            )\n        })\n    };\n\n    let original = match original_result {\n        Ok(file_text) =\u003e file_text,\n        Err(error) =\u003e return ToolExecution::failed(error),\n    };\n\n    let matches = original.matches(\u0026parsed_arguments.old_text).count();\n    if matches == 0 {\n        return ToolExecution::failed(format!(\n            \"edit_file could not find old_text in {}\",\n            resolved_path.display()\n        ));\n    }\n    if matches \u003e 1 {\n        return ToolExecution::failed(format!(\n            \"edit_file found old_text {matches} times in {}; provide a unique span\",\n            resolved_path.display()\n        ));\n    }\n\n    if let Err(error) =\n        require_tool_permission(store, context, call, ToolKind::Edit, permission_requester).await\n    {\n        return ToolExecution::failed(error);\n    }\n\n    let edit_line = match original.find(\u0026parsed_arguments.old_text) {\n        Some(offset) =\u003e line_number_for_offset(\u0026original, offset),\n        None =\u003e 1,\n    };\n    let updated = original.replacen(\u0026parsed_arguments.old_text, \u0026parsed_arguments.new_text, 1);\n    let use_client_write = context\n        .client_capabilities\n        .as_ref()\n        .is_some_and(|capabilities| capabilities.fs.write_text_file);\n    let write_result = if use_client_write {\n        match write_connection {\n            Some(connection) =\u003e {\n                write_file_to_client(connection, \u0026context.session_id, \u0026resolved_path, \u0026updated)\n                    .await\n            }\n            None =\u003e Err(\"edit_file needs a client connection for fs/write_text_file\".to_owned()),\n        }\n    } else {\n        write_file_to_local(\u0026resolved_path, \u0026updated)\n    };\n\n    match write_result {\n        Ok(()) =\u003e ToolExecution {\n            content: format!(\"edited {}\", resolved_path.display()),\n            raw_output: serde_json::json!({\n                \"path\": resolved_path,\n                \"replacements\": 1,\n                \"read_source\": if use_client_read { \"client\" } else { \"local\" },\n                \"write_source\": if use_client_write { \"client\" } else { \"local\" },\n            }),\n            success: true,\n            edit: Some(ToolEdit {\n                path: resolved_path,\n                old_text: Some(original),\n                new_text: updated,\n                line: edit_line,\n            }),\n        },\n        Err(error) =\u003e ToolExecution::failed(error),\n    }\n}\n\npub(crate) async fn run_command_tool_execution(\n    store: \u0026SessionStore,\n    call: \u0026DeepSeekToolCall,\n    context: \u0026ToolContext,\n    permission_requester: Option\u003c\u0026dyn PermissionRequester\u003e,\n    terminal_connection: Option\u003c\u0026dyn TerminalRequester\u003e,\n    cancellation_token: \u0026CancellationToken,\n) -\u003e ToolExecution {\n    let parsed_arguments = match serde_json::from_str::\u003cRunCommandArguments\u003e(call.arguments()) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e {\n            return ToolExecution::failed(format!(\"invalid run_command arguments: {error}\"));\n        }\n    };\n\n    if parsed_arguments.command.trim().is_empty() {\n        return ToolExecution::failed(\"run_command command must not be empty\");\n    }\n\n    if let Err(error) = require_tool_permission(\n        store,\n        context,\n        call,\n        ToolKind::Execute,\n        permission_requester,\n    )\n    .await\n    {\n        return ToolExecution::failed(error);\n    }\n\n    if context\n        .client_capabilities\n        .as_ref()\n        .is_some_and(|capabilities| capabilities.terminal)\n    {\n        return run_command_via_terminal(\n            \u0026context.session_id,\n            \u0026context.cwd,\n            \u0026parsed_arguments.command,\n            terminal_connection,\n            cancellation_token,\n        )\n        .await;\n    }\n\n    let cwd = context.cwd.clone();\n    let command = parsed_arguments.command;\n    let output = match tokio::task::spawn_blocking(move || {\n        std::process::Command::new(\"sh\")\n            .arg(\"-lc\")\n            .arg(\u0026command)\n            .current_dir(cwd)\n            .output()\n    })\n    .await\n    {\n        Ok(Ok(output)) =\u003e output,\n        Ok(Err(error)) =\u003e return ToolExecution::failed(format!(\"failed to run command: {error}\")),\n        Err(error) =\u003e return ToolExecution::failed(format!(\"run_command task failed: {error}\")),\n    };\n\n    let stdout = String::from_utf8_lossy(\u0026output.stdout);\n    let stderr = String::from_utf8_lossy(\u0026output.stderr);\n    let combined_output = render_command_output(\u0026stdout, \u0026stderr, output.status.code());\n    let (display_output, truncated) = truncate_tool_output(\u0026combined_output, COMMAND_OUTPUT_LIMIT);\n\n    ToolExecution {\n        content: display_output,\n        raw_output: serde_json::json!({\n            \"exit_code\": output.status.code(),\n            \"success\": output.status.success(),\n            \"stdout\": stdout,\n            \"stderr\": stderr,\n            \"truncated\": truncated,\n        }),\n        success: output.status.success(),\n        edit: None,\n    }\n}\n\npub(crate) async fn run_command_via_terminal(\n    session_id: \u0026SessionId,\n    cwd: \u0026Path,\n    command: \u0026str,\n    connection: Option\u003c\u0026dyn TerminalRequester\u003e,\n    cancellation_token: \u0026CancellationToken,\n) -\u003e ToolExecution {\n    let Some(terminal_requester) = connection else {\n        return ToolExecution::failed(\"terminal support advertised but no connection available\");\n    };\n\n    let create_request = CreateTerminalRequest::new(session_id.clone(), command)\n        .cwd(Some(cwd.to_path_buf()))\n        .output_byte_limit(Some(COMMAND_OUTPUT_LIMIT as u64));\n    let create_response = match terminal_requester.create_terminal(create_request).await {\n        Ok(response) =\u003e response,\n        Err(error) =\u003e {\n            return ToolExecution::failed(format!(\"terminal/create failed: {error}\"));\n        }\n    };\n    let terminal_id = create_response.terminal_id;\n\n    let wait_request = WaitForTerminalExitRequest::new(session_id.clone(), terminal_id.clone());\n    let wait_response = tokio::select! {\n        // Turn cancelled while the command is running: kill it, then release the\n        // terminal so the client frees its resources.\n        () = cancellation_token.cancelled() =\u003e {\n            let _ = terminal_requester\n                .kill_terminal(KillTerminalRequest::new(\n                    session_id.clone(),\n                    terminal_id.clone(),\n                ))\n                .await;\n            let _ = terminal_requester\n                .release_terminal(ReleaseTerminalRequest::new(\n                    session_id.clone(),\n                    terminal_id.clone(),\n                ))\n                .await;\n            return ToolExecution::failed(\"run_command cancelled\");\n        }\n        result = terminal_requester.wait_for_terminal_exit(wait_request) =\u003e match result {\n            Ok(response) =\u003e response,\n            Err(error) =\u003e {\n                let _ = terminal_requester\n                    .release_terminal(ReleaseTerminalRequest::new(\n                        session_id.clone(),\n                        terminal_id.clone(),\n                    ))\n                    .await;\n                return ToolExecution::failed(format!(\"terminal/wait_for_exit failed: {error}\"));\n            }\n        },\n    };\n\n    let output_request = TerminalOutputRequest::new(session_id.clone(), terminal_id.clone());\n    let output_response = match terminal_requester.terminal_output(output_request).await {\n        Ok(response) =\u003e response,\n        Err(error) =\u003e {\n            let _ = terminal_requester\n                .release_terminal(ReleaseTerminalRequest::new(\n                    session_id.clone(),\n                    terminal_id.clone(),\n                ))\n                .await;\n            return ToolExecution::failed(format!(\"terminal/output failed: {error}\"));\n        }\n    };\n\n    if let Err(error) = terminal_requester\n        .release_terminal(ReleaseTerminalRequest::new(\n            session_id.clone(),\n            terminal_id.clone(),\n        ))\n        .await\n    {\n        return ToolExecution::failed(format!(\"terminal/release failed: {error}\"));\n    }\n\n    let exit_code = wait_response.exit_status.exit_code;\n    let success = exit_code == Some(0);\n    let exit_code_i32 = exit_code.and_then(|code| i32::try_from(code).ok());\n    let combined_output = render_command_output(\u0026output_response.output, \"\", exit_code_i32);\n    let (display_output, truncated) = truncate_tool_output(\u0026combined_output, COMMAND_OUTPUT_LIMIT);\n\n    ToolExecution {\n        content: display_output,\n        raw_output: serde_json::json!({\n            \"exit_code\": exit_code,\n            \"success\": success,\n            \"stdout\": output_response.output,\n            \"stderr\": \"\",\n            \"truncated\": truncated || output_response.truncated,\n        }),\n        success,\n        edit: None,\n    }\n}\n\npub(crate) fn list_dir_tool_execution(\n    call: \u0026DeepSeekToolCall,\n    context: \u0026ToolContext,\n) -\u003e ToolExecution {\n    let parsed_arguments = match serde_json::from_str::\u003cListDirArguments\u003e(call.arguments()) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e {\n            return ToolExecution::failed(format!(\"invalid list_dir arguments: {error}\"));\n        }\n    };\n\n    let resolved_path = resolve_tool_path(context, \u0026parsed_arguments.path);\n    let entries = match collect_directory_entries(\u0026resolved_path) {\n        Ok(entries) =\u003e entries,\n        Err(error) =\u003e return ToolExecution::failed(error),\n    };\n\n    let truncated = entries.len() \u003e TOOL_OUTPUT_LIMIT;\n    let entries = entries\n        .into_iter()\n        .take(TOOL_OUTPUT_LIMIT)\n        .collect::\u003cVec\u003c_\u003e\u003e();\n    let output_text = render_tool_lines(\u0026entries, truncated, \"entries\", TOOL_OUTPUT_LIMIT);\n\n    ToolExecution {\n        content: output_text,\n        raw_output: serde_json::json!({\n            \"path\": resolved_path,\n            \"entries\": entries,\n            \"truncated\": truncated,\n        }),\n        success: true,\n        edit: None,\n    }\n}\n\npub(crate) fn glob_tool_execution(call: \u0026DeepSeekToolCall, context: \u0026ToolContext) -\u003e ToolExecution {\n    let parsed_arguments = match serde_json::from_str::\u003cGlobArguments\u003e(call.arguments()) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e return ToolExecution::failed(format!(\"invalid glob arguments: {error}\")),\n    };\n\n    let matcher = match Glob::new(\u0026parsed_arguments.pattern) {\n        Ok(glob) =\u003e {\n            let mut builder = GlobSetBuilder::new();\n            builder.add(glob);\n            match builder.build() {\n                Ok(set) =\u003e set,\n                Err(error) =\u003e {\n                    return ToolExecution::failed(format!(\"invalid glob pattern: {error}\"));\n                }\n            }\n        }\n        Err(error) =\u003e return ToolExecution::failed(format!(\"invalid glob pattern: {error}\")),\n    };\n\n    let root_gitignore = build_root_gitignore(\u0026context.cwd);\n    let mut glob_paths = Vec::new();\n    let walker = WalkBuilder::new(\u0026context.cwd)\n        .hidden(false)\n        .parents(true)\n        .ignore(true)\n        .git_ignore(true)\n        .git_global(true)\n        .git_exclude(true)\n        .build();\n    for entry in walker {\n        let entry = match entry {\n            Ok(entry) =\u003e entry,\n            Err(error) =\u003e return ToolExecution::failed(error.to_string()),\n        };\n\n        if !entry\n            .file_type()\n            .is_some_and(|file_type| file_type.is_file())\n        {\n            continue;\n        }\n\n        if is_hidden_path(entry.path()) {\n            continue;\n        }\n\n        let path = entry.path();\n        let relative_path = path.strip_prefix(\u0026context.cwd).unwrap_or(path);\n        if root_gitignore.as_ref().is_some_and(|matcher| {\n            matcher\n                .matched_path_or_any_parents(relative_path, false)\n                .is_ignore()\n        }) {\n            continue;\n        }\n        if matcher.is_match(relative_path) || matcher.is_match(path) {\n            glob_paths.push(relative_path.display().to_string());\n        }\n    }\n\n    glob_paths.sort_unstable();\n    let truncated = glob_paths.len() \u003e TOOL_OUTPUT_LIMIT;\n    let entries = glob_paths\n        .into_iter()\n        .take(TOOL_OUTPUT_LIMIT)\n        .collect::\u003cVec\u003c_\u003e\u003e();\n    let output_text = render_tool_lines(\u0026entries, truncated, \"matches\", TOOL_OUTPUT_LIMIT);\n\n    ToolExecution {\n        content: output_text,\n        raw_output: serde_json::json!({\n            \"pattern\": parsed_arguments.pattern,\n            \"matches\": entries,\n            \"truncated\": truncated,\n        }),\n        success: true,\n        edit: None,\n    }\n}\n\npub(crate) fn grep_tool_execution(call: \u0026DeepSeekToolCall, context: \u0026ToolContext) -\u003e ToolExecution {\n    let parsed_arguments = match serde_json::from_str::\u003cGrepArguments\u003e(call.arguments()) {\n        Ok(arguments) =\u003e arguments,\n        Err(error) =\u003e return ToolExecution::failed(format!(\"invalid grep arguments: {error}\")),\n    };\n\n    let matcher = match RegexMatcher::new_line_matcher(\u0026parsed_arguments.pattern) {\n        Ok(matcher) =\u003e matcher,\n        Err(error) =\u003e return ToolExecution::failed(format!(\"invalid grep regex: {error}\")),\n    };\n\n    let root_gitignore = build_root_gitignore(\u0026context.cwd);\n    let (mut grep_hits, truncated) =\n        match collect_grep_matches(\u0026context.cwd, root_gitignore.as_ref(), \u0026matcher) {\n            Ok(result) =\u003e result,\n            Err(error) =\u003e return ToolExecution::failed(error),\n        };\n\n    grep_hits.sort_unstable_by(|left, right| {\n        left.path\n            .cmp(\u0026right.path)\n            .then(left.line.cmp(\u0026right.line))\n            .then(left.text.cmp(\u0026right.text))\n    });\n    let lines = grep_hits\n        .into_iter()\n        .take(TOOL_OUTPUT_LIMIT)\n        .map(|entry| format!(\"{}:{}:{}\", entry.path, entry.line, entry.text))\n        .collect::\u003cVec\u003c_\u003e\u003e();\n    let output_text = render_tool_lines(\u0026lines, truncated, \"matches\", TOOL_OUTPUT_LIMIT);\n\n    ToolExecution {\n        content: output_text,\n        raw_output: serde_json::json!({\n            \"pattern\": parsed_arguments.pattern,\n            \"matches\": lines,\n            \"truncated\": truncated,\n        }),\n        success: true,\n        edit: None,\n    }\n}\n\npub(crate) async fn require_tool_permission(\n    store: \u0026SessionStore,\n    context: \u0026ToolContext,\n    call: \u0026DeepSeekToolCall,\n    kind: ToolKind,\n    requester: Option\u003c\u0026dyn PermissionRequester\u003e,\n) -\u003e Result\u003c(), String\u003e {\n    let requester = requester.ok_or_else(|| {\n        format!(\n            \"{} requires a client connection that can request permissions\",\n            call.name()\n        )\n    })?;\n\n    match request_tool_permission(store, context, call, kind, requester).await {\n        Ok(\n            PermissionDecision::AllowOnce\n            | PermissionDecision::AllowAlways\n            | PermissionDecision::AllowByMode,\n        ) =\u003e Ok(()),\n        Ok(PermissionDecision::RejectOnce | PermissionDecision::RejectAlways) =\u003e {\n            Err(format!(\"{} was rejected by permission policy\", call.name()))\n        }\n        Ok(PermissionDecision::Cancelled) =\u003e {\n            Err(format!(\"{} permission request was cancelled\", call.name()))\n        }\n        Err(error) =\u003e Err(format!(\n            \"failed to request permission for {}: {error}\",\n            call.name()\n        )),\n    }\n}\n\nasync fn read_file_from_client\u003c'a\u003e(\n    connection: \u0026'a dyn ReadTextFileRequester,\n    session_id: \u0026'a SessionId,\n    path: \u0026'a Path,\n    line: u32,\n    limit: u32,\n) -\u003e Result\u003cString, String\u003e {\n    let response = connection\n        .read_text_file(\n            ReadTextFileRequest::new(session_id.clone(), path.to_path_buf())\n                .line(line)\n                .limit(limit),\n        )\n        .await\n        .map_err(|error| read_file_client_error(path, \u0026error.to_string()))?;\n\n    Ok(response.content)\n}\n\nasync fn read_full_file_from_client\u003c'a\u003e(\n    connection: \u0026'a dyn ReadTextFileRequester,\n    session_id: \u0026'a SessionId,\n    path: \u0026'a Path,\n) -\u003e Result\u003cString, String\u003e {\n    let response = connection\n        .read_text_file(ReadTextFileRequest::new(\n            session_id.clone(),\n            path.to_path_buf(),\n        ))\n        .await\n        .map_err(|error| read_file_client_error(path, \u0026error.to_string()))?;\n\n    Ok(response.content)\n}\n\nasync fn read_existing_text(\n    context: \u0026ToolContext,\n    path: \u0026Path,\n    read_connection: Option\u003c\u0026dyn ReadTextFileRequester\u003e,\n    use_client_write: bool,\n) -\u003e Result\u003cOption\u003cString\u003e, String\u003e {\n    if use_client_write {\n        let can_client_read = context\n            .client_capabilities\n            .as_ref()\n            .is_some_and(|capabilities| capabilities.fs.read_text_file);\n        if !can_client_read {\n            return Ok(None);\n        }\n        let Some(connection) = read_connection else {\n            return Ok(None);\n        };\n        return read_full_file_from_client(connection, \u0026context.session_id, path)\n            .await\n            .map(Some);\n    }\n\n    match fs::read_to_string(path) {\n        Ok(text) =\u003e Ok(Some(text)),\n        Err(error) if error.kind() == ErrorKind::NotFound =\u003e Ok(None),\n        Err(error) =\u003e Err(read_file_local_error(path, \u0026error)),\n    }\n}\n\npub(crate) async fn write_file_to_client(\n    connection: \u0026dyn WriteTextFileRequester,\n    session_id: \u0026SessionId,\n    path: \u0026Path,\n    content: \u0026str,\n) -\u003e Result\u003c(), String\u003e {\n    connection\n        .write_text_file(WriteTextFileRequest::new(\n            session_id.clone(),\n            path.to_path_buf(),\n            content.to_owned(),\n        ))\n        .await\n        .map_err(|error| {\n            format!(\n                \"failed to write {} through client fs/write_text_file: {error}\",\n                path.display()\n            )\n        })?;\n\n    Ok(())\n}\n\nfn write_file_to_local(path: \u0026Path, content: \u0026str) -\u003e Result\u003c(), String\u003e {\n    fs::write(path, content.as_bytes())\n        .map_err(|error| format!(\"failed to write {}: {error}\", path.display()))\n}\n\nfn line_number_for_offset(text: \u0026str, offset: usize) -\u003e u32 {\n    let Some(prefix) = text.get(..offset) else {\n        return 1;\n    };\n    let line = prefix\n        .bytes()\n        .filter(|byte| *byte == b'\\n')\n        .count()\n        .saturating_add(1);\n\n    u32::try_from(line).unwrap_or(u32::MAX)\n}\n\npub(crate) fn read_file_from_local(path: \u0026Path, line: u32, limit: u32) -\u003e Result\u003cString, String\u003e {\n    let text = fs::read_to_string(path).map_err(|error| read_file_local_error(path, \u0026error))?;\n    let lines: Vec\u003c\u0026str\u003e = text.lines().collect();\n\n    let start_index = usize::try_from(line.saturating_sub(1))\n        .map_err(|error| format!(\"line number is too large: {error}\"))?;\n    let max_lines =\n        usize::try_from(limit).map_err(|error| format!(\"line limit is too large: {error}\"))?;\n\n    let content = lines\n        .iter()\n        .skip(start_index)\n        .take(max_lines)\n        .copied()\n        .collect::\u003cVec\u003c\u0026str\u003e\u003e()\n        .join(\"\\n\");\n\n    Ok(content)\n}\n\npub(crate) fn local_file_is_non_utf8(path: \u0026Path) -\u003e bool {\n    fs::read_to_string(path).is_err_and(|error| error.kind() == ErrorKind::InvalidData)\n}\n\npub(crate) fn read_file_local_error(path: \u0026Path, error: \u0026std::io::Error) -\u003e String {\n    if error.kind() == ErrorKind::InvalidData {\n        return non_utf8_file_message(path);\n    }\n\n    format!(\"failed to read {}: {error}\", path.display())\n}\n\npub(crate) fn read_file_client_error(path: \u0026Path, message: \u0026str) -\u003e String {\n    if is_utf8_error_message(message) {\n        return non_utf8_file_message(path);\n    }\n\n    format!(\n        \"failed to read {} through client fs/read_text_file: {message}\",\n        path.display()\n    )\n}\n\npub(crate) fn non_utf8_file_message(path: \u0026Path) -\u003e String {\n    format!(\n        \"read_file only supports UTF-8 text files; {} appears to be binary or non-UTF-8\",\n        path.display()\n    )\n}\n\npub(crate) fn is_utf8_error_message(message: \u0026str) -\u003e bool {\n    let lower = message.to_ascii_lowercase();\n    lower.contains(\"valid utf-8\")\n        || lower.contains(\"invalid utf-8\")\n        || lower.contains(\"non-utf-8\")\n        || lower.contains(\"utf8\")\n}\n\npub(crate) fn resolve_tool_path(context: \u0026ToolContext, path: \u0026Path) -\u003e PathBuf {\n    if path.is_absolute() {\n        return path.to_path_buf();\n    }\n\n    let candidate = context.cwd.join(path);\n    if candidate.exists() {\n        return candidate;\n    }\n\n    for directory in \u0026context.additional_directories {\n        let alternate = directory.join(path);\n        if alternate.exists() {\n            return alternate;\n        }\n    }\n\n    candidate\n}\n\npub(crate) fn collect_directory_entries(path: \u0026Path) -\u003e Result\u003cVec\u003cString\u003e, String\u003e {\n    let mut entries = fs::read_dir(path)\n        .map_err(|error| format!(\"failed to read directory {}: {error}\", path.display()))?\n        .map(|entry| {\n            entry.map_err(|error| {\n                format!(\n                    \"failed to read directory entry in {}: {error}\",\n                    path.display()\n                )\n            })\n        })\n        .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()?;\n\n    entries.sort_unstable_by(|left, right| {\n        left.file_name()\n            .to_string_lossy()\n            .cmp(\u0026right.file_name().to_string_lossy())\n    });\n\n    Ok(entries\n        .into_iter()\n        .map(|entry| {\n            let display = entry.file_name().to_string_lossy().into_owned();\n            match entry.file_type() {\n                Ok(file_type) if file_type.is_dir() =\u003e format!(\"{display}/\"),\n                _ =\u003e display,\n            }\n        })\n        .collect())\n}\n\npub(crate) fn is_hidden_path(path: \u0026Path) -\u003e bool {\n    path.components()\n        .any(|component| component.as_os_str().to_string_lossy().starts_with('.'))\n}\n\npub(crate) fn build_root_gitignore(root: \u0026Path) -\u003e Option\u003cignore::gitignore::Gitignore\u003e {\n    let gitignore_path = root.join(\".gitignore\");\n    if !gitignore_path.is_file() {\n        return None;\n    }\n\n    let mut builder = GitignoreBuilder::new(root);\n    if builder.add(\u0026gitignore_path).is_some() {\n        return None;\n    }\n\n    builder.build().ok()\n}\n\npub(crate) fn render_tool_lines(\n    lines: \u0026[String],\n    truncated: bool,\n    label: \u0026str,\n    limit: usize,\n) -\u003e String {\n    let mut output = lines.join(\"\\n\");\n\n    if truncated {\n        if !output.is_empty() {\n            output.push('\\n');\n        }\n        let _ = write!(output, \"... truncated after {limit} {label}\");\n    }\n\n    output\n}\n\npub(crate) fn render_command_output(stdout: \u0026str, stderr: \u0026str, exit_code: Option\u003ci32\u003e) -\u003e String {\n    let mut output = String::new();\n\n    if !stdout.is_empty() {\n        output.push_str(\"stdout:\\n\");\n        output.push_str(stdout);\n        if !stdout.ends_with('\\n') {\n            output.push('\\n');\n        }\n    }\n\n    if !stderr.is_empty() {\n        if !output.is_empty() {\n            output.push('\\n');\n        }\n        output.push_str(\"stderr:\\n\");\n        output.push_str(stderr);\n        if !stderr.ends_with('\\n') {\n            output.push('\\n');\n        }\n    }\n\n    if output.is_empty() {\n        let status = exit_code.map_or_else(|| \"signal\".to_string(), |code| code.to_string());\n        let _ = write!(output, \"command exited with status {status}\");\n    }\n\n    output\n}\n\npub(crate) fn truncate_tool_output(output: \u0026str, limit: usize) -\u003e (String, bool) {\n    let truncated = output.chars().count() \u003e limit;\n    if !truncated {\n        return (output.to_string(), false);\n    }\n\n    let mut content = output.chars().take(limit).collect::\u003cString\u003e();\n    let _ = write!(content, \"\\n... truncated after {limit} characters\");\n    (content, true)\n}\n\n#[derive(Debug, Clone)]\nstruct GrepMatch {\n    path: String,\n    line: u64,\n    text: String,\n}\n\nfn collect_grep_matches(\n    root: \u0026Path,\n    root_gitignore: Option\u003c\u0026ignore::gitignore::Gitignore\u003e,\n    matcher: \u0026RegexMatcher,\n) -\u003e Result\u003c(Vec\u003cGrepMatch\u003e, bool), String\u003e {\n    let mut searcher = SearcherBuilder::new()\n        .binary_detection(BinaryDetection::quit(b'\\x00'))\n        .line_number(true)\n        .build();\n    let mut grep_hits = Vec::\u003cGrepMatch\u003e::new();\n    let mut truncated = false;\n\n    let walker = WalkBuilder::new(root)\n        .hidden(false)\n        .parents(true)\n        .ignore(true)\n        .git_ignore(true)\n        .git_global(true)\n        .git_exclude(true)\n        .build();\n    for entry in walker {\n        let entry = match entry {\n            Ok(entry) =\u003e entry,\n            Err(error) =\u003e return Err(error.to_string()),\n        };\n\n        if !entry\n            .file_type()\n            .is_some_and(|file_type| file_type.is_file())\n        {\n            continue;\n        }\n\n        if is_hidden_path(entry.path()) {\n            continue;\n        }\n\n        let path = entry.path().to_path_buf();\n        let relative_path = path.strip_prefix(root).unwrap_or(\u0026path);\n        if root_gitignore.as_ref().is_some_and(|matcher| {\n            matcher\n                .matched_path_or_any_parents(relative_path, false)\n                .is_ignore()\n        }) {\n            continue;\n        }\n\n        let search_result = searcher.search_path(\n            matcher,\n            \u0026path,\n            UTF8(|line_number, line| {\n                if grep_hits.len() \u003e= TOOL_OUTPUT_LIMIT {\n                    truncated = true;\n                    return Ok(false);\n                }\n\n                grep_hits.push(GrepMatch {\n                    path: relative_path.display().to_string(),\n                    line: line_number,\n                    text: line.to_string(),\n                });\n                if grep_hits.len() \u003e= TOOL_OUTPUT_LIMIT {\n                    truncated = true;\n                    Ok(false)\n                } else {\n                    Ok(true)\n                }\n            }),\n        );\n        if let Err(error) = search_result {\n            return Err(format!(\"failed to grep {}: {error}\", path.display()));\n        }\n\n        if truncated {\n            break;\n        }\n    }\n\n    Ok((grep_hits, truncated))\n}\n\n#[cfg(test)]\n#[allow(unused_imports)]\nmod adapter_tests {\n    use super::*;\n    use crate::acp::{\n        ReadTextFileRequester, WriteTextFileRequester, handle_new_session_request,\n        handle_set_session_mode_request,\n    };\n    use crate::session::{\n        PERMISSION_ALLOW_ONCE_OPTION_ID, PERMISSION_REJECT_ONCE_OPTION_ID, SessionStore,\n    };\n    use crate::test_store;\n    use crate::test_utils::{\n        CancelTracker, CountingReadTextFileRequester, FailingWriteRequester,\n        FakePermissionRequester, FakeTerminalRequester, RecordingWriteTextFileRequester,\n        Utf8FailingReadTextFileRequester, select_current_value,\n    };\n    use crate::tools::registry::{\n        AdapterToolRegistry, EmptyToolRegistry, ToolExecution, ToolRegistry,\n    };\n    use agent_client_protocol::schema::{\n        ClientCapabilities, FileSystemCapabilities, NewSessionRequest, ReadTextFileRequest,\n        ReadTextFileResponse, RequestPermissionOutcome, RequestPermissionResponse,\n        SelectedPermissionOutcome, SetSessionModeRequest, ToolKind,\n    };\n    use agent_client_protocol::{Agent, Channel, Client};\n    use deepseek_acp_adapter::deepseek::ToolCall as DeepSeekToolCall;\n    use std::sync::atomic::Ordering;\n    use std::sync::{Arc, Mutex};\n    use tokio_util::sync::CancellationToken;\n\n    #[test_log::test(tokio::test)]\n    async fn read_file_tool_defaults_line_and_limit() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let temp_root = std::env::temp_dir().join(format!(\n            \"deepseek-acp-adapter-defaults-{}\",\n            uuid::Uuid::new_v4()\n        ));\n        std::fs::create_dir_all(\u0026temp_root)\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let file_path = temp_root.join(\"sample.txt\");\n        std::fs::write(\u0026file_path, \"alpha\\nbeta\\ngamma\\n\")\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let context = ToolContext {\n            session_id: agent_client_protocol::schema::SessionId::new(\"session-defaults\"),\n            cwd: temp_root.clone(),\n            additional_directories: Vec::new(),\n            client_capabilities: None,\n        };\n        let call = DeepSeekToolCall::new(\n            \"call-defaults\",\n            \"read_file\",\n            serde_json::json!({\"path\": \"sample.txt\"}).to_string(),\n        );\n        let result = read_file_tool_execution(\u0026call, \u0026context, None).await;\n        assert!(result.success);\n        assert_eq!(result.content, \"alpha\\nbeta\\ngamma\");\n        assert_eq!(result.raw_output[\"source\"], \"local\");\n        assert_eq!(result.raw_output[\"line\"], 1);\n        assert_eq!(result.raw_output[\"limit\"], 200);\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn read_file_tool_error_paths_report_failures() -\u003e Result\u003c(), agent_client_protocol::Error\u003e\n    {\n        let temp_root = std::env::temp_dir().join(format!(\n            \"deepseek-acp-adapter-tools-{}\",\n            uuid::Uuid::new_v4()\n        ));\n        std::fs::create_dir_all(\u0026temp_root)\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        std::fs::write(temp_root.join(\"visible.txt\"), \"one\\ntwo\\nthree\")\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let context = ToolContext {\n            session_id: agent_client_protocol::schema::SessionId::new(\"session-tools\"),\n            cwd: temp_root.clone(),\n            additional_directories: Vec::new(),\n            client_capabilities: None,\n        };\n        let r = read_file_tool_execution(\n            \u0026DeepSeekToolCall::new(\"invalid-read\", \"read_file\", \"not json\"),\n            \u0026context,\n            None,\n        )\n        .await;\n        assert!(!r.success);\n        assert!(r.content.contains(\"invalid read_file arguments\"));\n        let r = read_file_tool_execution(\n            \u0026DeepSeekToolCall::new(\n                \"zl\",\n                \"read_file\",\n                serde_json::json!({\"path\":\"visible.txt\",\"line\":0}).to_string(),\n            ),\n            \u0026context,\n            None,\n        )\n        .await;\n        assert!(!r.success);\n        assert!(r.content.contains(\"line must be at least 1\"));\n        let r = read_file_tool_execution(\n            \u0026DeepSeekToolCall::new(\n                \"zl2\",\n                \"read_file\",\n                serde_json::json!({\"path\":\"visible.txt\",\"limit\":0}).to_string(),\n            ),\n            \u0026context,\n            None,\n        )\n        .await;\n        assert!(!r.success);\n        assert!(r.content.contains(\"limit must be at least 1\"));\n        let r = read_file_tool_execution(\n            \u0026DeepSeekToolCall::new(\n                \"mf\",\n                \"read_file\",\n                serde_json::json!({\"path\":\"missing.txt\"}).to_string(),\n            ),\n            \u0026context,\n            None,\n        )\n        .await;\n        assert!(!r.success);\n        assert!(!r.content.is_empty());\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn local_tool_error_paths_report_failures() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let temp_root = std::env::temp_dir().join(format!(\n            \"deepseek-acp-adapter-tools-{}\",\n            uuid::Uuid::new_v4()\n        ));\n        std::fs::create_dir_all(\u0026temp_root)\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let context = ToolContext {\n            session_id: agent_client_protocol::schema::SessionId::new(\"session-tools\"),\n            cwd: temp_root.clone(),\n            additional_directories: Vec::new(),\n            client_capabilities: None,\n        };\n        assert!(\n            !list_dir_tool_execution(\n                \u0026DeepSeekToolCall::new(\"il\", \"list_dir\", \"not json\"),\n                \u0026context\n            )\n            .success\n        );\n        assert!(\n            !list_dir_tool_execution(\n                \u0026DeepSeekToolCall::new(\n                    \"md\",\n                    \"list_dir\",\n                    serde_json::json!({\"path\":\"missing-dir\"}).to_string()\n                ),\n                \u0026context\n            )\n            .success\n        );\n        assert!(\n            !glob_tool_execution(\u0026DeepSeekToolCall::new(\"ig\", \"glob\", \"not json\"), \u0026context)\n                .success\n        );\n        assert!(\n            !glob_tool_execution(\n                \u0026DeepSeekToolCall::new(\n                    \"igp\",\n                    \"glob\",\n                    serde_json::json!({\"pattern\":\"[\"}).to_string()\n                ),\n                \u0026context\n            )\n            .success\n        );\n        assert!(\n            !grep_tool_execution(\u0026DeepSeekToolCall::new(\"ig2\", \"grep\", \"not json\"), \u0026context)\n                .success\n        );\n        assert!(\n            !grep_tool_execution(\n                \u0026DeepSeekToolCall::new(\n                    \"igr\",\n                    \"grep\",\n                    serde_json::json!({\"pattern\":\"(\"}).to_string()\n                ),\n                \u0026context\n            )\n            .success\n        );\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn read_file_tool_uses_local_fallback() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let temp_root = std::env::temp_dir().join(format!(\n            \"deepseek-acp-adapter-local-{}\",\n            uuid::Uuid::new_v4()\n        ));\n        std::fs::create_dir_all(\u0026temp_root)\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let file_path = temp_root.join(\"sample.txt\");\n        std::fs::write(\u0026file_path, \"alpha\\nbeta\\ngamma\\ndelta\\n\")\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let context = ToolContext {\n            session_id: agent_client_protocol::schema::SessionId::new(\"session-local\"),\n            cwd: temp_root.clone(),\n            additional_directories: Vec::new(),\n            client_capabilities: None,\n        };\n        let call = DeepSeekToolCall::new(\n            \"call-local\",\n            \"read_file\",\n            serde_json::json!({\n                \"path\": \"sample.txt\",\n                \"line\": 2,\n                \"limit\": 2,\n            })\n            .to_string(),\n        );\n\n        let result = read_file_tool_execution(\u0026call, \u0026context, None).await;\n\n        assert!(result.success);\n        assert_eq!(result.content, \"beta\\ngamma\");\n        assert_eq!(result.raw_output[\"source\"], \"local\");\n        assert_eq!(result.raw_output[\"line\"], 2);\n        assert_eq!(result.raw_output[\"limit\"], 2);\n        assert_eq!(result.raw_output[\"path\"], serde_json::json!(file_path));\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn read_file_tool_routes_to_client_fs() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let temp_root = std::env::temp_dir().join(format!(\n            \"deepseek-acp-adapter-client-{}\",\n            uuid::Uuid::new_v4()\n        ));\n        std::fs::create_dir_all(\u0026temp_root)\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let observed_request = Arc::new(Mutex::new(None::\u003cReadTextFileRequest\u003e));\n        let observed_request_for_server = Arc::clone(\u0026observed_request);\n        let (client_transport, server_transport) = Channel::duplex();\n\n        let server = tokio::spawn(async move {\n            Agent\n                .builder()\n                .on_receive_request(\n                    async move |request: ReadTextFileRequest, responder, _cx| {\n                        let mut guard = observed_request_for_server\n                            .lock()\n                            .map_err(agent_client_protocol::Error::into_internal_error)?;\n                        *guard = Some(request.clone());\n                        responder.respond(ReadTextFileResponse::new(\n                            \"buffered line two\\nbuffered line three\",\n                        ))\n                    },\n                    agent_client_protocol::on_receive_request!(),\n                )\n                .connect_to(server_transport)\n                .await\n        });\n\n        let context = ToolContext {\n            session_id: agent_client_protocol::schema::SessionId::new(\"session-client\"),\n            cwd: temp_root.clone(),\n            additional_directories: Vec::new(),\n            client_capabilities: Some(\n                ClientCapabilities::new().fs(FileSystemCapabilities::new()\n                    .read_text_file(true)\n                    .write_text_file(false)),\n            ),\n        };\n        let call = DeepSeekToolCall::new(\n            \"call-client\",\n            \"read_file\",\n            serde_json::json!({\n                \"path\": \"buffer.txt\",\n                \"line\": 2,\n                \"limit\": 2,\n            })\n            .to_string(),\n        );\n\n        let result = Client\n            .builder()\n            .connect_with(client_transport, move |connection| async move {\n                let result = read_file_tool_execution(\n                    \u0026call,\n                    \u0026context,\n                    Some(\u0026connection as \u0026dyn crate::acp::ReadTextFileRequester),\n                )\n                .await;\n                Ok(result)\n            })\n            .await?;\n\n        assert!(result.success);\n        assert_eq!(result.content, \"buffered line two\\nbuffered line three\");\n        assert_eq!(result.raw_output[\"source\"], \"client\");\n        assert_eq!(result.raw_output[\"line\"], 2);\n        assert_eq!(result.raw_output[\"limit\"], 2);\n        assert_eq!(\n            result.raw_output[\"path\"],\n            serde_json::json!(temp_root.join(\"buffer.txt\"))\n        );\n\n        let request_guard = observed_request\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let request = request_guard.as_ref().ok_or_else(|| {\n            agent_client_protocol::Error::internal_error().data(\"missing read_text_file request\")\n        })?;\n        assert_eq!(request.session_id.0.as_ref(), \"session-client\");\n        assert_eq!(request.path, temp_root.join(\"buffer.txt\"));\n        assert_eq!(request.line, Some(2));\n        assert_eq!(request.limit, Some(2));\n        drop(request_guard);\n\n        server.abort();\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn read_file_tool_rejects_local_non_utf8_before_client_fs()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let temp_root = std::env::temp_dir().join(format!(\n            \"deepseek-acp-adapter-non-utf8-{}\",\n            uuid::Uuid::new_v4()\n        ));\n        std::fs::create_dir_all(\u0026temp_root)\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let file_path = temp_root.join(\"artifact.bin\");\n        std::fs::write(\u0026file_path, [0xff, 0xfe, 0xfd])\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let context = ToolContext {\n            session_id: agent_client_protocol::schema::SessionId::new(\"session-non-utf8\"),\n            cwd: temp_root.clone(),\n            additional_directories: Vec::new(),\n            client_capabilities: Some(\n                ClientCapabilities::new().fs(FileSystemCapabilities::new().read_text_file(true)),\n            ),\n        };\n        let call = DeepSeekToolCall::new(\n            \"call-non-utf8\",\n            \"read_file\",\n            serde_json::json!({ \"path\": \"artifact.bin\" }).to_string(),\n        );\n        let requester = CountingReadTextFileRequester::new();\n        let calls = requester.calls();\n\n        let result = read_file_tool_execution(\n            \u0026call,\n            \u0026context,\n            Some(\u0026requester as \u0026dyn crate::acp::ReadTextFileRequester),\n        )\n        .await;\n\n        assert!(!result.success);\n        assert!(result.content.contains(\"only supports UTF-8 text files\"));\n        assert!(result.content.contains(\u0026file_path.display().to_string()));\n        assert_eq!(\n            *calls\n                .lock()\n                .map_err(agent_client_protocol::Error::into_internal_error)?,\n            0\n        );\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn read_file_tool_sanitizes_client_non_utf8_error()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let temp_root = std::env::temp_dir().join(format!(\n            \"deepseek-acp-adapter-client-utf8-{}\",\n            uuid::Uuid::new_v4()\n        ));\n        std::fs::create_dir_all(\u0026temp_root)\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let context = ToolContext {\n            session_id: agent_client_protocol::schema::SessionId::new(\"session-client-utf8\"),\n            cwd: temp_root,\n            additional_directories: Vec::new(),\n            client_capabilities: Some(\n                ClientCapabilities::new().fs(FileSystemCapabilities::new().read_text_file(true)),\n            ),\n        };\n        let call = DeepSeekToolCall::new(\n            \"call-client-utf8\",\n            \"read_file\",\n            serde_json::json!({ \"path\": \"client-only.bin\" }).to_string(),\n        );\n\n
