<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

        var data = {"files":[{"path":["/","home","lotso","code","deepseek-acp-adapter","src","acp.rs"],"content":"//! ACP-facing transport registration and request handling.\n\nuse std::collections::HashSet;\nuse std::num::NonZeroUsize;\nuse std::sync::{Arc, Mutex};\n\nuse agent_client_protocol::schema::{\n    AgentAuthCapabilities, AgentCapabilities, AuthenticateRequest, AuthenticateResponse,\n    AvailableCommandsUpdate, CancelNotification, CloseSessionRequest, CloseSessionResponse,\n    ConfigOptionUpdate, ContentBlock, ContentChunk, CreateTerminalRequest, CreateTerminalResponse,\n    CurrentModeUpdate, Implementation, InitializeRequest, InitializeResponse, KillTerminalRequest,\n    KillTerminalResponse, ListSessionsRequest, ListSessionsResponse, LoadSessionRequest,\n    LoadSessionResponse, LogoutCapabilities, LogoutRequest, LogoutResponse, McpCapabilities,\n    NewSessionRequest, NewSessionResponse, PromptRequest, PromptResponse, ProtocolVersion,\n    ReadTextFileRequest, ReadTextFileResponse, ReleaseTerminalRequest, ReleaseTerminalResponse,\n    RequestPermissionRequest, RequestPermissionResponse, ResumeSessionRequest,\n    ResumeSessionResponse, SessionAdditionalDirectoriesCapabilities, SessionCapabilities,\n    SessionCloseCapabilities, SessionConfigOptionValue, SessionConfigValueId, SessionId,\n    SessionListCapabilities, SessionNotification, SessionResumeCapabilities, SessionUpdate,\n    SetSessionConfigOptionRequest, SetSessionConfigOptionResponse, SetSessionModeRequest,\n    SetSessionModeResponse, TerminalOutputRequest, TerminalOutputResponse, ToolCall as AcpToolCall,\n    ToolCallContent, ToolCallStatus, WaitForTerminalExitRequest, WaitForTerminalExitResponse,\n    WriteTextFileRequest, WriteTextFileResponse,\n};\nuse agent_client_protocol::{Agent, Client, ConnectTo};\nuse deepseek_acp_adapter::deepseek::{\n    ChatMessage, LlmClient, MessageRole, ToolCall as DeepSeekToolCall,\n};\nuse futures_util::future::BoxFuture;\nuse uuid::Uuid;\n\nuse crate::tools::ToolRegistry;\nuse crate::{\n    ADAPTER_NAME, ADAPTER_VERSION, AdapterState, FilesystemSessionStore, McpSession,\n    PermissionPosture, ReasoningEffort, SESSION_CONFIG_MODE_ID, SESSION_CONFIG_MODEL_ID,\n    SESSION_CONFIG_REASONING_EFFORT_ID, SessionRecord, SessionStore, adapter_available_commands,\n    connect_mcp_sessions, default_session_modes, session_notification, tool_raw_input,\n    validate_session_model,\n};\n\npub(crate) trait ReadTextFileRequester: Send + Sync {\n    fn read_text_file(\n        \u0026self,\n        request: ReadTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReadTextFileResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\npub(crate) trait WriteTextFileRequester: Send + Sync {\n    fn write_text_file(\n        \u0026self,\n        request: WriteTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWriteTextFileResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\n/// Trait for creating a terminal via ACP client `terminal/create`.\npub(crate) trait CreateTerminalRequester: Send + Sync {\n    /// Create a terminal and execute a command.\n    fn create_terminal(\n        \u0026self,\n        request: CreateTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cCreateTerminalResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\n/// Trait for getting terminal output via ACP client `terminal/output`.\npub(crate) trait TerminalOutputRequester: Send + Sync {\n    /// Get the current output and status of a terminal.\n    fn terminal_output(\n        \u0026self,\n        request: TerminalOutputRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cTerminalOutputResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\n/// Trait for waiting for terminal exit via ACP client `terminal/wait_for_exit`.\npub(crate) trait WaitForTerminalExitRequester: Send + Sync {\n    /// Wait for a terminal command to exit.\n    fn wait_for_terminal_exit(\n        \u0026self,\n        request: WaitForTerminalExitRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWaitForTerminalExitResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\n/// Trait for releasing a terminal via ACP client `terminal/release`.\npub(crate) trait ReleaseTerminalRequester: Send + Sync {\n    /// Release a terminal and free its resources.\n    fn release_terminal(\n        \u0026self,\n        request: ReleaseTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReleaseTerminalResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\n/// Trait for killing a terminal command via ACP client `terminal/kill`.\npub(crate) trait KillTerminalRequester: Send + Sync {\n    /// Kill a terminal's running command without releasing the terminal.\n    fn kill_terminal(\n        \u0026self,\n        request: KillTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cKillTerminalResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\n/// Combined trait for all terminal operations.\npub(crate) trait TerminalRequester:\n    CreateTerminalRequester\n    + TerminalOutputRequester\n    + WaitForTerminalExitRequester\n    + ReleaseTerminalRequester\n    + KillTerminalRequester\n{\n}\n\nimpl\u003cT\u003e TerminalRequester for T where\n    T: CreateTerminalRequester\n        + TerminalOutputRequester\n        + WaitForTerminalExitRequester\n        + ReleaseTerminalRequester\n        + KillTerminalRequester\n        + ?Sized\n{\n}\n\nimpl CreateTerminalRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn create_terminal(\n        \u0026self,\n        request: CreateTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cCreateTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl CreateTerminalRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn create_terminal(\n        \u0026self,\n        request: CreateTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cCreateTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl TerminalOutputRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn terminal_output(\n        \u0026self,\n        request: TerminalOutputRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cTerminalOutputResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl TerminalOutputRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn terminal_output(\n        \u0026self,\n        request: TerminalOutputRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cTerminalOutputResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl WaitForTerminalExitRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn wait_for_terminal_exit(\n        \u0026self,\n        request: WaitForTerminalExitRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWaitForTerminalExitResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl WaitForTerminalExitRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn wait_for_terminal_exit(\n        \u0026self,\n        request: WaitForTerminalExitRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWaitForTerminalExitResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl ReleaseTerminalRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn release_terminal(\n        \u0026self,\n        request: ReleaseTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReleaseTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl ReleaseTerminalRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn release_terminal(\n        \u0026self,\n        request: ReleaseTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReleaseTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl KillTerminalRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn kill_terminal(\n        \u0026self,\n        request: KillTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cKillTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl KillTerminalRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn kill_terminal(\n        \u0026self,\n        request: KillTerminalRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cKillTerminalResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\npub(crate) trait ToolCallRequester:\n    ReadTextFileRequester + WriteTextFileRequester + PermissionRequester + TerminalRequester\n{\n}\n\nimpl\u003cT\u003e ToolCallRequester for T where\n    T: ReadTextFileRequester\n        + WriteTextFileRequester\n        + PermissionRequester\n        + TerminalRequester\n        + ?Sized\n{\n}\n\npub(crate) trait PermissionRequester: Send + Sync {\n    fn request_permission(\n        \u0026self,\n        request: RequestPermissionRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cRequestPermissionResponse, agent_client_protocol::Error\u003e\u003e;\n}\n\nimpl ReadTextFileRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn read_text_file(\n        \u0026self,\n        request: ReadTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReadTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl ReadTextFileRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn read_text_file(\n        \u0026self,\n        request: ReadTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cReadTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl WriteTextFileRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn write_text_file(\n        \u0026self,\n        request: WriteTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWriteTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl WriteTextFileRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn write_text_file(\n        \u0026self,\n        request: WriteTextFileRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cWriteTextFileResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move {\n            self.send_request(request)\n                .block_task()\n                .await\n                .or_else(|err| {\n                    let is_null_payload_deser_failure = err.code\n                        == agent_client_protocol::ErrorCode::ParseError\n                        \u0026\u0026 err.data.as_ref().is_some_and(|d| {\n                            d.get(\"json\").is_some_and(serde_json::Value::is_null)\n                                \u0026\u0026 d.get(\"phase\").and_then(serde_json::Value::as_str)\n                                    == Some(\"deserialization\")\n                        });\n                    if is_null_payload_deser_failure {\n                        Ok(WriteTextFileResponse::new())\n                    } else {\n                        Err(err)\n                    }\n                })\n        })\n    }\n}\n\nimpl PermissionRequester for agent_client_protocol::ConnectionTo\u003cAgent\u003e {\n    fn request_permission(\n        \u0026self,\n        request: RequestPermissionRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cRequestPermissionResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\nimpl PermissionRequester for agent_client_protocol::ConnectionTo\u003cClient\u003e {\n    fn request_permission(\n        \u0026self,\n        request: RequestPermissionRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cRequestPermissionResponse, agent_client_protocol::Error\u003e\u003e {\n        Box::pin(async move { self.send_request(request).block_task().await })\n    }\n}\n\n/// Run the ACP stdio server with the given transport, state, LLM client, and tool\n/// registry.\n///\n/// The builder pattern with many request handler registrations unavoidably spans\n/// many lines. Each handler is factored into a separate function for testability.\n#[allow(clippy::too_many_lines)]\npub(crate) async fn serve_with_transport(\n    transport: impl ConnectTo\u003cAgent\u003e + 'static,\n    state: Arc\u003cMutex\u003cAdapterState\u003e\u003e,\n    llm_client: Arc\u003cdyn LlmClient\u003e,\n    tool_registry: Arc\u003cdyn ToolRegistry\u003e,\n    max_turn_requests: NonZeroUsize,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    let persistence = FilesystemSessionStore::from_default_state_dir()\n        .map_err(agent_client_protocol::Error::into_internal_error)?;\n    let store = SessionStore::new(state).with_persistence(persistence);\n    let initialize_store = store.clone();\n    let new_session_store = store.clone();\n    let load_session_store = store.clone();\n    let resume_session_store = store.clone();\n    let set_mode_store = store.clone();\n    let set_config_store = store.clone();\n    let prompt_store = store.clone();\n    let prompt_client = Arc::clone(\u0026llm_client);\n    let prompt_tools = Arc::clone(\u0026tool_registry);\n    let cancel_store = store.clone();\n    let list_sessions_store = store.clone();\n    let close_session_store = store.clone();\n\n    Agent\n        .builder()\n        .name(\"deepseek-acp-adapter\")\n        .on_receive_request(\n            async move |request: InitializeRequest, responder, _cx| {\n                responder.respond(handle_initialize_request(\u0026initialize_store, request)?)\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |_request: AuthenticateRequest, responder, _cx| {\n                responder.respond(handle_authenticate_request())\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: NewSessionRequest, responder, cx| {\n                let session_store = new_session_store.clone();\n                let connection = cx.clone();\n\n                cx.spawn(async move {\n                    let response =\n                        handle_new_session_request_connected(\u0026session_store, \u0026request).await?;\n                    let session_id = response.session_id.clone();\n\n                    let commands = adapter_available_commands();\n                    if !commands.is_empty() {\n                        connection.send_notification(session_notification(\n                            session_id,\n                            SessionUpdate::AvailableCommandsUpdate(AvailableCommandsUpdate::new(\n                                commands,\n                            )),\n                        ))?;\n                    }\n\n                    responder.respond(response)?;\n                    Ok(())\n                })?;\n\n                Ok(())\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: LoadSessionRequest, responder, cx| {\n                let session_store = load_session_store.clone();\n                let connection = cx.clone();\n\n                cx.spawn(async move {\n                    let result =\n                        handle_load_session_request(\u0026session_store, \u0026request, |notification| {\n                            connection.send_notification(notification)\n                        })\n                        .await;\n\n                    responder.respond_with_result(result)?;\n                    Ok(())\n                })?;\n\n                Ok(())\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: ResumeSessionRequest, responder, cx| {\n                let session_store = resume_session_store.clone();\n\n                cx.spawn(async move {\n                    let result = handle_resume_session_request(\u0026session_store, \u0026request).await;\n\n                    responder.respond_with_result(result)?;\n                    Ok(())\n                })?;\n\n                Ok(())\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: SetSessionModeRequest, responder, cx| {\n                let connection = cx.clone();\n                responder.respond(handle_set_session_mode_request_notifying(\n                    \u0026set_mode_store,\n                    \u0026request,\n                    |notification| connection.send_notification(notification),\n                )?)\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: SetSessionConfigOptionRequest, responder, cx| {\n                let connection = cx.clone();\n                responder.respond(handle_set_session_config_option_request_notifying(\n                    \u0026set_config_store,\n                    \u0026request,\n                    |notification| connection.send_notification(notification),\n                )?)\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: PromptRequest, responder, cx| {\n                let store = prompt_store.clone();\n                let client = Arc::clone(\u0026prompt_client);\n                let tools = Arc::clone(\u0026prompt_tools);\n                let connection = cx.clone();\n\n                cx.spawn(async move {\n                    let result = handle_prompt_request(\n                        \u0026store,\n                        client.as_ref(),\n                        tools.as_ref(),\n                        Some(\u0026connection as \u0026dyn ToolCallRequester),\n                        request,\n                        max_turn_requests,\n                        |notification| connection.send_notification(notification),\n                    )\n                    .await;\n\n                    responder.respond_with_result(result)?;\n                    Ok(())\n                })?;\n\n                Ok(())\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: ListSessionsRequest, responder, _cx| {\n                responder.respond(handle_list_sessions_request(\n                    \u0026list_sessions_store,\n                    \u0026request,\n                )?)\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |request: CloseSessionRequest, responder, _cx| {\n                responder.respond(handle_close_session_request(\n                    \u0026close_session_store,\n                    \u0026request,\n                )?)\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_request(\n            async move |_request: LogoutRequest, responder, _cx| {\n                responder.respond(handle_logout_request())\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .on_receive_notification(\n            async move |notification: CancelNotification, _cx| {\n                cancel_store.cancel_active_turn(\u0026notification.session_id)\n            },\n            agent_client_protocol::on_receive_notification!(),\n        )\n        .connect_to(transport)\n        .await\n}\n\npub(crate) fn handle_initialize_request(\n    store: \u0026SessionStore,\n    request: InitializeRequest,\n) -\u003e Result\u003cInitializeResponse, agent_client_protocol::Error\u003e {\n    store.record_client_capabilities(request.client_capabilities)?;\n    Ok(build_initialize_response(request.protocol_version))\n}\n\npub(crate) fn handle_authenticate_request() -\u003e AuthenticateResponse {\n    AuthenticateResponse::new()\n}\n\npub(crate) fn handle_list_sessions_request(\n    store: \u0026SessionStore,\n    request: \u0026ListSessionsRequest,\n) -\u003e Result\u003cListSessionsResponse, agent_client_protocol::Error\u003e {\n    let sessions = store.list_sessions(request.cwd.as_deref())?;\n    Ok(ListSessionsResponse::new(sessions))\n}\n\npub(crate) fn handle_close_session_request(\n    store: \u0026SessionStore,\n    request: \u0026CloseSessionRequest,\n) -\u003e Result\u003cCloseSessionResponse, agent_client_protocol::Error\u003e {\n    let existed = store.remove_session(\u0026request.session_id)?;\n    if !existed {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(format!(\"unknown session id: {}\", request.session_id.0)));\n    }\n\n    Ok(CloseSessionResponse::new())\n}\n\n/// Handle a `logout` request.\n///\n/// This adapter has no persistent auth state, so logout is a no-op.\npub(crate) fn handle_logout_request() -\u003e LogoutResponse {\n    LogoutResponse::new()\n}\n\npub(crate) fn handle_new_session_request(\n    store: \u0026SessionStore,\n    request: \u0026NewSessionRequest,\n) -\u003e Result\u003cNewSessionResponse, agent_client_protocol::Error\u003e {\n    if !request.mcp_servers.is_empty() {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(\"MCP servers require the async session setup path\"));\n    }\n    insert_session_record(store, request, Vec::new())\n}\n\npub(crate) async fn handle_new_session_request_connected(\n    store: \u0026SessionStore,\n    request: \u0026NewSessionRequest,\n) -\u003e Result\u003cNewSessionResponse, agent_client_protocol::Error\u003e {\n    validate_session_paths(request)?;\n    let mcp_sessions = connect_mcp_sessions(\u0026request.mcp_servers).await?;\n    insert_session_record(store, request, mcp_sessions)\n}\n\npub(crate) async fn handle_load_session_request(\n    store: \u0026SessionStore,\n    request: \u0026LoadSessionRequest,\n    mut notify: impl FnMut(SessionNotification) -\u003e Result\u003c(), agent_client_protocol::Error\u003e,\n) -\u003e Result\u003cLoadSessionResponse, agent_client_protocol::Error\u003e {\n    validate_load_session_paths(request)?;\n    let (session_id, history) =\n        restore_persisted_session(store, \u0026request.session_id, \u0026request.cwd).await?;\n    replay_session_history(\u0026session_id, \u0026history, \u0026mut notify)?;\n\n    Ok(LoadSessionResponse::new()\n        .modes(default_session_modes())\n        .config_options(store.session_config_options(\u0026session_id)?))\n}\n\npub(crate) async fn handle_resume_session_request(\n    store: \u0026SessionStore,\n    request: \u0026ResumeSessionRequest,\n) -\u003e Result\u003cResumeSessionResponse, agent_client_protocol::Error\u003e {\n    validate_resume_session_paths(request)?;\n    let (session_id, _) =\n        restore_persisted_session(store, \u0026request.session_id, \u0026request.cwd).await?;\n\n    Ok(ResumeSessionResponse::new()\n        .modes(default_session_modes())\n        .config_options(store.session_config_options(\u0026session_id)?))\n}\n\nasync fn restore_persisted_session(\n    store: \u0026SessionStore,\n    requested_session_id: \u0026SessionId,\n    cwd: \u0026std::path::Path,\n) -\u003e Result\u003c(SessionId, Vec\u003cChatMessage\u003e), agent_client_protocol::Error\u003e {\n    let persisted = store.load_persisted_record(requested_session_id)?;\n    if persisted.meta.cwd != cwd {\n        return Err(agent_client_protocol::Error::invalid_params().data(format!(\n            \"session {} was persisted for cwd {}, not {}\",\n            requested_session_id.0,\n            persisted.meta.cwd.display(),\n            cwd.display()\n        )));\n    }\n\n    let mcp_sessions = connect_mcp_sessions(\u0026persisted.meta.mcp_servers).await?;\n    let session_id = SessionId::new(persisted.meta.session_id.clone());\n    if session_id != *requested_session_id {\n        return Err(agent_client_protocol::Error::invalid_params().data(format!(\n            \"persisted session id {} does not match requested session id {}\",\n            session_id.0, requested_session_id.0\n        )));\n    }\n    let history = persisted.history;\n    store.insert_session(\n        session_id.clone(),\n        SessionRecord {\n            cwd: persisted.meta.cwd,\n            additional_directories: persisted.meta.additional_directories,\n            history: history.clone(),\n            active_turn: None,\n            mode: persisted.meta.mode,\n            model: persisted.meta.model,\n            reasoning_effort: persisted.meta.reasoning_effort,\n            permission_allow_always: HashSet::new(),\n            mcp_servers: persisted.meta.mcp_servers,\n            mcp_sessions,\n        },\n    )?;\n\n    Ok((session_id, history))\n}\n\nfn insert_session_record(\n    store: \u0026SessionStore,\n    request: \u0026NewSessionRequest,\n    mcp_sessions: Vec\u003cMcpSession\u003e,\n) -\u003e Result\u003cNewSessionResponse, agent_client_protocol::Error\u003e {\n    validate_session_paths(request)?;\n    let session_id = format!(\"session-{}\", Uuid::new_v4());\n    let default_model = store.default_model()?;\n    let sid: SessionId = session_id.clone().into();\n    store.insert_session(\n        sid.clone(),\n        SessionRecord {\n            cwd: request.cwd.clone(),\n            additional_directories: request.additional_directories.clone(),\n            history: Vec::new(),\n            active_turn: None,\n            mode: PermissionPosture::Ask,\n            model: default_model,\n            reasoning_effort: ReasoningEffort::High,\n            permission_allow_always: HashSet::new(),\n            mcp_servers: request.mcp_servers.clone(),\n            mcp_sessions,\n        },\n    )?;\n\n    store.lookup_session(\u0026sid)?;\n\n    Ok(NewSessionResponse::new(session_id)\n        .modes(default_session_modes())\n        .config_options(store.session_config_options(\u0026sid)?))\n}\n\nfn replay_session_history(\n    session_id: \u0026SessionId,\n    history: \u0026[ChatMessage],\n    notify: \u0026mut impl FnMut(SessionNotification) -\u003e Result\u003c(), agent_client_protocol::Error\u003e,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    for message in history {\n        match message.role() {\n            MessageRole::User =\u003e notify(session_notification(\n                session_id.clone(),\n                SessionUpdate::UserMessageChunk(ContentChunk::new(ContentBlock::from(\n                    message.content().to_string(),\n                ))),\n            ))?,\n            MessageRole::Assistant =\u003e {\n                replay_assistant_message(session_id, history, message, notify)?;\n            }\n            MessageRole::System | MessageRole::Tool =\u003e {}\n        }\n    }\n    Ok(())\n}\n\nfn replay_assistant_message(\n    session_id: \u0026SessionId,\n    history: \u0026[ChatMessage],\n    message: \u0026ChatMessage,\n    notify: \u0026mut impl FnMut(SessionNotification) -\u003e Result\u003c(), agent_client_protocol::Error\u003e,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    if !message.content().is_empty() {\n        notify(session_notification(\n            session_id.clone(),\n            SessionUpdate::AgentMessageChunk(ContentChunk::new(ContentBlock::from(\n                message.content().to_string(),\n            ))),\n        ))?;\n    }\n\n    for tool_call in message.tool_calls() {\n        notify(session_notification(\n            session_id.clone(),\n            SessionUpdate::ToolCall(replayed_tool_call(tool_call, history)),\n        ))?;\n    }\n\n    Ok(())\n}\n\nfn replayed_tool_call(tool_call: \u0026DeepSeekToolCall, history: \u0026[ChatMessage]) -\u003e AcpToolCall {\n    let output = tool_result_content(tool_call.id(), history).unwrap_or_default();\n    AcpToolCall::new(tool_call.id().to_string(), tool_call.name().to_string())\n        .status(ToolCallStatus::Completed)\n        .raw_input(tool_raw_input(tool_call))\n        .raw_output(serde_json::json!({ \"content\": output }))\n        .content(vec![ToolCallContent::from(output)])\n}\n\nfn tool_result_content(tool_call_id: \u0026str, history: \u0026[ChatMessage]) -\u003e Option\u003cString\u003e {\n    history.iter().find_map(|message| {\n        if message.role() == MessageRole::Tool \u0026\u0026 message.tool_call_id() == Some(tool_call_id) {\n            Some(message.content().to_string())\n        } else {\n            None\n        }\n    })\n}\n\n#[cfg(test)]\npub(crate) fn handle_set_session_mode_request(\n    store: \u0026SessionStore,\n    request: \u0026SetSessionModeRequest,\n) -\u003e Result\u003cSetSessionModeResponse, agent_client_protocol::Error\u003e {\n    handle_set_session_mode_request_notifying(store, request, |_| Ok(()))\n}\n\npub(crate) fn handle_set_session_mode_request_notifying(\n    store: \u0026SessionStore,\n    request: \u0026SetSessionModeRequest,\n    mut notify: impl FnMut(SessionNotification) -\u003e Result\u003c(), agent_client_protocol::Error\u003e,\n) -\u003e Result\u003cSetSessionModeResponse, agent_client_protocol::Error\u003e {\n    let Some(mode) = PermissionPosture::from_mode_id(\u0026request.mode_id) else {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(format!(\"unsupported session mode: {}\", request.mode_id.0)));\n    };\n\n    store.set_mode(\u0026request.session_id, mode)?;\n    notify(session_notification(\n        request.session_id.clone(),\n        SessionUpdate::CurrentModeUpdate(CurrentModeUpdate::new(request.mode_id.clone())),\n    ))?;\n    Ok(SetSessionModeResponse::new())\n}\n\n#[cfg(test)]\npub(crate) fn handle_set_session_config_option_request(\n    store: \u0026SessionStore,\n    request: \u0026SetSessionConfigOptionRequest,\n) -\u003e Result\u003cSetSessionConfigOptionResponse, agent_client_protocol::Error\u003e {\n    handle_set_session_config_option_request_notifying(store, request, |_| Ok(()))\n}\n\npub(crate) fn handle_set_session_config_option_request_notifying(\n    store: \u0026SessionStore,\n    request: \u0026SetSessionConfigOptionRequest,\n    mut notify: impl FnMut(SessionNotification) -\u003e Result\u003c(), agent_client_protocol::Error\u003e,\n) -\u003e Result\u003cSetSessionConfigOptionResponse, agent_client_protocol::Error\u003e {\n    let value = config_value_id(\u0026request.value)?;\n\n    match request.config_id.0.as_ref() {\n        SESSION_CONFIG_MODE_ID =\u003e {\n            let mode_id = agent_client_protocol::schema::SessionModeId::new(value.0.clone());\n            let Some(mode) = PermissionPosture::from_mode_id(\u0026mode_id) else {\n                return Err(agent_client_protocol::Error::invalid_params()\n                    .data(format!(\"unsupported session mode: {}\", value.0)));\n            };\n            store.set_mode(\u0026request.session_id, mode)?;\n        }\n        SESSION_CONFIG_MODEL_ID =\u003e {\n            let model = value.0.as_ref();\n            store.with_session(\u0026request.session_id, |session| {\n                validate_session_model(session, model)?;\n                Ok(())\n            })?;\n            store.set_model(\u0026request.session_id, model.to_string())?;\n        }\n        SESSION_CONFIG_REASONING_EFFORT_ID =\u003e {\n            let Some(effort) = ReasoningEffort::from_value_id(value) else {\n                return Err(agent_client_protocol::Error::invalid_params()\n                    .data(format!(\"unsupported reasoning effort: {}\", value.0)));\n            };\n            store.set_reasoning_effort(\u0026request.session_id, effort)?;\n        }\n        _ =\u003e {\n            return Err(agent_client_protocol::Error::invalid_params().data(format!(\n                \"unsupported session config option: {}\",\n                request.config_id.0\n            )));\n        }\n    }\n\n    let config_options = store.session_config_options(\u0026request.session_id)?;\n    notify(session_notification(\n        request.session_id.clone(),\n        SessionUpdate::ConfigOptionUpdate(ConfigOptionUpdate::new(config_options.clone())),\n    ))?;\n    Ok(SetSessionConfigOptionResponse::new(config_options))\n}\n\nfn config_value_id(\n    value: \u0026SessionConfigOptionValue,\n) -\u003e Result\u003c\u0026SessionConfigValueId, agent_client_protocol::Error\u003e {\n    value.as_value_id().ok_or_else(|| {\n        agent_client_protocol::Error::invalid_params()\n            .data(\"session config option requires a selectable value id\")\n    })\n}\n\npub(crate) async fn handle_prompt_request(\n    store: \u0026SessionStore,\n    llm_client: \u0026dyn LlmClient,\n    tool_registry: \u0026dyn ToolRegistry,\n    connection: Option\u003c\u0026dyn ToolCallRequester\u003e,\n    request: PromptRequest,\n    max_turn_requests: NonZeroUsize,\n    notify: impl FnMut(SessionNotification) -\u003e Result\u003c(), agent_client_protocol::Error\u003e,\n) -\u003e Result\u003cPromptResponse, agent_client_protocol::Error\u003e {\n    crate::turn::handle_prompt_request(\n        store,\n        llm_client,\n        tool_registry,\n        connection,\n        request,\n        max_turn_requests,\n        notify,\n    )\n    .await\n}\n\npub(crate) fn build_initialize_response(_protocol_version: ProtocolVersion) -\u003e InitializeResponse {\n    InitializeResponse::new(ProtocolVersion::LATEST)\n        .agent_capabilities(\n            AgentCapabilities::new()\n                .load_session(true)\n                .prompt_capabilities(\n                    agent_client_protocol::schema::PromptCapabilities::new().embedded_context(true),\n                )\n                .mcp_capabilities(McpCapabilities::new().http(true))\n                .session_capabilities(\n                    SessionCapabilities::new()\n                        .additional_directories(SessionAdditionalDirectoriesCapabilities::new())\n                        .list(SessionListCapabilities::new())\n                        .resume(SessionResumeCapabilities::new())\n                        .close(SessionCloseCapabilities::new()),\n                )\n                .auth(AgentAuthCapabilities::new().logout(LogoutCapabilities::new())),\n        )\n        .agent_info(Implementation::new(ADAPTER_NAME, ADAPTER_VERSION))\n}\n\npub(crate) fn validate_session_paths(\n    request: \u0026NewSessionRequest,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    if !request.cwd.is_absolute() {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(\"session cwd must be an absolute path\"));\n    }\n\n    if request\n        .additional_directories\n        .iter()\n        .any(|path| !path.is_absolute())\n    {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(\"additional session directories must be absolute paths\"));\n    }\n\n    Ok(())\n}\n\nfn validate_load_session_paths(\n    request: \u0026LoadSessionRequest,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    if !request.cwd.is_absolute() {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(format!(\"cwd must be absolute: {}\", request.cwd.display())));\n    }\n\n    for path in \u0026request.additional_directories {\n        if !path.is_absolute() {\n            return Err(agent_client_protocol::Error::invalid_params().data(format!(\n                \"additional directory must be absolute: {}\",\n                path.display()\n            )));\n        }\n    }\n\n    Ok(())\n}\n\nfn validate_resume_session_paths(\n    request: \u0026ResumeSessionRequest,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    if !request.cwd.is_absolute() {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(\"session cwd must be an absolute path\"));\n    }\n    for directory in \u0026request.additional_directories {\n        if !directory.is_absolute() {\n            return Err(agent_client_protocol::Error::invalid_params()\n                .data(\"additional directories must be absolute paths\"));\n        }\n    }\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{\n        build_initialize_response, handle_authenticate_request, handle_close_session_request,\n        handle_initialize_request, handle_list_sessions_request, handle_load_session_request,\n        handle_logout_request, handle_new_session_request, handle_new_session_request_connected,\n        handle_prompt_request, handle_resume_session_request,\n        handle_set_session_config_option_request,\n        handle_set_session_config_option_request_notifying, handle_set_session_mode_request,\n        handle_set_session_mode_request_notifying, serve_with_transport, validate_session_paths,\n    };\n    use crate::dev::MockLlmClient;\n    use crate::session::{\n        AdapterState, DEFAULT_MAX_TURN_REQUESTS, PERMISSION_ALLOW_ALWAYS_OPTION_ID,\n        PERMISSION_ALLOW_ONCE_OPTION_ID, PERMISSION_REJECT_ONCE_OPTION_ID, PermissionDecision,\n        PermissionPosture, ReasoningEffort, SESSION_CONFIG_MODE_ID, SESSION_CONFIG_MODEL_ID,\n        SESSION_CONFIG_REASONING_EFFORT_ID, SessionStore, initial_model_from_env,\n        model_select_options, request_tool_permission, validate_session_model,\n    };\n    use crate::session_store::{FilesystemSessionStore, PersistedSessionMeta};\n    use crate::test_utils::*;\n    use crate::tools::{\n        AdapterToolRegistry, EmptyToolRegistry, ToolContext, ToolRegistry, require_tool_permission,\n    };\n    use agent_client_protocol::schema::{\n        ClientCapabilities, CloseSessionRequest, ContentBlock, FileSystemCapabilities,\n        Implementation, InitializeRequest, ListSessionsRequest, LoadSessionRequest,\n        NewSessionRequest, PermissionOptionKind, PromptRequest, ProtocolVersion,\n        RequestPermissionOutcome, RequestPermissionResponse, ResumeSessionRequest,\n        SelectedPermissionOutcome, SessionConfigOptionCategory, SessionUpdate,\n        SetSessionConfigOptionRequest, SetSessionModeRequest, ToolCallStatus, ToolKind,\n    };\n    use agent_client_protocol::{Channel, Client};\n    use deepseek_acp_adapter::deepseek::{ChatMessage, LlmClient};\n    use std::sync::{Arc, Mutex};\n    use tokio_util::sync::CancellationToken;\n    use uuid::Uuid;\n\n    fn test_store() -\u003e SessionStore {\n        SessionStore::new(Arc::new(Mutex::new(AdapterState::default())))\n    }\n\n    fn select_current_value(\n        options: \u0026[agent_client_protocol::schema::SessionConfigOption],\n        id: \u0026str,\n    ) -\u003e Result\u003cString, agent_client_protocol::Error\u003e {\n        crate::test_utils::select_current_value(options, id)\n    }\n\n    #[test]\n    fn new_session_with_mcp_servers_rejected_synchronously()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let request = NewSessionRequest::new(\"/tmp\").mcp_servers(vec![\n            agent_client_protocol::schema::McpServer::Stdio(\n                agent_client_protocol::schema::McpServerStdio::new(\"test\", \"/usr/bin/true\"),\n            ),\n        ]);\n        let Err(error) = handle_new_session_request(\u0026store, \u0026request) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected MCP session request to be rejected\"));\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"MCP servers require the async session setup path\")\n        );\n        Ok(())\n    }\n\n    #[test]\n    fn validate_session_paths_rejects_relative_cwd() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let request = NewSessionRequest::new(\"relative/path\");\n        let Err(error) = validate_session_paths(\u0026request) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected relative cwd to fail\"));\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"session cwd must be an absolute path\")\n        );\n        Ok(())\n    }\n\n    #[test]\n    fn validate_session_paths_rejects_relative_additional_directory()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let request = NewSessionRequest::new(\"/tmp\")\n            .additional_directories(vec![std::path::PathBuf::from(\"not-absolute\")]);\n        let Err(error) = validate_session_paths(\u0026request) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected relative additional directory to fail\"));\n        };\n        assert!(\n            error\n ities.load_session);\n        assert!(response.agent_capabilities.mcp_capabilities.http);\n        assert!(!response.agent_capabilities.mcp_capabilities.sse);\n        assert!(!response.agent_capabilities.prompt_capabilities.image);\n        assert!(!response.agent_capabilities.prompt_capabilities.audio);\n        assert!(\n            response\n                .agent_capabilities\n                .prompt_capabilities\n                .embedded_context\n        );\n        assert!(\n            response\n                .agent_capabilities\n                .session_capabilities\n                .list\n                .is_some()\n        );\n        assert!(\n            response\n                .agent_capabilities\n                .session_capabilities\n                .close\n                .is_some()\n        );\n        assert!(\n            response\n                .agent_capabilities\n                .session_capabilities\n                .resume\n                .is_some()\n        );\n        assert!(\n            response\n                .agent_capabilities\n                .session_capabilities\n                .additional_directories\n                .is_some()\n        );\n        assert!(response.agent_capabilities.auth.logout.is_some());\n        assert!(response.auth_methods.is_empty());\n    }\n\n    #[test_log::test]\n    fn build_initialize_response_uses_latest_supported_protocol_version()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let unsupported_protocol_version = serde_json::from_str::\u003cProtocolVersion\u003e(\"2\")\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let response = build_initialize_response(unsupported_protocol_version);\n\n        assert_eq!(response.protocol_version, ProtocolVersion::LATEST);\n        Ok(())\n    }\n\n    #[test_log::test]\n    fn initialize_handshake_records_client_capabilities() -\u003e Result\u003c(), agent_client_protocol::Error\u003e\ .iter()\n                .filter(|session_id| **session_id == active.session_id)\n                .count(),\n            1\n        );\n        let persisted = response\n            .sessions\n            .iter()\n            .find(|session| session.session_id == persisted_id)\n            .ok_or_else(|| {\n                agent_client_protocol::Error::internal_error()\n                    .data(\"missing persisted session from list response\")\n            })?;\n        assert_eq!(\n            persisted.additional_directories,\n            vec![state_dir.join(\"extra\")]\n        );\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn load_session_restores_state_and_replays_history()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let state_dir =\n            std::env::temp_dir().join(format!(\"deepseek-acp-load-history-{}\", Uuid::new_v4()));\n        let workspace = state_dir.join(\"workspace\");\n        let persistence = FilesystemSessionStore::new(\u0026state_dir);\n        let store = SessionStore::new(Arc::new(Mutex::new(AdapterState::default())))\n            .with_persistence(persistence.clone());\n        let session_id = agent_client_protocol::schema::SessionId::new(\"session-load\");\n        let tool_call = deepseek_acp_adapter::deepseek::ToolCall::new(\n            \"call-1\",\n            \"read_file\",\n            r#\"{\"path\":\"Cargo.toml\"}\"#,\n        );\n        let history = vec![\n            ChatMessage::user(\"inspect the manifest\"),\n            ChatMessage::assistant_with_tool_calls(\"reading\", vec![tool_call]),\n            ChatMessage::tool_result(\"call-1\", \"manifest contents\"),\n            ChatMessage::assistant(\"done\"),\n        ];\n        persistence\n            .persist_turn(\n                \u0026PersistedSessionMeta {\n                    session_id: session_id.0.to_string(),\n                    cwd: workspace.clone(),\n                    additional_directories: vec![state_dir.join(\"extra\")],\n                    mode: PermissionPosture::AcceptEdits,\n                    model: \"deepseek-v4-flash\".to_string(),\n                    reasoning_effort: ReasoningEffort::Max,\n                    mcp_servers: Vec::new(),\n                },\n                \u0026history,\n            )\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let mut notifications = Vec::new();\n        let response = handle_load_session_request(\n            \u0026store,\n            \u0026LoadSessionRequest::new(session_id.clone(), workspace.clone()),\n            |notification| {\n                notifications.push(notification);\n                Ok(())\n            },\n        )\n        .await?;\n\n        assert!(response.modes.is_some());\n        assert!(response.config_options.is_some());\n        assert_eq!(notifications.len(), 4);\n        assert!(matches!(\n            notifications[0].update,\n            SessionUpdate::UserMessageChunk(_)\n        ));\n        assert!(matches!(\n            notifications[1].update,\n            SessionUpdate::AgentMessageChunk(_)\n        ));\n        let SessionUpdate::ToolCall(replayed_tool_call) = \u0026notifications[2].update else {\n            return Err(\n                agent_client_protocol::Error::internal_error().data(\"expected replayed tool call\")\n            );\n        };\n        assert_eq!(replayed_tool_call.tool_call_id.0.as_ref(), \"call-1\");\n        assert_eq!(replayed_tool_call.status, ToolCallStatus::Completed);\n        assert_eq!(\n            replayed_tool_call.raw_input,\n            Some(serde_json::json!({ \"path\": \"Cargo.toml\" }))\n        );\n        assert_eq!(\n            replayed_tool_call.raw_output,\n            Some(serde_json::json!({ \"content\": \"manifest contents\" }))\n        );\n        assert!(matches!(\n            notifications[3].update,\n            SessionUpdate::AgentMessageChunk(_)\n        ));\n\n        let      .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let response = handle_resume_session_request(\n            \u0026store,\n            \u0026ResumeSessionRequest::new(session_id.clone(), workspace.clone()),\n        )\n        .await?;\n\n        assert!(response.modes.is_some());\n        assert!(response.config_options.is_some());\n        let guard = store\n            .state\n            .lock()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let restored = guard.sessions.get(\u0026session_id).ok_or_else(|| {\n            agent_client_protocol::Error::internal_error().data(\"missing resumed session\")\n        })?;\n        assert_eq!(restored.cwd, workspace);\n        assert_eq!(restored.mode, PermissionPosture::Yolo);\n        assert_eq!(restored.model, \"deepseek-v4-flash\");\n        assert_eq!(restored.reasoning_effort, ReasoningEffort::Max);\n        assert_eq!(restored.history, history);\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn resume_session_rejects_relative_additional_directory()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let request = ResumeSessionRequest::new(\"session-resume-invalid\", \"/tmp\")\n            .additional_directories(vec![std::path::PathBuf::from(\"relative\")]);\n\n        let Err(error) = handle_resume_session_request(\u0026store, \u0026request).await else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected relative additional directory to fail\"));\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"additional directories must be absolute paths\")\n        );\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn load_session_rejects_mismatched_cwd() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let state_dir =\n            std::env::temp_dir().join(format!(\"deepseek-acp-load-cwd-{}\", Uuid::new_v4()));\n        let workspace = state_dir.join(\"workspace\");\n        let persistence = FilesystemSessionStore::new(\u0026state_dir);\n        let store = SessionStore::new(Arc::new(Mutex::new(AdapterState::default())))\n            .with_persistence(persistence.clone());\n        let session_id = agent_client_protocol::schema::SessionId::new(\"session-load-cwd\");\n        persistence\n            .persist_turn(\n                \u0026PersistedSessionMeta {\n                    session_id: session_id.0.to_string(),\n                    cwd: workspace,\n                    additional_directories: Vec::new(),\n                    mode: PermissionPosture::Ask,\n                    model: \"deepseek-v4-pro\".to_string(),\n                    reasoning_effort: ReasoningEffort::High,\n                    mcp_servers: Vec::new(),\n                },\n                \u0026[ChatMessage::user(\"hello\")],\n            )\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n\n        let Err(error) = handle_load_session_request(\n            \u0026store,\n            \u0026LoadSessionRequest::new(session_id, state_dir.join(\"other\")),\n            |_| Ok(()),\n        )\n        .await\n        else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected mismatched cwd to fail\"));\n        };\n        assert!(error.to_string().contains(\"persisted for cwd\"));\n\n        Ok(())\n    }\n\n    #[test]\n    fn close_session_removes_session() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let session = handle_new_session_request(\u0026store, \u0026NewSessionRequest::new(\"/tmp\"))?;\n\n        let close_response = handle_close_session_request(\n            \u0026store,\n            \u0026CloseSessionRequest::new(session.session_id.clone()),\n        )?;\n\n        assert_eq!(\n            serde_json::to_value(\u0026close_response)\n                .map_err(agent_client_protocol::Error::into_internal_error)?,\n            serde_json::json!({})\n        );\n\n        let list_response = handle_list_sessions_request(\u0026store, \u0026ListSessionsRequest::new())?;\n        assert!(list_response.sessions.is_empty());\n        Ok(())\n    }\n\n    #[test]\n    fn close_session_rejects_unknown_session() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let unknown_id = agent_client_protocol::schema::SessionId::new(\"nonexistent\");\n\n        let Err(error) =\n            handle_close_session_request(\u0026store, \u0026CloseSessionRequest::new(unknown_id))\n        else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected unknown session id to fail\"));\n        };\n        assert!(error.to_string().contains(\"unknown session id\"));\n        Ok(())\n    }\n\n    #[test]\n    fn logout_request_returns_ok() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let response = handle_logout_request();\n        assert_eq!(\n            serde_json::to_value(\u0026response)\n                .map_err(agent_client_protocol::Error::into_internal_error)?,\n            serde_json::json!({})\n        );\n        Ok(())\n    }\n}\n","traces":[{"line":316,"address":[],"length":0,"stats":{"Line":0}},{"line":317,"address":[],"length":0,"stats":{"Line":0}},{"line":318,"address":[],"length":0,"stats":{"Line":0}},{"line":319,"address":[],"length":0,"stats":{"Line":0}},{"line":320,"address":[],"length":0,"stats":{"Line":0}},{"line":321,"address":[],"length":0,"stats":{"Line":0}},{"line":322,"address":[],"length":0,"stats":{"Line":0}},{"line":323,"address":[],"length":0,"stats":{"Line":0}},{"line":324,"address":[],"length":0,"stats":{"Line":0}},{"line":325,"address":[],"length":0,"stats":{"Line":0}},{"line":326,"address":[],"le ChatCompletionRequest {\n    model: String,\n    messages: Vec\u003cWireMessage\u003e,\n    #[serde(skip_serializing_if = \"Vec::is_empty\")]\n    tools: Vec\u003cWireToolDefinition\u003e,\n    stream: bool,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    reasoning_effort: Option\u003cString\u003e,\n}\n\nimpl LlmClient for DeepSeekClient {\n    fn stream_chat(\n        \u0026self,\n        request: ChatRequest,\n        cancellation_token: CancellationToken,\n    ) -\u003e Result\u003cBoxStream\u003c'static, Result\u003cStreamEvent, DeepSeekError\u003e\u003e, DeepSeekError\u003e {\n        if self.config.api_key().trim().is_empty() {\n            return Err(DeepSeekError::MissingApiKey);\n        }\n\n        let (messages, tools, model, reasoning_effort) = request.into_parts();\n        let body = ChatCompletionRequest {\n            model: model.unwrap_or_else(|| self.config.model().to_string()),\n            messages: messages\n                .into_iter()\n                .map(|message| WireMessage::from(\u0026message))\n                .collect(),\n            tools: tools.iter().map(WireToolDefinition::from).collect(),\n            stream: true,\n            reasoning_effort,\n        };\n\n        let http = self.http.clone();\n        let url = format!(\n            \"{}/chat/completions\",\n            self.config.base_url().trim_end_matches('/')\n        );\n        let api_key = self.config.api_key().to_string();\n\n        let (tx, rx) = mpsc::unbounded_channel::\u003cResult\u003cStreamEvent, DeepSeekError\u003e\u003e();\n\n        tokio::spawn(async move {\n            const MAX_RETRIES: u32 = 3;\n\n            for attempt in 0..=MAX_RETRIES {\n                if attempt \u003e 0 {\n                    let delay_ms = 100_u64 * (1_u64 \u003c\u003c (attempt - 1));\n                    tracing::warn!(\n                        attempt,\n                        delay_ms,\n                        \"retrying DeepSeek SSE stream after retryable transport error\"\n                    );\n                    tokio::time::sleep(std::time::Duration::from_millis(delay_ms)).await;\n                }\n\n                let request = http.post(\u0026url).bearer_auth(\u0026api_key).json(\u0026body);\n\n                let event_source = match EventSource::new(request) {\n                    Ok(es) =\u003e es,\n                    Err(error) =\u003e {\n                        let _ = tx.send(Err(DeepSeekError::from(error)));\n                        return;\n                    }\n                };\n\n                if !matches!(\n                    run_stream_attempt(\n                        event_source,\n                        \u0026tx,\n                        \u0026cancellation_token,\n                        attempt,\n                        MAX_RETRIES\n                    )\n                    .await,\n                    StreamAttemptOutcome::ShouldRetry\n                ) {\n                    return;\n                }\n            }\n        });\n\n        Ok(stream::unfold(rx, |mut rx| async move {\n            rx.recv().await.map(|item| (item, rx))\n        })\n        .boxed())\n    }\n}\n","traces":[{"line":43,"address":[9757232,9757351],"length":1,"stats":{"Line":2}},{"line":45,"address":[9757250],"length":1,"stats":{"Line":2}},{"line":65,"address":[9757392],"length":1,"stats":{"Line":0}},{"line":66,"address":[9757409,9757526],"length":1,"stats":{"Line":0}},{"line":73,"address":[9757376],"length":1,"stats":{"Line":1}},{"line":127,"address":[9754448,9756931,9757196],"length":1,"stats":{"Line":1}},{"line":132,"address":[9754514,9754698],"length":1,"stats":{"Line":3}},{"line":133,"address":[9754892],"length":1,"stats":{"Line":1}},{"line":136,"address":[9754772,9754953],"length":1,"stats":{"Line":3}},{"line":138,"address":[9755105],"length":1,"stats":{"Line":5}},{"line":139,"address":[9755216],"length":1,"stats":{"Line":1}},{"line":143,"address":[9755453,9755374],"length":1,"stats":{"Line":3}},{"li provided explicitly with [`DeepSeekConfig::new`] or loaded\n/// from the process environment with [`DeepSeekConfig::from_env`].\n///\n/// # Examples\n///\n/// ```rust\n/// use deepseek_acp_adapter::deepseek::DeepSeekConfig;\n///\n/// let config = DeepSeekConfig::new(\n///     \"test-key\",\n///     \"https://api.deepseek.com\",\n///     \"deepseek-v4-pro\",\n/// );\n///\n/// assert_eq!(config.base_url(), \"https://api.deepseek.com\");\n/// assert_eq!(config.model(), \"deepseek-v4-pro\");\n/// ```\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct DeepSeekConfig {\n    api_key: String,\n    base_url: String,\n    model: String,\n}\n\nimpl DeepSeekConfig {\n    /// Default `DeepSeek` OpenAI-compatible base URL.\n    pub const DEFAULT_BASE_URL: \u0026str = \"https://api.deepseek.com\";\n    /// Default model used by the adapter.\n    pub const DEFAULT_MODEL: \u0026str = \"deepseek-v4-pro\";\n\n    /// Create a config from explicit values.\n    #[must_use]\n    pub fn new(\n        api_key: impl Into\u003cString\u003e,\n        base_url: impl Into\u003cString\u003e,\n        model: impl Into\u003cString\u003e,\n    ) -\u003e Self {\n        Self {\n            api_key: api_key.into(),\n            base_url: base_url.into(),\n            model: model.into(),\n        }\n    }\n\n    /// Load config from `DEEPSEEK_API_KEY`, `DEEPSEEK_BASE_URL`, and `DEEPSEEK_MODEL`.\n    ///\n    /// # Errors\n    ///\n    /// Returns `MissingApiKey` when the API key is absent or empty.\n    ///\n    /// # Examples\n    ///\n    /// ```rust,no_run\n    /// use deepseek_acp_adapter::deepseek::DeepSeekConfig;\n    ///\n    /// let config = DeepSeekConfig::from_env()?;\n    /// assert!(!config.model().is_empty());\n    /// # Ok::\u003c(), deepseek_acp_adapter::deepseek::DeepSeekError\u003e(())\n    /// ```\n    pub fn from_env() -\u003e Result\u003cSelf, DeepSeekError\u003e {\n        Self::from_environment(\u0026SystemEnvironment)\n    }\n\n    pub(crate) fn from_environment(env: \u0026impl Environment) -\u003e Result\u003cSelf, DeepSeekError\u003e {\n        let api_key = env\n            .var(\"DEEPSEEK_API_KEY\")\n            .ok_or(DeepSeekError::MissingApiKey)?;\n\n        let api_key = api_key.trim().to_string();\n        if api_key.is_empty() {\n            return Err(DeepSeekError::MissingApiKey);\n        }\n\n        let base_url = env\n            .var(\"DEEPSEEK_BASE_URL\")\n            .map(|value| value.trim().to_string())\n            .filter(|value| !value.is_empty())\n            .unwrap_or_else(|| Self::DEFAULT_BASE_URL.to_string());\n\n        let model = env\n            .var(\"DEEPSEEK_MODEL\")\n            .map(|value| value.trim().to_string())\n            .filter(|value| !value.is_empty())\n            .unwrap_or_else(|| Self::DEFAULT_MODEL.to_string());\n\n        Ok(Self {\n            api_key,\n            base_url,\n            model,\n        })\n    }\n\n    pub(crate) fn api_key(\u0026self) -\u003e \u0026str {\n        \u0026self.api_key\n    }\n\n    /// Return the configured base URL.\n    #[must_use]\n    pub fn base_url(\u0026self) -\u003e \u0026str {\n        \u0026self.base_url\n    }\n\n    /// Return the configured model name.\n    #[must_use]\n    pub fn model(\u0026self) -\u003e \u0026str {\n        \u0026self.model\n    }\n}\n\npub(crate) trait Environment {\n    fn var(\u0026self, key: \u0026str) -\u003e Option\u003cString\u003e;\n}\n\npub(crate) struct SystemEnvironment;\n\nimpl Environment for SystemEnvironment {\n    fn var(\u0026self, key: \u0026str) -\u003e Option\u003cString\u003e {\n        env::var_os(key).and_then(|value| value.into_string().ok())\n    }\n}\n","traces":[{"line":39,"address":[9370288,9370768,9370753,9371207,9371227,9370733],"length":1,"stats":{"Line":4}},{"line":45,"address":[9370832,9370381],"length":1,"stats":{"Line":3}},{"line":46,"address":[9370933,9370487],"length":1,"stats":{"Line":4}},{"line":47,"address":[9370566,9371034],"length":1,"stats":{"Line":2}},{"line":66,"address":[9 "lotso","code","deepseek-acp-adapter","src","deepseek","error.rs"],"content":"use thiserror::Error;\n\n/// Errors returned by `DeepSeek` configuration, request setup, or SSE parsing.\n#[derive(Debug, Error)]\npub enum DeepSeekError {\n    /// The `DEEPSEEK_API_KEY` environment variable was not set or was empty.\n    #[error(\"DEEPSEEK_API_KEY is not set\")]\n    MissingApiKey,\n    /// The request could not be cloned for SSE streaming.\n    #[error(\"failed to clone DeepSeek streaming request: {0}\")]\n    RequestClone(#[from] reqwest_eventsource::CannotCloneRequestError),\n    /// The SSE transport failed while streaming events.\n    #[error(\"`DeepSeek` SSE transport error: {0}\")]\n    Transport(Box\u003creqwest_eventsource::Error\u003e),\n    /// The model returned a chunk that could not be decoded.\n    #[error(\"invalid DeepSeek response: {0}\")]\n    InvalidResponse(String),\n    /// The model returned malformed JSON.\n    #[error(\"failed to parse DeepSeek response: {0}\")]\n    Json(#[from] serde_json::Error),\n}\n\nimpl From\u003creqwest_eventsource::Error\u003e for DeepSeekError {\n    fn from(error: reqwest_eventsource::Error) -\u003e Self {\n        Self::Transport(Box::new(error))\n    }\n}\n","traces":[{"line":24,"address":[9841952],"length":1,"stats":{"Line":1}},{"line":25,"address":[9841969],"length":1,"stats":{"Line":1}}],"covered":2,"coverable":2},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","deepseek","mod.rs"],"content":"//! `DeepSeek` client primitives and streaming SSE adapter.\n\nmod client;\nmod config;\nmod error;\nmod stream;\nmod types;\n\npub use client::{DeepSeekClient, LlmClient};\npub use config::DeepSeekConfig;\npub use error::DeepSeekError;\npub use types::{\n    ChatMessage, ChatRequest, FinishReason, MessageRole, StreamEvent, ToolCall, ToolCallDelta,\n    ToolDefinition,\n};\n\n#[cfg(test)]\nmod tests;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","deepseek","stream.rs"],"content":"use std::error::Error as StdError;\n\nuse futures_util::StreamExt;\nuse reqwest_eventsource::{Event, EventSource};\nuse serde::Deserialize;\nuse tokio::sync::mpsc;\nuse tokio_util::sync::CancellationToken;\n\nuse super::{DeepSeekError, FinishReason, StreamEvent, ToolCallDelta};\n\npub(super) enum StreamAttemptOutcome {\n    Complete,\n    Cancelled,\n    ShouldRetry,\n}\n\npub(super) async fn run_stream_attempt(\n    mut event_source: EventSource,\n    tx: \u0026mpsc::UnboundedSender\u003cResult\u003cStreamEvent, DeepSeekError\u003e\u003e,\n    cancellation_token: \u0026CancellationToken,\n    attempt: u32,\n    max_retries: u32,\n) -\u003e StreamAttemptOutcome {\n    let mut saw_finish = false;\n    let mut events_sent: u32 = 0;\n\n    loop {\n        let event = tokio::select! {\n            () = cancellation_token.cancelled() =\u003e return StreamAttemptOutcome::Cancelled,\n            event = event_source.next() =\u003e event,\n        };\n\n        let Some(event) = event else {\n            break;\n        };\n\n        match event {\n            Ok(Event::Open) =\u003e {}\n            Ok(Event::Message(message)) =\u003e {\n                if message.data.trim() == \"[DONE]\" {\n                    break;\n                }\n                match parse_chat_completion_chunk(\u0026message.data) {\n                    Ok(updates) =\u003e {\n                        for update in updates {\n                            if matches!(update, StreamEvent::Finished(_)) {\n                                saw_finish = true;\n                            }\n                            events_sent += 1;\n                            if tx.send(Ok(update)).is_err() {\n                                return StreamAttemptOutcome::Cancelled;\n                            }\n                        }\n                    }\n                    Err(error) =\u003e {\n                        let _ = tx.send(Err(error));\n                        return StreamAttemptOutcome::Cancelled;\n                    }\n                }\n            }\n            Err(error) =\u003e {\n                if events_sent == 0 \u0026\u0026 attempt \u003c max_retries \u0026\u0026 is_retryable_transport_error(\u0026error)\n                {\n                    return StreamAttemptOutcome::ShouldRetry;\n                }\n                let _ = tx.send(Err(error.into()));\n                return StreamAttemptOutcome::Cancelled;\n            }\n        }\n    }\n\n    if !saw_finish \u0026\u0026 !cancellation_token.is_cancelled() {\n        let _ = tx.send(Err(DeepSeekError::InvalidResponse(\n            \"stream ended before a finish reason was received\".to_string(),\n        )));\n    }\n    StreamAttemptOutcome::Complete\n}\n\n/// Returns true when a transport error is safe to retry before any events are emitted.\n///\n/// Only `Transport`-variant errors carrying network-level conditions qualify - these\n/// arise from stale pooled connections, server-side shutdowns, and TCP disconnects.\n/// Parse errors, status errors, and redirect loops are not retryable.\n///\n/// Two broad categories are accepted:\n/// - `is_connect()` / `is_request()`: server dropped the connection before any HTTP\n///   response arrived (e.g. `hyper::Error(IncompleteMessage)` on a stale pool reuse).\n/// - Body/decode errors whose source chain contains a retryable IO kind\n///   (`BrokenPipe`, `ConnectionReset`, `UnexpectedEof`, `ConnectionAborted`): TCP dropped\n///   mid-stream, which is safe to restart only while `events_sent == 0` (guarded by\n///   the caller).\npub(crate) fn is_retryable_transport_error(error: \u0026reqwest_eventsource::Error) -\u003e bool {\n    let reqwest_eventsource::Error::Transport(ref reqwest_error) = *error else {\n        return false;\n    };\n\n    if reqwest_error.is_connect() || reqwest_error.is_request() {\n        return true;\n    }\n\n    let mut current: Option\u003c\u0026(dyn StdError + 'static)\u003e = (reqwest_error as \u0026dyn StdError).source();\n    while let Some(err) = current {\n        if let Some(io) = err.downcast_ref::\u003cstd::io::Error\u003e() {\n            return matches!(\n                io.kind(),\n                std::io::ErrorKind::BrokenPipe\n                    | std::io::ErrorKind::ConnectionReset\n                    | std::io::ErrorKind::UnexpectedEof\n                    | std::io::ErrorKind::ConnectionAborted\n            );\n        }\n        current = err.source();\n    }\n    false\n}\n\n#[derive(Debug, Deserialize)]\nstruct ChatCompletionChunk {\n    choices: Vec\u003cChatChoice\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct ChatChoice {\n    delta: ChatDelta,\n    #[serde(default)]\n    finish_reason: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Default, Deserialize)]\nstruct ChatDelta {\n    #[serde(default)]\n    reasoning_content: Option\u003cString\u003e,\n    #[serde(default)]\n    content: Option\u003cString\u003e,\n    #[serde(default)]\n    tool_calls: Vec\u003cChatToolCallDelta\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct ChatToolCallDelta {\n    index: usize,\n    #[serde(default)]\n    id: Option\u003cString\u003e,\n    function: Option\u003cChatToolCallFunctionDelta\u003e,\n}\n\n#[derive(Debug, Default, Deserialize)]\nstruct ChatToolCallFunctionDelta {\n    #[serde(default)]\n    name: Option\u003cString\u003e,\n    #[serde(default)]\n    arguments: Option\u003cString\u003e,\n}\n\npub(crate) fn parse_chat_completion_chunk(\n    payload: \u0026str,\n) -\u003e Result\u003cVec\u003cStreamEvent\u003e, DeepSeekError\u003e {\n    let chunk: ChatCompletionChunk = serde_json::from_str(payload)?;\n    let Some(choice) = chunk.choices.into_iter().next() else {\n        return Err(DeepSeekError::InvalidResponse(\n            \"chat completion chunk did not include any choices\".to_string(),\n        ));\n    };\n\n    let mut updates = Vec::new();\n\n    if let Some(reasoning) = choice\n        .delta\n        .reasoning_content\n        .filter(|value| !value.is_empty())\n    {\n        updates.push(StreamEvent::Thought(reasoning));\n    }\n\n    if let Some(content) = choice.delta.content.filter(|value| !value.is_empty()) {\n        updates.push(StreamEvent::Message(content));\n    }\n\n    for tool_call in choice.delta.tool_calls {\n        updates.push(StreamEvent::ToolCallDelta(ToolCallDelta::new(\n            tool_call.index,\n            tool_call.id,\n            tool_call\n                .function\n                .as_ref()\n                .and_then(|function| function.name.clone()),\n            tool_call.function.and_then(|function| function.arguments),\n        )));\n    }\n\n    if let Some(finish_reason) = choice.finish_reason {\n        updates.push(StreamEvent::Finished(FinishReason::from_api(\n            \u0026finish_reason,\n        )));\n    }\n\n    Ok(updates)\n}\n","traces":[{"line":17,"address":[9863152],"length":1,"stats":{"Line":2}},{"line":24,"address":[9587688],"length":1,"stats":{"Line":2}},{"line":25,"address":[9587695],"length":1,"stats":{"Line":2}},{"line":27,"address":[9587705,9589375],"length":1,"stats":{"Line":3}},{"line":28,"address":[9589509,9588083,9589460,9587731,9588203,9589405,9587749,9587844,9591376,9591499,9587814],"length":1,"stats":{"Line":12}},{"line":29,"address":[9588137,9589407],"length":1,"stats":{"Line":2}},{"line":30,"address":[9588147,9589441],"length":1,"stats":{"Line":3}},{"line":33,"address":[9588173,9588270],"length":1,"stats":{"Line":2}},{"line":37,"address":[9588412,9588296],"length":1,"stats":{"Line":2}},{"line":39,"address":[9588449],"length":1,"stats":{"Line":1}},{"line":40,"address":[9588545,9588673],"length":1,"stats":{"Line":2}},{"line":43,"address":[9588821,9588756],"length":1,"stats":{"Line":2}},{"line":44,"address":[9588965],"length":1,"stats":{"Line":1}},{"line":45,"address":[9588997,9590430,9589179],"length":1,"stats":{"Line":3}},{"line":46,"address":[9590047,9589250,9589971],"length":1,"stats":{"Line":3}},{"line":47,"
