shReason, MessageRole, StreamEvent, ToolCall,\n    ToolCallDelta, ToolDefinition,\n};\n\nstruct FakeEnvironment {\n    values: BTreeMap\u003c\u0026'static str, \u0026'static str\u003e,\n}\n\nimpl Environment for FakeEnvironment {\n    fn var(\u0026self, key: \u0026str) -\u003e Option\u003cString\u003e {\n        self.values.get(key).map(|value| (*value).to_string())\n    }\n}\n\nasync fn spawn_sse_server(\n    response_body: String,\n    captured_request_body: Arc\u003cMutex\u003cOption\u003cString\u003e\u003e\u003e,\n) -\u003e Result\u003c(String, tokio::task::JoinHandle\u003cResult\u003c(), String\u003e\u003e), DeepSeekError\u003e {\n    let listener = TcpListener::bind(\"127.0.0.1:0\")\n        .await\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?;\n    let address = listener\n        .local_addr()\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?;\n\n    let server = tokio::spawn(async move {\n        let (mut socket, _) = listener.accept().await.map_err(|error| error.to_string())?;\n        let mut request = Vec::new();\n        let mut buffer = [0_u8; 4096];\n\n        let header_end = loop {\n            let read = socket\n                .read(\u0026mut buffer)\n                .await\n                .map_err(|error| error.to_string())?;\n            if read == 0 {\n                return Err(\"connection closed before request completed\".to_string());\n            }\n            request.extend_from_slice(\u0026buffer[..read]);\n            if let Some(index) = request.windows(4).position(|window| window == b\"\\r\\n\\r\\n\") {\n                break index + 4;\n            }\n        };\n\n        let headers =\n            String::from_utf8(request[..header_end].to_vec()).map_err(|error| error.to_string())?;\n        let content_length = headers\n            .lines()\n            .find_map(|line| {\n                let (name, value) = line.split_once(':')?;\n                if name.eq_ignore_ascii_case(\"content-length\") {\n                    value.trim().parse::\u003cusize\u003e().ok()\n                } else {\n                    None\n                }\n            })\n            .ok_or_else(|| \"missing Content-Length header\".to_string())?;\n\n        let mut body = request[header_end..].to_vec();\n        while body.len() \u003c content_length {\n            let read = socket\n                .read(\u0026mut buffer)\n                .await\n                .map_err(|error| error.to_string())?;\n            if read == 0 {\n                break;\n            }\n            body.extend_from_slice(\u0026buffer[..read]);\n        }\n        body.truncate(content_length);\n\n        let body_text = String::from_utf8(body).map_err(|error| error.to_string())?;\n        {\n            let mut guard = captured_request_body\n                .lock()\n                .map_err(|error| error.to_string())?;\n            *guard = Some(body_text);\n        }\n\n        let response = format!(\n            \"HTTP/1.1 200 OK\\r\\nContent-Type: text/event-stream\\r\\nContent-Length: {}\\r\\nConnection: close\\r\\n\\r\\n{}\",\n            response_body.len(),\n            response_body\n        );\n        socket\n            .write_all(response.as_bytes())\n            .await\n            .map_err(|error| error.to_string())?;\n        socket.shutdown().await.map_err(|error| error.to_string())?;\n        Ok(())\n    });\n\n    Ok((format!(\"http://{address}\"), server))\n}\n\n#[test_log::test]\nfn config_uses_defaults_and_requires_key() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let environment = FakeEnvironment {\n        values: BTreeMap::from([(\"DEEPSEEK_API_KEY\", \"secret\")]),\n    };\n\n    let config = DeepSeekConfig::from_environment(\u0026environment)?;\n\n    assert_eq!(config.base_url(), DeepSeekConfig::DEFAULT_BASE_URL);\n    assert_eq!(config.model(), DeepSeekConfig::DEFAULT_MODEL);\n\n    let missing_key = FakeEnvironment {\n        values: BTreeMap::new(),\n    };\n\n    let Err(error) = DeepSeekConfig::from_environment(\u0026missing_key) else {\n        return Err(DeepSeekError::InvalidResponse(\n            \"expected missing API key to fail\".to_string(),\n        ));\n    };\n\n    assert!(matches!(error, DeepSeekError::MissingApiKey));\n    assert_eq!(error.to_string(), \"DEEPSEEK_API_KEY is not set\");\n\n    Ok(())\n}\n\n#[test_log::test]\nfn config_trims_values_and_defaults_blank_entries() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let environment = FakeEnvironment {\n        values: BTreeMap::from([\n            (\"DEEPSEEK_API_KEY\", \"  secret-token  \"),\n            (\"DEEPSEEK_BASE_URL\", \"   \"),\n            (\"DEEPSEEK_MODEL\", \"  custom-model  \"),\n        ]),\n    };\n\n    let config = DeepSeekConfig::from_environment(\u0026environment)?;\n\n    assert_eq!(config.base_url(), DeepSeekConfig::DEFAULT_BASE_URL);\n    assert_eq!(config.model(), \"custom-model\");\n\n    Ok(())\n}\n\n#[test_log::test]\nfn parses_reasoning_and_text_chunks_in_order() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let fixture = r#\"\n    {\n      \"choices\": [\n        {\n          \"delta\": {\n            \"reasoning_content\": \"thinking\",\n            \"content\": \"answer\"\n          },\n          \"finish_reason\": \"stop\"\n        }\n      ]\n    }\n    \"#;\n\n    let updates = parse_chat_completion_chunk(fixture)?;\n\n    assert_eq!(\n        updates,\n        vec![\n            StreamEvent::Thought(\"thinking\".to_string()),\n            StreamEvent::Message(\"answer\".to_string()),\n            StreamEvent::Finished(FinishReason::EndTurn),\n        ]\n    );\n\n    Ok(())\n}\n\n#[test_log::test]\nfn parses_empty_chunks_and_unknown_finish_reasons() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let fixture = r#\"\n    {\n      \"choices\": [\n        {\n          \"delta\": {\n            \"reasoning_content\": \"\",\n            \"content\": \"\"\n          },\n          \"finish_reason\": \"rate_limit\"\n        }\n      ]\n    }\n    \"#;\n\n    let updates = parse_chat_completion_chunk(fixture)?;\n\n    assert_eq!(\n        updates,\n        vec![StreamEvent::Finished(FinishReason::Other(\n            \"rate_limit\".to_string()\n        ))]\n    );\n\n    Ok(())\n}\n\n#[test_log::test]\nfn parses_tool_call_deltas() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let fixture = r#\"\n    {\n      \"choices\": [\n        {\n          \"delta\": {\n            \"tool_calls\": [\n              {\n                \"index\": 0,\n                \"id\": \"call-1\",\n                \"function\": {\n                  \"name\": \"read_file\",\n                  \"arguments\": \"{\\\"path\\\":\\\"Cargo.toml\\\"}\"\n                }\n              }\n            ]\n          },\n          \"finish_reason\": \"tool_calls\"\n        }\n      ]\n    }\n    \"#;\n\n    let updates = parse_chat_completion_chunk(fixture)?;\n\n    let StreamEvent::ToolCallDelta(delta) = \u0026updates[0] else {\n        return Err(DeepSeekError::InvalidResponse(\n            \"expected tool call delta\".to_string(),\n        ));\n    };\n    assert_eq!(delta.index(), 0);\n    assert_eq!(delta.id(), Some(\"call-1\"));\n    assert_eq!(delta.name(), Some(\"read_file\"));\n    assert_eq!(delta.arguments(), Some(r#\"{\"path\":\"Cargo.toml\"}\"#));\n    assert_eq!(updates[1], StreamEvent::Finished(FinishReason::ToolCalls));\n\n    Ok(())\n}\n\n#[test_log::test]\nfn rejects_chunks_without_choices() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let fixture = r#\"{ \"choices\": [] }\"#;\n\n    let Err(error) = parse_chat_completion_chunk(fixture) else {\n        return Err(DeepSeekError::InvalidResponse(\n            \"expected empty choice list to fail\".to_string(),\n        ));\n    };\n\n    assert!(matches!(error, DeepSeekError::InvalidResponse(_)));\n    assert_eq!(\n        error.to_string(),\n        \"invalid DeepSeek response: chat completion chunk did not include any choices\"\n    );\n\n    Ok(())\n}\n\n#[test_log::test]\nfn message_role_round_trips_to_wire_variant() {\n    let message = ChatMessage::assistant(\"hi\");\n\n    assert_eq!(message.role(), MessageRole::Assistant);\n    assert_eq!(message.content(), \"hi\");\n}\n\n#[test_log::test]\nfn client_rejects_empty_api_key() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let client = DeepSeekClient::new(DeepSeekConfig::new(\n        \"\",\n        \"https://api.deepseek.com\",\n        \"deepseek-v4-pro\",\n    ));\n    let request = ChatRequest::new(vec![ChatMessage::user(\"hello\")]);\n\n    let Err(error) = client.stream_chat(request, CancellationToken::new()) else {\n        return Err(DeepSeekError::InvalidResponse(\n            \"expected empty API key to be rejected\".to_string(),\n        ));\n    };\n\n    assert!(matches!(error, DeepSeekError::MissingApiKey));\n    Ok(())\n}\n\n#[test_log::test(tokio::test)]\nasync fn deepseek_client_stream_chat_serializes_request_and_parses_events()\n-\u003e Result\u003c(), DeepSeekError\u003e {\n    let captured_request_body = Arc::new(Mutex::new(None::\u003cString\u003e));\n    let response_body = concat!(\n        \"data: {\\\"choices\\\":[{\\\"delta\\\":{\\\"reasoning_content\\\":\\\"thinking\\\",\\\"content\\\":\\\"answer\\\",\\\"tool_calls\\\":[{\\\"index\\\":0,\\\"id\\\":\\\"call-1\\\",\\\"function\\\":{\\\"name\\\":\\\"echo\\\",\\\"arguments\\\":\\\"{\\\\\\\"value\\\\\\\":1}\\\"}}]},\\\"finish_reason\\\":\\\"content_filter\\\"}]}\\n\\n\",\n        \"data: [DONE]\\n\\n\"\n    )\n    .to_string();\n    let (base_url, server) =\n        spawn_sse_server(response_body, Arc::clone(\u0026captured_request_body)).await?;\n    let expected_base_url = base_url.clone();\n    let client = DeepSeekClient::new(DeepSeekConfig::new(\"secret\", base_url, \"mock-model\"));\n    let config = client.config();\n    assert_eq!(config.base_url(), expected_base_url);\n    assert_eq!(config.model(), \"mock-model\");\n\n    let tool_definition = ToolDefinition::new(\n        \"echo\",\n        \"Echo a value\",\n        serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"value\": { \"type\": \"integer\" }\n            }\n        }),\n    );\n    let request = ChatRequest::new(vec![\n        ChatMessage::system(\"system prompt\"),\n        ChatMessage::user(\"hello\"),\n        ChatMessage::assistant_with_tool_calls(\n            \"assistant\",\n            vec![ToolCall::new(\"call-1\", \"echo\", r#\"{\"value\":1}\"#)],\n        ),\n        ChatMessage::tool_result(\"call-1\", \"tool output\"),\n    ])\n    .with_tools(vec![tool_definition.clone()])\n    .with_model(\"request-model\")\n    .with_reasoning_effort(\"max\");\n\n    assert_eq!(request.messages().len(), 4);\n    assert_eq!(request.tools().len(), 1);\n    assert_eq!(request.model(), Some(\"request-model\"));\n    assert_eq!(request.reasoning_effort(), Some(\"max\"));\n\n    let mut stream = client.stream_chat(request, CancellationToken::new())?;\n    let mut events = Vec::new();\n    while let Some(item) = stream.next().await {\n        events.push(item?);\n    }\n\n    assert_eq!(\n        events,\n        vec![\n            StreamEvent::Thought(\"thinking\".to_string()),\n            StreamEvent::Message(\"answer\".to_string()),\n            StreamEvent::ToolCallDelta(ToolCallDelta::new(\n                0,\n                Some(\"call-1\".to_string()),\n                Some(\"echo\".to_string()),\n                Some(r#\"{\"value\":1}\"#.to_string()),\n            )),\n            StreamEvent::Finished(FinishReason::Refusal),\n        ]\n    );\n\n    server\n        .await\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?\n        .map_err(DeepSeekError::InvalidResponse)?;\n\n    let request_guard = captured_request_body\n        .lock()\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?;\n    let request_body = request_guard\n        .as_ref()\n        .ok_or_else(|| DeepSeekError::InvalidResponse(\"missing request body\".to_string()))?;\n    let request_json: serde_json::Value = serde_json::from_str(request_body)?;\n\n    assert_eq!(request_json[\"model\"], \"request-model\");\n    assert_eq!(request_json[\"reasoning_effort\"], \"max\");\n    assert_eq!(request_json[\"stream\"], serde_json::json!(true));\n    assert_eq!(request_json[\"messages\"][0][\"role\"], \"system\");\n    assert_eq!(request_json[\"messages\"][1][\"role\"], \"user\");\n    assert_eq!(\n        request_json[\"messages\"][2][\"tool_calls\"][0][\"function\"][\"name\"],\n        \"echo\"\n    );\n    assert_eq!(request_json[\"messages\"][3][\"role\"], \"tool\");\n    assert_eq!(request_json[\"messages\"][3][\"tool_call_id\"], \"call-1\");\n    assert_eq!(request_json[\"tools\"][0][\"type\"], \"function\");\n    assert_eq!(request_json[\"tools\"][0][\"function\"][\"name\"], \"echo\");\n\n    Ok(())\n}\n\n#[test_log::test(tokio::test)]\nasync fn deepseek_client_reports_stream_end_without_finish_reason() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let captured_request_body = Arc::new(Mutex::new(None::\u003cString\u003e));\n    let response_body = concat!(\n        \"data: {\\\"choices\\\":[{\\\"delta\\\":{\\\"content\\\":\\\"partial\\\"}}]}\\n\\n\",\n        \"data: [DONE]\\n\\n\"\n    )\n    .to_string();\n    let (base_url, server) =\n        spawn_sse_server(response_body, Arc::clone(\u0026captured_request_body)).await?;\n    let client = DeepSeekClient::new(DeepSeekConfig::new(\"secret\", base_url, \"mock-model\"));\n    let mut stream = client.stream_chat(\n        ChatRequest::new(vec![ChatMessage::user(\"hello\")]),\n        CancellationToken::new(),\n    )?;\n\n    let first_event = stream.next().await.ok_or_else(|| {\n        DeepSeekError::InvalidResponse(\"expected message event before stream error\".to_string())\n    })??;\n    assert_eq!(first_event, StreamEvent::Message(\"partial\".to_string()));\n\n    let Err(error) = stream\n        .next()\n        .await\n        .ok_or_else(|| DeepSeekError::InvalidResponse(\"expected stream error\".to_string()))?\n    else {\n        return Err(DeepSeekError::InvalidResponse(\n            \"expected missing finish reason to fail\".to_string(),\n        ));\n    };\n    assert!(matches!(error, DeepSeekError::InvalidResponse(_)));\n    assert_eq!(\n        error.to_string(),\n        \"invalid DeepSeek response: stream ended before a finish reason was received\"\n    );\n\n    server\n        .await\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?\n        .map_err(DeepSeekError::InvalidResponse)?;\n\n    let request_guard = captured_request_body\n        .lock()\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?;\n    assert!(request_guard.as_ref().is_some());\n\n    Ok(())\n}\n\n#[test_log::test]\nfn deepseek_error_from_event_source_error_uses_transport_variant() {\n    let error = DeepSeekError::from(reqwest_eventsource::Error::StreamEnded);\n\n    assert!(matches!(error, DeepSeekError::Transport(_)));\n    assert_eq!(\n        error.to_string(),\n        \"`DeepSeek` SSE transport error: Stream ended\"\n    );\n}\n\n#[test_log::test]\nfn is_retryable_transport_error_returns_false_for_non_transport_errors() {\n    assert!(!is_retryable_transport_error(\n        \u0026reqwest_eventsource::Error::StreamEnded\n    ));\n    let Err(utf8_error) = String::from_utf8(vec![0xFF_u8]) else {\n        return;\n    };\n    assert!(!is_retryable_transport_error(\n        \u0026reqwest_eventsource::Error::Utf8(utf8_error)\n    ));\n}\n\n#[test_log::test(tokio::test)]\nasync fn retries_stream_on_connection_drop_before_events() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let listener = TcpListener::bind(\"127.0.0.1:0\")\n        .await\n        .map_err(|e| DeepSeekError::InvalidResponse(e.to_string()))?;\n    let addr = listener\n        .local_addr()\n        .map_err(|e| esponse(\"expected finish event\".to_string()))??;\n    assert_eq!(event, StreamEvent::Finished(FinishReason::EndTurn));\n\n    server\n        .await\n        .map_err(|e| DeepSeekError::InvalidResponse(e.to_string()))?\n        .map_err(DeepSeekError::InvalidResponse)?;\n\n    Ok(())\n}\n\n#[test_log::test]\nfn deepseek_config_rejects_blank_api_key_from_environment() {\n    let environment = FakeEnvironment {\n        values: BTreeMap::from([(\"DEEPSEEK_API_KEY\", \"   \")]),\n    };\n\n    assert!(matches!(\n        DeepSeekConfig::from_environment(\u0026environment),\n        Err(DeepSeekError::MissingApiKey)\n    ));\n}\n\n#[test_log::test]\nfn finish_reason_length_maps_to_max_tokens() {\n    assert_eq!(FinishReason::from_api(\"length\"), FinishReason::MaxTokens);\n}\n\n#[test_log::test]\nfn finish_reason_tool_calls_maps_to_tool_calls() {\n    assert_eq!(\n        FinishReason::from_api(\"tool_calls\"),\n        FinishReason::ToolCalls\n    );\n}\n\n#[test_log::test]\nfn finish_reason_content_filter_maps_to_refusal() {\n    assert_eq!(\n        FinishReason::from_api(\"content_filter\"),\n        FinishReason::Refusal\n    );\n}\n\n#[test_log::test]\nfn finish_reason_stop_maps_to_end_turn() {\n    assert_eq!(FinishReason::from_api(\"stop\"), FinishReason::EndTurn);\n}\n\n#[test_log::test]\nfn finish_reason_unknown_maps_to_other() {\n    assert!(matches!(\n        FinishReason::from_api(\"some_unknown_reason\"),\n        FinishReason::Other(_)\n    ));\n}\n\n#[test_log::test]\nfn parse_chunk_with_invalid_json_fails() {\n    assert!(matches!(\n        parse_chat_completion_chunk(\"not json\"),\n        Err(DeepSeekError::Json(_))\n    ));\n}\n\n#[test_log::test]\nfn chat_request_model_and_reasoning_effort_accessors() {\n    let request = ChatRequest::new(vec![ChatMessage::user(\"hello\")])\n        .with_model(\"custom-model\")\n        .with_reasoning_effort(\"medium\");\n\n    assert_eq!(request.model(), Some(\"custom-model\"));\n    assert_eq!(request.reasonin \n        }),\n    );\n\n    assert_eq!(definition.name(), \"echo\");\n    assert_eq!(definition.description(), \"Echo a value\");\n    assert_eq!(\n        definition.parameters(),\n        \u0026serde_json::json!({\n            \"type\": \"object\",\n            \"properties\": {\n                \"value\": { \"type\": \"integer\" }\n            }\n        })\n    );\n}\n\n#[test_log::test(tokio::test)]\nasync fn deepseek_client_reports_parse_errors_from_sse_payloads() -\u003e Result\u003c(), DeepSeekError\u003e {\n    let captured_request_body = Arc::new(Mutex::new(None::\u003cString\u003e));\n    let response_body = \"data: not-json\\n\\n\".to_string();\n    let (base_url, server) =\n        spawn_sse_server(response_body, Arc::clone(\u0026captured_request_body)).await?;\n    let client = DeepSeekClient::new(DeepSeekConfig::new(\"secret\", base_url, \"mock-model\"));\n    let mut stream = client.stream_chat(\n        ChatRequest::new(vec![ChatMessage::user(\"hello\")]),\n        CancellationToken::new(),\n    )?;\n\n    let Err(error) = stream\n        .next()\n        .await\n        .ok_or_else(|| DeepSeekError::InvalidResponse(\"expected parse error\".to_string()))?\n    else {\n        return Err(DeepSeekError::InvalidResponse(\n            \"expected invalid JSON to fail\".to_string(),\n        ));\n    };\n    assert!(matches!(error, DeepSeekError::Json(_)));\n\n    server\n        .await\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?\n        .map_err(DeepSeekError::InvalidResponse)?;\n\n    let request_guard = captured_request_body\n        .lock()\n        .map_err(|error| DeepSeekError::InvalidResponse(error.to_string()))?;\n    assert!(request_guard.as_ref().is_some());\n\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","deepseek","types.rs"],"content":"use serde::{Deserialize, Serialize};\n\n/// Conversation role encoded in a chat-completions request.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"lowercase\")]\npub enum MessageRole {\n    /// System instruction message.\n    System,\n    /// User input message.\n    User,\n    /// Assistant continuation message.\n    Assistant,\n    /// Tool result message.\n    Tool,\n}\n\nimpl MessageRole {\n    pub(crate) const fn as_str(self) -\u003e \u0026'static str {\n        match self {\n            Self::System =\u003e \"system\",\n            Self::User =\u003e \"user\",\n            Self::Assistant =\u003e \"assistant\",\n            Self::Tool =\u003e \"tool\",\n        }\n    }\n}\n\n/// A single chat message passed to `DeepSeek`.\n///\n/// Use constructor helpers such as [`ChatMessage::system`] and\n/// [`ChatMessage::tool_result`] to keep role-specific fields consistent.\n///\n/// # Examples\n///\n/// ```rust\n/// use deepseek_acp_adapter::deepseek::{ChatMessage, MessageRole, ToolCall};\n///\n/// let assistant = ChatMessage::assistant_with_tool_calls(\n///     \"I need to inspect a file first.\",\n///     vec![ToolCall::new(\"call-1\", \"read_file\", r#\"{\"path\":\"src/lib.rs\"}\"#)],\n/// );\n///\n/// assert_eq!(assistant.role(), MessageRole::Assistant);\n/// assert_eq!(assistant.tool_calls()[0].name(), \"read_file\");\n/// ```\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct ChatMessage {\n    role: MessageRole,\n    content: String,\n    tool_calls: Vec\u003cToolCall\u003e,\n    tool_call_id: Option\u003cString\u003e,\n}\n\nimpl ChatMessage {\n    /// Create a system message.\n    #[must_use]\n    pub fn system(content: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            role: MessageRole::System,\n            content: content.into(),\n            tool_calls: Vec::new(),\n            tool_call_id: None,\n        }\n    }\n\n    /// Create a user message.\n    #[must_use]\n    pub fn user(content: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            role: MessageRole::User,\n            content: content.into(),\n            tool_calls: Vec::new(),\n            tool_call_id: None,\n        }\n    }\n\n    /// Create an assistant message.\n    #[must_use]\n    pub fn assistant(content: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            role: MessageRole::Assistant,\n            content: content.into(),\n            tool_calls: Vec::new(),\n            tool_call_id: None,\n        }\n    }\n\n    /// Create an assistant message that requested tool calls.\n    #[must_use]\n    pub fn assistant_with_tool_calls(\n        content: impl Into\u003cString\u003e,\n        tool_calls: Vec\u003cToolCall\u003e,\n    ) -\u003e Self {\n        Self {\n            role: MessageRole::Assistant,\n            content: content.into(),\n            tool_calls,\n            tool_call_id: None,\n        }\n    }\n\n    /// Create a tool result message.\n    #[must_use]\n    pub fn tool_result(tool_call_id: impl Into\u003cString\u003e, content: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            role: MessageRole::Tool,\n            content: content.into(),\n            tool_calls: Vec::new(),\n            tool_call_id: Some(tool_call_id.into()),\n        }\n    }\n\n    /// Return the message role.\n    #[must_use]\n    pub const fn role(\u0026self) -\u003e MessageRole {\n        self.role\n    }\n\n    /// Return the message content.\n    #[must_use]\n    pub fn content(\u0026self) -\u003e \u0026str {\n        \u0026self.content\n    }\n\n    /// Return assistant tool calls attached to this message.\n    #[must_use]\n    pub fn tool_calls(\u0026self) -\u003e \u0026[ToolCall] {\n        \u0026self.tool_calls\n    }\n\n    /// Return the tool call id for a tool result message.\n    #[must_use]\n    pub fn tool_call_id(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.tool_call_id.as_deref()\n    }\n}\n\n#[derive(Debug, Serialize)]\npub(crate) struct WireMessage {\n    role: String,\n    content: String,\n    #[serde(skip_serializing_if = \"Vec::is_empty\")]\n    tool_calls: Vec\u003cWireToolCall\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    tool_call_id: Option\u003cString\u003e,\n}\n\nimpl From\u003c\u0026ChatMessage\u003e for WireMessage {\n    fn from(message: \u0026ChatMessage) -\u003e Self {\n        Self {\n            role: message.role.as_str().to_string(),\n            content: message.content.clone(),\n            tool_calls: message.tool_calls.iter().map(WireToolCall::from).collect(),\n            tool_call_id: message.tool_call_id.clone(),\n        }\n    }\n}\n\n/// A callable function advertised to `DeepSeek`.\n///\n/// The `parameters` value should be a JSON Schema object describing the\n/// expected argument shape.\n///\n/// # Examples\n///\n/// ```rust\n/// use deepseek_acp_adapter::deepseek::ToolDefinition;\n///\n/// let tool = ToolDefinition::new(\n///     \"grep\",\n///     \"Search files for a regular expression\",\n///     serde_json::json!({\n///         \"type\": \"object\",\n///         \"properties\": {\n///             \"pattern\": { \"type\": \"string\" }\n///         },\n///         \"required\": [\"pattern\"],\n///         \"additionalProperties\": false\n///     }),\n/// );\n///\n/// assert_eq!(tool.name(), \"grep\");\n/// ```\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct ToolDefinition {\n    name: String,\n    description: String,\n    parameters: serde_json::Value,\n}\n\nimpl ToolDefinition {\n    /// Create a tool definition.\n    #[must_use]\n    pub fn new(\n        name: impl Into\u003cString\u003e,\n        description: impl Into\u003cString\u003e,\n        parameters: serde_json::Value,\n    ) -\u003e Self {\n        Self {\n            name: name.into(),\n            description: description.into(),\n            parameters,\n        }\n    }\n\n    /// Return the function name.\n    #[must_use]\n    pub fn name(\u0026self) -\u003e \u0026str {\n        \u0026self.name\n    }\n\n    /// Return the function description.\n    #[must_use]\n    pub fn description(\u0026self) -\u003e \u0026str {\n        \u0026self.description\n    }\n\n    /// Return the JSON schema parameters.\n    #[must_use]\n    pub fn parameters(\u0026self) -\u003e \u0026serde_json::Value {\n        \u0026self.parameters\n    }\n}\n\n/// A complete tool call requested by the model.\n///\n/// Instances of this type usually come from accumulated streamed\n/// [`ToolCallDelta`] fragments once the model has finished emitting a tool\n/// request.\n///\n/// # Examples\n///\n/// ```rust\n/// use deepseek_acp_adapter::deepseek::ToolCall;\n///\n/// let call = ToolCall::new(\"call-1\", \"read_file\", r#\"{\"path\":\"Cargo.toml\"}\"#);\n///\n/// assert_eq!(call.id(), \"call-1\");\n/// assert_eq!(call.arguments(), r#\"{\"path\":\"Cargo.toml\"}\"#);\n/// ```\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct ToolCall {\n    id: String,\n    name: String,\n    arguments: String,\n}\n\nimpl ToolCall {\n    /// Create a complete tool call.\n    #[must_use]\n    pub fn new(\n        id: impl Into\u003cString\u003e,\n        name: impl Into\u003cString\u003e,\n        arguments: impl Into\u003cString\u003e,\n    ) -\u003e Self {\n        Self {\n            id: id.into(),\n            name: name.into(),\n            arguments: arguments.into(),\n        }\n    }\n\n    /// Return the provider tool-call id.\n    #[must_use]\n    pub fn id(\u0026self) -\u003e \u0026str {\n        \u0026self.id\n    }\n\n    /// Return the function name.\n    #[must_use]\n    pub fn name(\u0026self) -\u003e \u0026str {\n        \u0026self.name\n    }\n\n    /// Return the raw JSON argument string.\n    #[must_use]\n    pub fn arguments(\u0026self) -\u003e \u0026str {\n        \u0026self.arguments\n    }\n}\n\n#[derive(Debug, Serialize)]\npub(crate) struct WireToolDefinition {\n    r#type: \u0026'static str,\n    function: WireToolFunctionDefinition,\n}\n\nimpl From\u003c\u0026ToolDefinition\u003e for WireToolDefinition {\n    fn from(definition: \u0026ToolDefinition) -\u003e Self {\n        Self {\n            r#type: \"function\",\n            function: WireToolFunctionDefinition {\n                name: definition.name.clone(),\n                description: definition.description.clone(),\n                parameters: definition.parameters.clone(),\n            },\n        }\n    }\n}\n\n#[derive(Debug, Serialize)]\nstruct WireToolFunctionDefinition {\n    name: String,\n    description: String,\n    parameters: serde_json::Value,\n}\n\n#[derive(Debug, Serialize)]\nstruct WireToolCall {\n    id: String,\n    r#type: \u0026'static str,\n    function: WireToolCallFunction,\n}\n\nimpl From\u003c\u0026ToolCall\u003e for WireToolCall {\n    fn from(call: \u0026ToolCall) -\u003e Self {\n        Self {\n            id: call.id.clone(),\n            r#type: \"function\",\n            function: WireToolCallFunction {\n                name: call.name.clone(),\n                arguments: call.arguments.clone(),\n            },\n        }\n    }\n}\n\n#[derive(Debug, Serialize)]\nstruct WireToolCallFunction {\n    name: String,\n    arguments: String,\n}\n\n/// A chat-completions request that can be streamed from `DeepSeek`.\n///\n/// Requests are immutable builder values: start with [`ChatRequest::new`]\n/// and then add optional tools, model overrides, or reasoning effort.\n///\n/// # Examples\n///\n/// ```rust\n/// use deepseek_acp_adapter::deepseek::{ChatMessage, ChatRequest};\n///\n/// let request = ChatRequest::new(vec![ChatMessage::user(\"Summarize the diff\")])\n///     .with_model(\"deepseek-v4-flash\")\n///     .with_reasoning_effort(\"high\");\n///\n/// assert_eq!(request.model(), Some(\"deepseek-v4-flash\"));\n/// assert_eq!(request.reasoning_effort(), Some(\"high\"));\n/// ```\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct ChatRequest {\n    messages: Vec\u003cChatMessage\u003e,\n    tools: Vec\u003cToolDefinition\u003e,\n    model: Option\u003cString\u003e,\n    reasoning_effort: Option\u003cString\u003e,\n}\n\nimpl ChatRequest {\n    /// Create a new request from a list of chat messages.\n    #[must_use]\n    pub fn new(messages: Vec\u003cChatMessage\u003e) -\u003e Self {\n        Self {\n            messages,\n            tools: Vec::new(),\n            model: None,\n            reasoning_effort: None,\n        }\n    }\n\n    /// Attach tool definitions to the request.\n    #[must_use]\n    pub fn with_tools(mut self, tools: Vec\u003cToolDefinition\u003e) -\u003e Self {\n        self.tools = tools;\n        self\n    }\n\n    /// Override the configured model for this request.\n    #[must_use]\n    pub fn with_model(mut self, model: impl Into\u003cString\u003e) -\u003e Self {\n        self.model = Some(model.into());\n        self\n    }\n\n    /// Set the model reasoning effort for this request.\n    #[must_use]\n    pub fn with_reasoning_effort(mut self, reasoning_effort: impl Into\u003cString\u003e) -\u003e Self {\n        self.reasoning_effort = Some(reasoning_effort.into());\n        self\n    }\n\n    pub(crate) fn into_parts(\n        self,\n    ) -\u003e (\n        Vec\u003cChatMessage\u003e,\n        Vec\u003cToolDefinition\u003e,\n        Option\u003cString\u003e,\n        Option\u003cString\u003e,\n    ) {\n        (self.messages, self.tools, self.model, self.reasoning_effort)\n    }\n\n    /// Return the request messages.\n    #[must_use]\n    pub fn messages(\u0026self) -\u003e \u0026[ChatMessage] {\n        \u0026self.messages\n    }\n\n    /// Return request tool definitions.\n    #[must_use]\n    pub fn tools(\u0026self) -\u003e \u0026[ToolDefinition] {\n        \u0026self.tools\n    }\n\n    /// Return the request model override.\n    #[must_use]\n    pub fn model(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.model.as_deref()\n    }\n\n    /// Return the request reasoning effort.\n    #[must_use]\n    pub fn reasoning_effort(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.reasoning_effort.as_deref()\n    }\n}\n\n/// A normalized update emitted while streaming a `DeepSeek` response.\n///\n/// This flattens provider wire chunks into events the adapter can consume\n/// incrementally without exposing the raw SSE schema.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum StreamEvent {\n    /// A chunk of model reasoning.\n    Thought(String),\n    /// A chunk of user-facing assistant text.\n    Message(String),\n    /// A streamed tool-call delta.\n    ToolCallDelta(ToolCallDelta),\n    /// The model reported a terminal finish reason.\n    Finished(FinishReason),\n}\n\n/// A partial streamed tool call.\n///\n/// The provider may emit tool call metadata and JSON arguments across many\n/// chunks. Callers typically buffer deltas by [`ToolCallDelta::index`]\n/// until a full tool call can be reconstructed.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct ToolCallDelta {\n    index: usize,\n    id: Option\u003cString\u003e,\n    name: Option\u003cString\u003e,\n    arguments: Option\u003cString\u003e,\n}\n\nimpl ToolCallDelta {\n    /// Create a streamed tool-call delta.\n    #[must_use]\n    pub const fn new(\n        index: usize,\n        id: Option\u003cString\u003e,\n        name: Option\u003cString\u003e,\n        arguments: Option\u003cString\u003e,\n    ) -\u003e Self {\n        Self {\n            index,\n            id,\n            name,\n            arguments,\n        }\n    }\n\n    /// Return the streamed tool-call index.\n    #[must_use]\n    pub const fn index(\u0026self) -\u003e usize {\n        self.index\n    }\n\n    /// Return the provider id delta, if present.\n    #[must_use]\n    pub fn id(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.id.as_deref()\n    }\n\n    /// Return the function name delta, if present.\n    #[must_use]\n    pub fn name(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.name.as_deref()\n    }\n\n    /// Return the argument delta, if present.\n    #[must_use]\n    pub fn arguments(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        self.arguments.as_deref()\n    }\n}\n\n/// Terminal finish reasons returned by `DeepSeek`.\n///\n/// These are normalized from provider-specific strings and can be mapped to\n/// the adapter's higher-level stop reasons.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum FinishReason {\n    /// The turn ended normally.\n    EndTurn,\n    /// The model hit the token limit.\n    MaxTokens,\n    /// The model produced a tool call.\n    ToolCalls,\n    /// The model refused to continue.\n    Refusal,\n    /// Any other provider-specific finish reason.\n    Other(String),\n}\n\nimpl FinishReason {\n    pub(crate) fn from_api(value: \u0026str) -\u003e Self {\n        match value {\n            \"stop\" =\u003e Self::EndTurn,\n            \"length\" =\u003e Self::MaxTokens,\n            \"tool_calls\" =\u003e Self::ToolCalls,\n            \"content_filter\" =\u003e Self::Refusal,\n            other =\u003e Self::Other(other.to_string()),\n        }\n    }\n}\n","traces":[{"line":18,"address":[9681920],"length":1,"stats":{"Line":1}},{"line":19,"address":[9681927],"length":1,"stats":{"Line":2}},{"line":20,"address":[9681958],"length":1,"stats":{"Line":1}},{"line":21,"address":[9681981],"length":1,"stats":{"Line":1}},{"line":22,"address":[9682004],"length":1,"stats":{"Line":1}},{"line":23,"address":[9682027],"length":1,"stats":{"Line":1}},{"line":57,"address":[9650000,9650210,9650204],"length":1,"stats":{"Line":1}},{"line":60,"address":[9650023],"length":1,"stats":{"Line":1}},{"line":61,"address":[9650049],"length":1,"stats":{"Line":1}},{"line":68,"address":[9649980,9649776,9649986],"length":1,"stats":{"Line":1}},{"line":71,"address":[9649799],"length":1,"stats":{"Line":1}},{"line":72,"address":[9649825],"length":1,"stats":{"Line":1}},{"line":79,"address":[9650434,9650428,9650224],"length":1,"stats":{"Line":1}},{"line":82,"address":[9650247],"length":1,"stats":{"L h":1,"stats":{"Line":1}},{"line":417,"address":[9681856],"length":1,"stats":{"Line":1}},{"line":418,"address":[9681861],"length":1,"stats":{"Line":1}},{"line":423,"address":[9681568],"length":1,"stats":{"Line":1}},{"line":424,"address":[9681573],"length":1,"stats":{"Line":2}},{"line":460,"address":[9682400],"length":1,"stats":{"Line":1}},{"line":476,"address":[9682528],"length":1,"stats":{"Line":1}},{"line":477,"address":[9682533],"length":1,"stats":{"Line":2}},{"line":482,"address":[9682384],"length":1,"stats":{"Line":2}},{"line":483,"address":[9682389],"length":1,"stats":{"Line":2}},{"line":488,"address":[9682496],"length":1,"stats":{"Line":2}},{"line":489,"address":[9682501],"length":1,"stats":{"Line":1}},{"line":494,"address":[9682544],"length":1,"stats":{"Line":1}},{"line":495,"address":[9682549],"length":1,"stats":{"Line":1}},{"line":518,"address":[9682064],"length":1,"stats":{"Line":1}},{"line":520,"address":[9682112,9682170],"length":1,"stats":{"Line":2}},{"line":521,"address":[9682142,9682225],"length":1,"stats":{"Line":2}},{"line":522,"address":[9682197,9682277],"length":1,"stats":{"Line":2}},{"line":523,"address":[9682350,9682249],"length":1,"stats":{"Line":2}},{"line":524,"address":[9682301],"length":1,"stats":{"Line":1}}],"covered":94,"coverable":94},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","dev.rs"],"content":"//! Dev/smoke-test harness for local adapter development.\n//!\n//! Mocks the LLM client and permission requester so the full ACP adapter\n//! pipeline can be exercised without hitting the `DeepSeek` API.\n\nuse std::path::Path;\nuse std::str::FromStr;\nuse std::sync::Arc;\n\nuse agent_client_protocol::schema::{\n    ContentBlock, ContentChunk, InitializeRequest, InitializeResponse, NewSessionRequest,\n    NewSessionResponse, PermissionOptionKind, ProtocolVersion, RequestPermissionOutcome,\n    RequestPermissionRequest, RequestPermissionResponse, SelectedPermissionOutcome,\n    SessionNotification, SessionUpdate, StopReason,\n};\nuse agent_client_protocol::util::MatchDispatch;\nuse agent_client_protocol::{AcpAgent, Client, ConnectTo, SessionMessage};\nuse clap::ValueEnum;\nuse deepseek_acp_adapter::deepseek::{\n    ChatRequest, DeepSeekClient, DeepSeekError, FinishReason, LlmClient, StreamEvent,\n};\nuse futures_util::future::BoxFuture;\nuse futures_util::stream::{self, BoxStream};\nuse tokio_util::sync::CancellationToken;\n\nuse crate::acp::{PermissionRequester, handle_new_session_request};\nuse crate::session::{AdapterState, PermissionDecision, SessionStore, request_tool_permission};\nuse crate::tools::ToolContext;\n\n/// Mock or real backend selection.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, ValueEnum)]\npub(crate) enum Backend {\n    /// Connect to the real `DeepSeek` API.\n    Real,\n    /// Use a mock LLM client that returns canned responses.\n    Mock,\n}\n\nimpl Backend {\n    pub(crate) const fn as_str(self) -\u003e \u0026'static str {\n        match self {\n            Self::Real =\u003e \"real\",\n            Self::Mock =\u003e \"mock\",\n        }\n    }\n}\n\n/// Build the appropriate LLM client for a backend.\n///\n/// # Errors\n///\n/// Returns an ACP internal error if the `DeepSeek` environment variables are\n/// missing in real mode.\npub(crate) fn llm_client_for_backend(\n    backend: Backend,\n) -\u003e Result\u003cArc\u003cdyn LlmClient\u003e, agent_client_protocol::Error\u003e {\n    match backend {\n        Backend::Real =\u003e Ok(Arc::new(\n            DeepSeekClient::from_env()\n                .map_err(agent_client_protocol::Error::into_internal_error)?,\n        )),\n        Backend::Mock =\u003e Ok(Arc::new(MockLlmClient)),\n    }\n}\n\n/// Build a dev agent pointing back at this adapter executable.\n///\n/// # Errors\n///\n/// Returns an ACP error if the agent config cannot be parsed.\npub(crate) fn build_dev_agent(\n    executable: \u0026Path,\n    backend: Backend,\n) -\u003e Result\u003cAcpAgent, agent_client_protocol::Error\u003e {\n    let command = executable.to_string_lossy();\n    let agent_config = serde_json::json!({\n        \"type\": \"stdio\",\n        \"name\": \"deepseek-acp-adapter-dev\",\n        \"command\": command,\n        \"args\": [\n            \"serve\",\n            \"--backend\",\n            backend.as_str(),\n        ],\n        \"env\": [],\n    });\n\n    AcpAgent::from_str(\u0026agent_config.to_string())\n}\n\n/// Run a smoke test end-to-end: init → new session → prompt → stop reason.\n///\n/// # Errors\n///\n/// Returns an ACP error for any mis-handshakes or protocol-level failures.\npub(crate) async fn run_smoke_flow(\n    transport: impl ConnectTo\u003cClient\u003e + 'static,\n    prompt: String,\n) -\u003e Result\u003cDevSmokeResult, agent_client_protocol::Error\u003e {\n    Client\n        .builder()\n        .name(\"deepseek-acp-adapter-dev-client\")\n        .on_receive_request(\n            async move |request: RequestPermissionRequest, responder, _cx| {\n                let outcome =\n                    request\n                        .options\n                        .first()\n                        .map_or(RequestPermissionOutcome::Cancelled, |option| {\n                            RequestPermissionOutcome::Selected(SelectedPermissionOutcome::new(\n                                option.option_id.clone(),\n                            ))\n                        });\n\n                responder.respond(RequestPermissionResponse::new(outcome))\n            },\n            agent_client_protocol::on_receive_request!(),\n        )\n        .connect_with(transport, async move |cx| {\n            let initialize_response = cx\n                .send_request(InitializeRequest::new(ProtocolVersion::LATEST))\n                .block_task()\n                .await?;\n            let new_session_response = cx\n                .send_request(NewSessionRequest::new(std::env::current_dir().map_err(\n                    |error| {\n                        agent_client_protocol::Error::internal_error()\n                            .data(format!(\"failed to get current directory: {error}\"))\n                    },\n                )?))\n                .block_task()\n                .await?;\n            let mut session = cx.attach_session(new_session_response.clone(), Vec::new())?;\n            session.send_prompt(prompt.as_str())?;\n\n            let mut updates = Vec::new();\n            let mut response_text = String::new();\n            loop {\n                match session.read_update().await? {\n                    SessionMessage::SessionMessage(dispatch) =\u003e {\n                        MatchDispatch::new(dispatch)\n                            .if_notification(async |notification: SessionNotification| {\n                                updates.push(format!(\"{:?}\", notification.update));\n                                if let SessionUpdate::AgentMessageChunk(ContentChunk {\n                                    content: ContentBlock::Text(text),\n                                    ..\n                                }) = notification.update\n                                {\n                                    response_text.push_str(\u0026text.text);\n                                }\n                                Ok(())\n                            })\n                            .await\n                            .otherwise_ignore()?;\n                    }\n                    SessionMessage::StopReason(stop_reason) =\u003e {\n                        return Ok(DevSmokeResult {\n                            initialize_response,\n                            new_session_response,\n                            updates,\n                            response_text,\n                            stop_reason,\n                        });\n                    }\n                    _ =\u003e {\n                        return Err(agent_client_protocol::Error::internal_error()\n                            .data(\"unexpected session message variant\"));\n                    }\n                }\n            }\n        })\n        .await\n}\n\n/// Print a human-readable summary of the dev smoke test result.\npub(crate) fn print_dev_smoke_result(result: \u0026DevSmokeResult) {\n    println!(\"initialize response: {:?}\", result.initialize_response);\n    println!(\"new session response: {:?}\", result.new_session_response);\n\n    for update in \u0026result.updates {\n        println!(\"session update: {update}\");\n    }\n\n    println!(\"stop reason: {:?}\", result.stop_reason);\n    println!(\"response text: {}\", result.response_text);\n}\n\n/// Captured output from a [`run_smoke_flow`] invocation.\n#[derive(Debug, Clone)]\npub(crate) struct DevSmokeResult {\n    pub(crate) initialize_response: InitializeResponse,\n    pub(crate) new_session_response: NewSessionResponse,\n    pub(crate) updates: Vec\u003cString\u003e,\n    pub(crate) response_text: String,\n    pub(crate) stop_reason: StopReason,\n}\n\n/// Mock LLM client that echoes the user prompt as a canned response.\n#[derive(Debug, Default)]\npub(crate) struct MockLlmClient;\n\nimpl LlmClient for MockLlmClient {\n    fn stream_chat(\n        \u0026self,\n        request: ChatRequest,\n        _cancellation_token: CancellationToken,\n    ) -\u003e Result\u003cBoxStream\u003c'static, Result\u003cStreamEvent, DeepSeekError\u003e\u003e, DeepSeekError\u003e {\n        let prompt = request.messages().last().map_or_else(\n            || \"mock prompt\".to_owned(),\n            |message| message.content().to_owned(),\n        );\n        let response_text = format!(\"mock response to: {prompt}\");\n\n        let events = vec![\n            Ok(StreamEvent::Thought(\"mock reasoning\".to_owned())),\n            Ok(StreamEvent::Message(response_text)),\n            Ok(StreamEvent::Finished(FinishReason::EndTurn)),\n        ];\n\n        Ok(Box::pin(stream::iter(events)))\n    }\n}\n\n/// Mock permission requester that always grants `allow_always`.\n#[derive(Debug, Default)]\npub(crate) struct MockPermissionRequester;\n\nimpl PermissionRequester for MockPermissionRequester {\n    fn request_permission(\n        \u0026self,\n        request: RequestPermissionRequest,\n    ) -\u003e BoxFuture\u003c'_, Result\u003cRequestPermissionResponse, agent_client_protocol::Error\u003e\u003e {\n        let outcome = request\n            .options\n            .iter()\n            .find(|option| option.kind == PermissionOptionKind::AllowAlways)\n            .map_or(RequestPermissionOutcome::Cancelled, |option| {\n                RequestPermissionOutcome::Selected(SelectedPermissionOutcome::new(\n                    option.option_id.clone(),\n                ))\n            });\n\n        Box::pin(async move { Ok(RequestPermissionResponse::new(outcome)) })\n    }\n}\n\n/// Quick smoke check that the permission gating pipeline works end-to-end.\n///\n/// Creates an in-memory session, runs a tool call through\n/// [`request_tool_permission`], and verifies the `allow_always` decision is\n/// cached.\n///\n/// # Errors\n///\n/// Returns an ACP internal error if the permission gate does not produce the\n/// expected outcome.\npub(crate) async fn exercise_permission_gate_smoke() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    let store = SessionStore::new(Arc::new(std::sync::Mutex::new(AdapterState::default())));\n    let session = handle_new_session_request(\u0026store, \u0026NewSessionRequest::new(\"/tmp\"))?;\n    let context = ToolContext {\n        session_id: session.session_id.clone(),\n        cwd: std::env::current_dir().map_err(|error| {\n            agent_client_protocol::Error::internal_error()\n                .data(format!(\"failed to get current directory: {error}\"))\n        })?,\n        additional_directories: Vec::new(),\n        client_capabilities: None,\n    };\n    let call = deepseek_acp_adapter::deepseek::ToolCall::new(\n        \"dev-permission-call\",\n        \"write_file\",\n        serde_json::json!({ \"path\": \"smoke.txt\" }).to_string(),\n    );\n    let decision = request_tool_permission(\n        \u0026store,\n        \u0026context,\n        \u0026call,\n        agent_client_protocol::schema::ToolKind::Edit,\n        \u0026MockPermissionRequester,\n    )\n    .await?;\n\n    if !matches!(decision, PermissionDecision::AllowAlways) {\n        return Err(agent_client_protocol::Error::internal_error()\n            .data(\"permission gate smoke check did not allow always\"));\n    }\n\n    if !store.is_always_allowed(\u0026session.session_id, \"write_file\")? {\n        return Err(agent_client_protocol::Error::internal_error()\n            .data(\"permission gate smoke check did not cache allow_always\"));\n    }\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{\n        Backend, DevSmokeResult, MockLlmClient, build_dev_agent, exercise_permission_gate_smoke,\n        llm_client_for_backend, print_dev_smoke_result, run_smoke_flow,\n    };\n    use crate::acp::{build_initialize_response, serve_with_transport};\n    use crate::session::DEFAULT_MAX_TURN_REQUESTS;\n    use crate::tools::EmptyToolRegistry;\n    use agent_client_protocol::Channel;\n    use agent_client_protocol::schema::{McpServer, ProtocolVersion, StopReason};\n    use deepseek_acp_adapter::deepseek::{\n        ChatMessage, ChatRequest, FinishReason, LlmClient, StreamEvent,\n    };\n    use futures_util::StreamExt;\n    use std::sync::{Arc, Mutex};\n    use tokio_util::sync::CancellationToken;\n\n    fn test_store() -\u003e crate::session::SessionStore {\n        crate::session::SessionStore::new(Arc::new(Mutex::new(\n            crate::session::AdapterState::default(),\n        )))\n    }\n\n    #[test_log::test]\n    fn build_dev_agent_uses_backend_and_executable_path() -\u003e Result\u003c(), agent_client_protocol::Error\u003e\n    {\n        let agent = build_dev_agent(\n            std::path::Path::new(\"/tmp/deepseek-acp-adapter\"),\n            Backend::Mock,\n        )?;\n\n        let McpServer::Stdio(stdio) = agent.server() else {\n            return Err(\n                agent_client_protocol::Error::internal_error().data(\"expected stdio transport\")\n            );\n        };\n\n        assert_eq!(\n            stdio.command,\n            std::path::PathBuf::from(\"/tmp/deepseek-acp-adapter\")\n        );\n        assert_eq!(stdio.args, vec![\"serve\", \"--backend\", \"mock\"]);\n        assert!(stdio.env.is_empty());\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn dev_smoke_flow_runs_initialize_new_and_prompt()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let store = test_store();\n        let llm_client: Arc\u003cdyn LlmClient\u003e = Arc::new(MockLlmClient);\n        let tool_registry: Arc\u003cdyn crate::tools::ToolRegistry\u003e = Arc::new(EmptyToolRegistry);\n        let (client_transport, server_transport) = Channel::duplex();\n        let server_state = Arc::clone(\u0026store.state);\n        let server_client = Arc::clone(\u0026llm_client);\n        let server_tools = Arc::clone(\u0026tool_registry);\n\n        let server = tokio::spawn(async move {\n            serve_with_transport(\n                server_transport,\n                server_state,\n                server_client,\n                server_tools,\n                DEFAULT_MAX_TURN_REQUESTS,\n            )\n            .await\n        });\n\n        let result = run_smoke_flow(client_transport, \"smoke prompt\".to_string()).await?;\n\n        assert_eq!(\n            result.initialize_response.protocol_version,\n            ProtocolVersion::LATEST\n        );\n        assert!(\n            result\n                .new_session_response\n                .session_id\n                .0\n                .starts_with(\"session-\")\n        );\n        assert_eq!(result.stop_reason, StopReason::EndTurn);\n        assert_eq!(result.response_text, \"mock response to: smoke prompt\");\n        assert!(\n            result\n                .updates\n                .iter()\n                .any(|update| update.contains(\"AgentMessageChunk\"))\n        );\n\n        server.abort();\n\n        Ok(())\n    }\n\n    #[test_log::test]\n    fn backend_as_str_covers_real_and_mock() {\n        assert_eq!(Backend::Real.as_str(), \"real\");\n        assert_eq!(Backend::Mock.as_str(), \"mock\");\n    }\n\n    #[test_log::test]\n    fn print_dev_smoke_result_is_callable() {\n        let result = DevSmokeResult {\n            initialize_response: build_initialize_response(ProtocolVersion::LATEST),\n            new_session_response: agent_client_protocol::schema::NewSessionResponse::new(\n                \"session-1\",\n            ),\n            updates: vec![\"update-1\".to_string()],\n            response_text: \"response\".to_string(),\n            stop_reason: StopReason::EndTurn,\n        };\n\n        print_dev_smoke_result(\u0026result);\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn permission_gate_smoke_helper_runs() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        exercise_permission_gate_smoke().await\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn mock_backend_client_streams_expected_response()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let client = llm_client_for_backend(Backend::Mock)?;\n        let mut stream = client\n            .stream_chat(\n                deepseek_acp_adapter::deepseek::ChatRequest::new(vec![ChatMessage::user(\"hello\")]),\n                CancellationToken::new(),\n            )\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let mut events = Vec::new();\n\n        while let Some(item) = stream.next().await {\n            events.push(item.map_err(agent_client_protocol::Error::into_internal_error)?);\n        }\n\n        assert_eq!(\n            events,\n            vec![\n                StreamEvent::Thought(\"mock reasoning\".to_string()),\n                StreamEvent::Message(\"mock response to: hello\".to_string()),\n                StreamEvent::Finished(FinishReason::EndTurn),\n            ]\n        );\n\n        Ok(())\n    }\n\n    #[test_log::test]\n    fn llm_client_for_backend_real_uses_process_environment()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        assert!(crate::init_tracing().is_err());\n        assert!(std::env::var(\"DEEPSEEK_API_KEY\").is_ok());\n\n        let client = deepseek_acp_adapter::deepseek::DeepSeekClient::from_env()\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let config = client.config();\n        assert!(!config.base_url().is_empty());\n        assert!(!config.model().is_empty());\n\n        let client = llm_client_for_backend(Backend::Real)?;\n        drop(client);\n\n        Ok(())\n    }\n\n    #[test_log::test(tokio::test)]\n    async fn mock_client_uses_default_prompt_when_no_messages()\n    -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        let client = MockLlmClient;\n        let mut stream = client\n            .stream_chat(ChatRequest::new(Vec::new()), CancellationToken::new())\n            .map_err(agent_client_protocol::Error::into_internal_error)?;\n        let mut events = Vec::new();\n        while let Some(item) = stream.next().await {\n            events.push(item.map_err(agent_client_protocol::Error::into_internal_error)?);\n        }\n        assert_eq!(events.len(), 3);\n        let StreamEvent::Message(text) = \u0026events[1] else {\n            return Err(agent_client_protocol::Error::internal_error().data(\"expected message\"));\n        };\n        assert!(text.contains(\"mock prompt\"));\n        Ok(())\n    }\n}\n","traces":[{"line":100,"address":[],"length":0,"stats":{"Line":0}},{"line":104,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":1 e":0}},{"line":154,"address":[],"length":0,"stats":{"Line":0}},{"line":156,"address":[],"length":0,"stats":{"Line":0}},{"line":157,"address":[],"length":0,"stats":{"Line":0}},{"line":158,"address":[],"length":0,"stats":{"Line":0}},{"line":159,"address":[],"length":0,"stats":{"Line":0}},{"line":160,"address":[],"length":0,"stats":{"Line":0}},{"line":161,"address":[],"length":0,"stats":{"Line":0}},{"line":162,"address":[],"length":0,"stats":{"Line":0}},{"line":165,"address":[],"length":0,"stats":{"Line":0}},{"line":166,"address":[],"length":0,"stats":{"Line":0}},{"line":167,"address":[],"length":0,"stats":{"Line":0}},{"line":172,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":52},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","lib.rs"],"content":"#![forbid(unsafe_code)]\n#![deny(\n    warnings,\n    missing_docs,\n    clippy::all,\n    clippy::pedantic,\n    clippy::unwrap_used,\n    clippy::expect_used,\n    clippy::panic,\n    clippy::todo,\n    clippy::unimplemented\n)]\n\n//! `DeepSeek` client support for the `ACP` adapter.\n//!\n//! The adapter proper still needs the ACP session layer, but the DeepSeek-side\n//! seam lives here so it can be tested in isolation and reused by the later\n//! protocol wiring.\n//!\n//! # Overview\n//!\n//! The [`deepseek`] module exposes:\n//! - request primitives such as [`deepseek::ChatMessage`] and [`deepseek::ChatRequest`]\n//! - tool advertisement types such as [`deepseek::ToolDefinition`]\n//! - streamed response events via [`deepseek::StreamEvent`]\n//! - an HTTP-backed client via [`deepseek::DeepSeekClient`]\n//!\n//! # Examples\n//!\n//! Create a simple streaming request:\n//!\n//! ```rust,no_run\n//! use deepseek_acp_adapter::deepseek::{ChatMessage, ChatRequest, DeepSeekClient, LlmClient};\n//! use futures_util::StreamExt;\n//! use tokio_util::sync::CancellationToken;\n//!\n//! #[tokio::main]\n//! async fn main() -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n//!     let client = DeepSeekClient::from_env()?;\n//!     let request = ChatRequest::new(vec![\n//!         ChatMessage::system(\"You are a concise coding assistant.\"),\n//!         ChatMessage::user(\"Explain what this adapter crate does.\"),\n//!     ]);\n//!\n//!     let mut stream = client.stream_chat(request, CancellationToken::new())?;\n//!     while let Some(event) = stream.next().await {\n//!         println!(\"{:?}\", event?);\n//!     }\n//!\n//!     Ok(())\n//! }\n//! ```\n//!\n//! Build a tool-enabled request:\n//!\n//! ```rust\n//! use deepseek_acp_adapter::deepseek::{ChatMessage, ChatRequest, ToolDefinition};\n//!\n//! let request = ChatRequest::new(vec![ChatMessage::user(\"Read src/lib.rs\")]).with_tools(vec![\n//!     ToolDefinition::new(\n//!         \"read_file\",\n//!         \"Read a UTF-8 text file\",\n//!         serde_json::json!({\n//!             \"type\": \"object\",\n//!             \"properties\": {\n//!                 \"path\": { \"type\": \"string\" }\n//!             },\n//!             \"required\": [\"path\"],\n//!             \"additionalProperties\": false\n//!         }),\n//!     ),\n//! ]);\n//!\n//! assert_eq!(request.tools()[0].name(), \"read_file\");\n//! ```\n\n/// `DeepSeek` client primitives and streaming SSE adapter.\npub mod deepseek;\n\n#[cfg(test)]\nmod tests {\n    use crate::deepseek::ToolCall as DeepSeekToolCall;\n    use crate::deepseek::{\n        ChatMessage, ChatRequest, DeepSeekConfig, FinishReason, ToolCallDelta, ToolDefinition,\n    };\n\n    #[test]\n    fn message_role_as_str_returns_correct_wire_names() {\n        use crate::deepseek::MessageRole;\n        let system = ChatMessage::system(\"s\");\n        assert_eq!(system.role(), MessageRole::System);\n        let user = ChatMessage::user(\"u\");\n        assert_eq!(user.role(), MessageRole::User);\n        let assistant = ChatMessage::assistant(\"a\");\n        assert_eq!(assistant.role(), MessageRole::Assistant);\n        let tool = ChatMessage::tool_result(\"id\", \"t\");\n        assert_eq!(tool.role(), MessageRole::Tool);\n    }\n\n    #[test]\n    fn chat_message_tool_call_accessors() {\n        let tool_calls = vec![DeepSeekToolCall::new(\"call-1\", \"echo\", \"{}\")];\n        let msg = ChatMessage::assistant_with_tool_calls(\"assistant\", tool_calls.clone());\n        assert_eq!(msg.tool_calls().len(), 1);\n        assert_eq!(msg.tool_calls()[0].id(), \"call-1\");\n        assert_eq!(msg.tool_calls()[0].name(), \"echo\");\n        assert_eq!(msg.tool_calls()[0].arguments(), \"{}\");\n        assert_eq!(msg.tool_call_id(), None);\n    }\n\n    #[test]\n    fn chat_message_tool_result_accessors() {\n        let msg = ChatMessage::tool_result(\"call-2\", \"result\");\n        assert_eq!(msg.content(), \"result\");\n        assert_eq!(msg.tool_call_id(), Some(\"call-2\"));\n    }\n\n    #[test]\n    fn tool_definition_accessors() {\n        let def = ToolDefinition::new(\"echo\", \"description\", serde_json::json!({\"a\":1}));\n        assert_eq!(def.name(), \"echo\");\n        assert_eq!(def.description(), \"description\");\n        assert_eq!(def.parameters(), \u0026serde_json::json!({\"a\":1}));\n    }\n\n    #[test]\n    fn tool_call_delta_accessors() {\n        let delta = ToolCallDelta::new(\n            0,\n            Some(\"id\".to_string()),\n            Some(\"name\".to_string()),\n            Some(\"args\".to_string()),\n        );\n        assert_eq!(delta.index(), 0);\n        assert_eq!(delta.id(), Some(\"id\"));\n        assert_eq!(delta.name(), Some(\"name\"));\n        assert_eq!(delta.arguments(), Some(\"args\"));\n    }\n\n    #[test]\n    fn tool_call_delta_none_fields() {\n        let delta = ToolCallDelta::new(1, None, None, None);\n        assert_eq!(delta.index(), 1);\n        assert_eq!(delta.id(), None);\n        assert_eq!(delta.name(), None);\n        assert_eq!(delta.arguments(), None);\n    }\n\n    #[test]\n    fn chat_request_accessors_no_override() {\n        let request = ChatRequest::new(vec![ChatMessage::user(\"hi\")]);\n        assert_eq!(request.messages().len(), 1);\n        assert_eq!(request.tools().len(), 0);\n        assert_eq!(request.model(), None);\n        assert_eq!(request.reasoning_effort(), None);\n    }\n\n    #[test]\n    fn finish_reason_from_api_covers_all_branches() {\n        assert_eq!(\n            FinishReason::EndTurn,\n            crate::deepseek::FinishReason::EndTurn\n        );\n    }\n\n    #[test]\n    fn deepseek_config_new_accepts_explicit_values() {\n        let config = DeepSeekConfig::new(\"key\", \"https://example.com\", \"model-v1\");\n        assert_eq!(config.base_url(), \"https://example.com\");\n        assert_eq!(config.model(), \"model-v1\");\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lotso","code","deepseek-acp-adapter","src","main.rs"],"content":"//! Command-line entrypoint for the `DeepSeek` `ACP` adapter.\n\n#![forbid(unsafe_code)]\n#![deny(\n    warnings,\n    missing_docs,\n    clippy::all,\n    clippy::pedantic,\n    clippy::unwrap_used,\n    clippy::expect_used,\n    clippy::panic,\n    clippy::todo,\n    clippy::unimplemented\n)]\n// `#[must_use]` on every internal binary helper is noise at this stage.\n#![allow(clippy::must_use_candidate)]\n\nuse std::num::NonZeroUsize;\nuse std::sync::{Arc, Mutex};\nuse std::{error::Error, process::ExitCode};\n\nuse agent_client_protocol::Stdio;\nuse agent_client_protocol::schema::{\n    AvailableCommand, AvailableCommandInput, ContentBlock, EmbeddedResourceResource, Plan,\n    PlanEntry, PlanEntryPriority, PlanEntryStatus, SessionNotification, SessionUpdate, StopReason,\n    UnstructuredCommandInput,\n};\nuse clap::{Parser, Subcommand};\nuse deepseek_acp_adapter::deepseek::FinishReason;\nuse tracing_subscriber::EnvFilter;\n\nmod acp;\nmod dev;\nmod mcp;\nmod session;\nmod session_store;\n#[cfg(test)]\nmod test_utils;\nmod tools;\nmod turn;\n\npub(crate) use acp::{\n    PermissionRequester, ReadTextFileRequester, TerminalRequester, ToolCallRequester,\n    WriteTextFileRequester, serve_with_transport,\n};\npub(crate) use dev::{\n    Backend, build_dev_agent, exercise_permission_gate_smoke, llm_client_for_backend,\n    print_dev_smoke_result, run_smoke_flow,\n};\npub(crate) use mcp::{\n    McpSession, connect_mcp_sessions, is_mcp_tool_name, mcp_tool_execution, mcp_tool_kind,\n};\npub(crate) use session_store::FilesystemSessionStore;\nuse tools::AdapterToolRegistry;\npub(crate) use turn::tool_raw_input;\n\ntype AdapterResult\u003cT\u003e = Result\u003cT, Box\u003cdyn Error + Send + Sync + 'static\u003e\u003e;\n\n// Re-export session domain types so other modules can use `crate::*` imports.\npub(crate) use session::{\n    AdapterState, DEFAULT_MAX_TURN_REQUESTS, PendingToolCalls, PermissionDecision,\n    PermissionPosture, ReasoningEffort, SESSION_CONFIG_MODE_ID, SESSION_CONFIG_MODEL_ID,\n    SESSION_CONFIG_REASONING_EFFORT_ID, SessionRecord, SessionStore, default_session_modes,\n    initial_model_from_env, request_tool_permission, validate_session_model,\n};\n\nconst ADAPTER_NAME: \u0026str = env!(\"CARGO_PKG_NAME\");\nconst ADAPTER_VERSION: \u0026str = env!(\"CARGO_PKG_VERSION\");\n\n/// Returns the list of available slash commands for the `DeepSeek` adapter.\n///\n/// These commands are advertised to the client via `AvailableCommandsUpdate`\n/// after session creation, letting users invoke common workflows.\n#[must_use]\nfn adapter_available_commands() -\u003e Vec\u003cAvailableCommand\u003e {\n    vec![\n        AvailableCommand::new(\"explain\", \"Explain selected code or a concept in detail\").input(\n            AvailableCommandInput::Unstructured(UnstructuredCommandInput::new(\n                \"The code or concept to explain\",\n            )),\n        ),\n        AvailableCommand::new(\"fix\", \"Identify and fix issues in the selected code\").input(\n            AvailableCommandInput::Unstructured(UnstructuredCommandInput::new(\n                \"The code with issues to fix\",\n            )),\n        ),\n        AvailableCommand::new(\"test\", \"Generate tests for the selected code\").input(\n            AvailableCommandInput::Unstructured(UnstructuredCommandInput::new(\n                \"The code to generate tests for\",\n            )),\n        ),\n        AvailableCommand::new(\n            \"search\",\n            \"Search the codebase for relevant code or documentation\",\n        )\n        .input(AvailableCommandInput::Unstructured(\n            UnstructuredCommandInput::new(\"The search query or keywords\"),\n        )),\n        AvailableCommand::new(\"clear\", \"Clear the conversation history and start fresh\"),\n    ]\n}\n\n/// Build a `Plan` from a user prompt by splitting it into logical steps.\n///\n/// If the prompt contains multiple sentences, each becomes a plan entry.\n/// Otherwise a single entry captures the entire request.\n#[must_use]\nfn plan_from_prompt(prompt: \u0026str) -\u003e Plan {\n    let entries: Vec\u003cPlanEntry\u003e = if prompt.contains('.') || prompt.contains('\\n') {\n        prompt\n            .split(['.', '\\n'])\n            .map(str::trim)\n            .filter(|s| !s.is_empty())\n            .map(|s| {\n                PlanEntry::new(\n                    s.to_string(),\n                    PlanEntryPriority::Medium,\n                    PlanEntryStatus::Pending,\n                )\n            })\n            .collect()\n    } else {\n        vec![PlanEntry::new(\n            prompt.to_string(),\n            PlanEntryPriority::High,\n            PlanEntryStatus::InProgress,\n        )]\n    };\n\n    Plan::new(entries)\n}\n\n#[derive(Debug, Parser)]\n#[command(\n    name = \"deepseek-acp-adapter\",\n    version,\n    about = \"ACP stdio adapter for DeepSeek-backed coding sessions\"\n)]\nstruct Cli {\n    #[command(subcommand)]\n    command: Command,\n}\n\n#[derive(Debug, PartialEq, Eq, Subcommand)]\nenum Command {\n    /// Run the ACP server over standard input and output.\n    Serve {\n        #[arg(long, value_enum, default_value_t = Backend::Real)]\n        backend: Backend,\n        /// Maximum tool-call/response cycles per prompt turn (must be ≥ 1).\n        #[arg(long, default_value_t = DEFAULT_MAX_TURN_REQUESTS)]\n        max_turn_requests: NonZeroUsize,\n    },\n    #[command(hide = true)]\n    Dev {\n        #[arg(long, value_enum, default_value_t = Backend::Mock)]\n        backend: Backend,\n        #[arg(long, default_value = \"Hello from the dev smoke test.\")]\n        prompt: String,\n    },\n}\n\nfn main() -\u003e ExitCode {\n    match run() {\n        Ok(()) =\u003e ExitCode::SUCCESS,\n        Err(error) =\u003e {\n            eprintln!(\"error: {error}\");\n            ExitCode::FAILURE\n        }\n    }\n}\n\nfn run() -\u003e AdapterResult\u003c()\u003e {\n    init_tracing()?;\n    let runtime = tokio::runtime::Builder::new_multi_thread()\n        .enable_all()\n        .build()?;\n\n    runtime.block_on(async {\n        match Cli::parse().command {\n            Command::Serve {\n                backend,\n                max_turn_requests,\n            } =\u003e serve(backend, max_turn_requests).await,\n            Command::Dev { backend, prompt } =\u003e dev(backend, prompt).await,\n        }\n    })?;\n\n    Ok(())\n}\n\nfn init_tracing() -\u003e AdapterResult\u003c()\u003e {\n    tracing_subscriber::fmt()\n        .with_env_filter(EnvFilter::from_default_env())\n        .with_writer(std::io::stderr)\n        .try_init()?;\n    Ok(())\n}\n\nasync fn serve(\n    backend: Backend,\n    max_turn_requests: NonZeroUsize,\n) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    let llm_client = llm_client_for_backend(backend)?;\n    let tool_registry = Arc::new(AdapterToolRegistry);\n    let state = Arc::new(Mutex::new(AdapterState::new(initial_model_from_env())));\n    serve_with_transport(\n        Stdio::new(),\n        state,\n        llm_client,\n        tool_registry,\n        max_turn_requests,\n    )\n    .await\n}\n\nasync fn dev(backend: Backend, prompt: String) -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n    let agent = build_dev_agent(\n        \u0026std::env::current_exe().map_err(|error| {\n            agent_client_protocol::Error::internal_error()\n                .data(format!(\"failed to locate current executable: {error}\"))\n        })?,\n        backend,\n    )?;\n    let result = run_smoke_flow(agent, prompt).await?;\n    print_dev_smoke_result(\u0026result);\n    exercise_permission_gate_smoke().await?;\n    Ok(())\n}\n\nfn text_from_prompt(prompt: \u0026[ContentBlock]) -\u003e Result\u003cString, agent_client_protocol::Error\u003e {\n    let mut text = String::new();\n\n    for block in prompt {\n        match block {\n            ContentBlock::Text(content) =\u003e text.push_str(\u0026content.text),\n            ContentBlock::ResourceLink(link) =\u003e text.push_str(\u0026resource_link_prompt_text(link)),\n            ContentBlock::Resource(resource) =\u003e match \u0026resource.resource {\n                EmbeddedResourceResource::TextResourceContents(contents) =\u003e {\n                    text.push_str(\u0026resource_text_prompt_text(contents));\n                }\n                EmbeddedResourceResource::BlobResourceContents(_) =\u003e {\n                    return Err(agent_client_protocol::Error::invalid_params()\n                        .data(\"binary resource prompt blocks are not supported\"));\n                }\n                _ =\u003e {\n                    return Err(agent_client_protocol::Error::invalid_params()\n                        .data(\"unsupported embedded resource prompt block\"));\n                }\n            },\n            _ =\u003e {\n                return Err(agent_client_protocol::Error::invalid_params().data(\n                    \"only text, resource link, and text resource prompt blocks are supported\",\n                ));\n            }\n        }\n    }\n\n    if text.trim().is_empty() {\n        return Err(agent_client_protocol::Error::invalid_params()\n            .data(\"prompt must include non-empty text\"));\n    }\n\n    Ok(text)\n}\n\nfn resource_link_prompt_text(link: \u0026agent_client_protocol::schema::ResourceLink) -\u003e String {\n    let display_name = link.title.as_deref().unwrap_or(link.name.as_str());\n    let mut rendered = String::new();\n    rendered.push_str(\"[resource] \");\n    rendered.push_str(display_name);\n    rendered.push_str(\" \u003c\");\n    rendered.push_str(\u0026link.uri);\n    rendered.push('\u003e');\n\n    if let Some(description) = \u0026link.description {\n        rendered.push_str(\" - \");\n        rendered.push_str(description);\n    }\n\n    rendered\n}\n\nfn resource_text_prompt_text(\n    contents: \u0026agent_client_protocol::schema::TextResourceContents,\n) -\u003e String {\n    let mut rendered = String::new();\n    rendered.push_str(\"[resource] \u003c\");\n    rendered.push_str(\u0026contents.uri);\n    rendered.push_str(\"\u003e\\n\");\n    rendered.push_str(\u0026contents.text);\n    rendered\n}\n\nfn session_notification(\n    session_id: agent_client_protocol::schema::SessionId,\n    update: SessionUpdate,\n) -\u003e SessionNotification {\n    SessionNotification::new(session_id, update)\n}\n\nfn stop_reason_from_finish(reason: \u0026FinishReason) -\u003e StopReason {\n    match reason {\n        FinishReason::EndTurn | FinishReason::ToolCalls | FinishReason::Other(_) =\u003e {\n            StopReason::EndTurn\n        }\n        FinishReason::MaxTokens =\u003e StopReason::MaxTokens,\n        FinishReason::Refusal =\u003e StopReason::Refusal,\n    }\n}\n\n/// Create a `SessionStore` backed by a fresh default adapter state.\n///\n/// This is a convenience for tests that previously created\n/// `Arc\u003cMutex\u003cAdapterState\u003e\u003e` directly.\n#[cfg(test)]\npub(crate) fn test_store() -\u003e SessionStore {\n    SessionStore::new(Arc::new(Mutex::new(AdapterState::default())))\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{\n        Backend, Cli, Command, DEFAULT_MAX_TURN_REQUESTS, plan_from_prompt, text_from_prompt,\n    };\n    use crate::acp::validate_session_paths;\n    use agent_client_protocol::schema::{\n        BlobResourceContents, ContentBlock, EmbeddedResource, EmbeddedResourceResource,\n        ImageContent, NewSessionRequest, PlanEntryPriority, ResourceLink, TextResourceContents,\n    };\n    use clap::Parser;\n\n    #[test_log::test]\n    fn parses_serve_subcommand() {\n        let parsed = Cli::try_parse_from([\"deepseek-acp-adapter\", \"serve\"]);\n        assert!(\n            matches!(\n                parsed,\n                Ok(Cli {\n                    command: Command::Serve {\n                        backend: Backend::Real,\n                        ..\n                    }\n                })\n            ),\n            \"expected Ok(Cli::Serve {{ backend: Real }}), got {parsed:?}\"\n        );\n        if let Ok(Cli {\n            command: Command::Serve {\n                max_turn_requests, ..\n            },\n        }) = parsed\n        {\n            assert_eq!(max_turn_requests, DEFAULT_MAX_TURN_REQUESTS);\n        }\n    }\n\n    #[test_log::test]\n    fn parses_dev_subcommand() {\n        let parsed = Cli::try_parse_from([\n            \"deepseek-acp-adapter\",\n            \"dev\",\n            \"--backend\",\n            \"mock\",\n            \"--prompt\",\n            \"smoke\",\n        ]);\n\n        assert!(matches!(\n            parsed,\n            Ok(Cli {\n                command: Command::Dev {\n                    backend: Backend::Mock,\n                    prompt,\n                }\n            }) if prompt == \"smoke\"\n        ));\n    }\n\n    #[test_log::test]\n    fn helper_validation_and_prompt_error_branches() -\u003e Result\u003c(), agent_client_protocol::Error\u003e {\n        assert_eq!(\n            text_from_prompt(\u0026[ContentBlock::from(\"hello\"), ContentBlock::from(\" world\")])?,\n            \"hello world\"\n        );\n\n        let resource_link_prompt = vec![ContentBlock::ResourceLink(ResourceLink::new(\n            \"docs\",\n            \"file:///docs/reference.md\",\n        ))];\n        assert_eq!(\n            text_from_prompt(\u0026resource_link_prompt)?,\n            \"[resource] docs \u003cfile:///docs/reference.md\u003e\"\n        );\n\n        let text_resource_prompt = vec![ContentBlock::Resource(EmbeddedResource::new(\n            EmbeddedResourceResource::TextResourceContents(TextResourceContents::new(\n                \"context body\",\n                \"file:///docs/context.md\",\n            )),\n        ))];\n        assert_eq!(\n            text_from_prompt(\u0026text_resource_prompt)?,\n            \"[resource] \u003cfile:///docs/context.md\u003e\\ncontext body\"\n        );\n\n        let blob_resource_prompt = vec![ContentBlock::Resource(EmbeddedResource::new(\n            EmbeddedResourceResource::BlobResourceContents(BlobResourceContents::new(\n                \"aGVsbG8=\",\n                \"file:///docs/context.bin\",\n            )),\n        ))];\n        let Err(error) = text_from_prompt(\u0026blob_resource_prompt) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected binary resource prompt to fail\"));\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"binary resource prompt blocks are not supported\")\n        );\n\n        let image_prompt = vec![ContentBlock::Image(ImageContent::new(\n            \"aGVsbG8=\",\n            \"image/png\",\n        ))];\n        let Err(error) = text_from_prompt(\u0026image_prompt) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected image prompt to fail\"));\n        };\n        assert!(\n            error.to_string().contains(\n                \"only text, resource link, and text resource prompt blocks are supported\"\n            )\n        );\n\n        let Err(error) = text_from_prompt(\u0026[]) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected empty prompt to fail\"));\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"prompt must include non-empty text\")\n        );\n\n        let relative_request = NewSessionRequest::new(\"relative\");\n        let Err(error) = validate_session_paths(\u0026relative_request) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected relative cwd to fail\"));\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"session cwd must be an absolute path\")\n        );\n\n        let relative_additional = NewSessionRequest::new(\"/tmp\")\n            .additional_directories(vec![std::path::PathBuf::from(\"relative\")]);\n        let Err(error) = validate_session_paths(\u0026relative_additional) else {\n            return Err(agent_client_protocol::Error::internal_error()\n                .data(\"expected relative additional directory to fail\"));\n        };\n        assert!(\n            error\n                .to_string()\n                .contains(\"additional session directories must be absolute paths\")\n        );\n\n        Ok(())\n    }\n\n    #[test]\n    fn plan_from_prompt_splits_multiple_sentences() {\n        let plan = plan_from_prompt(\"Do X. Do Y.\");\n        assert_eq!(plan.entries.len(), 2);\n        assert!(\n            plan.entries\n                .iter()\n                .all(|entry| entry.priority == PlanEntryPriority::Medium)\n        );\n    }\n\n    #[test]\n    fn plan_from_prompt_splits_newlines() {\n        let plan = plan_from_prompt(\"alpha\\nbeta\");\n        assert_eq!(plan.entries.len(), 2);\n    }\n\n    #[test]\n    fn plan_from_prompt_single_sentence_uses_high_priority() {\n
